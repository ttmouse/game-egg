// 根据宠物基因获取元素技能
function getElementSkillForGene(gene) {
  const map = {
    water:   { name:'水炮',   icon:'🌊', power:50, element:'water' },
    fire:    { name:'火焰牙', icon:'🔥', power:50, element:'fire' },
    grass:   { name:'藤鞭',   icon:'🌿', power:50, element:'grass' },
    electric:{ name:'雷电',   icon:'⚡', power:50, element:'electric' },
    ice:     { name:'冰息',   icon:'❄️', power:50, element:'ice' },
    dark:    { name:'暗影球', icon:'🌑', power:50, element:'dark' },
    light:   { name:'光弹',   icon:'☀', power:50, element:'light' },
    wind:    { name:'风刃',   icon:'🌀', power:50, element:'wind' },
    earth:   { name:'落石',   icon:'🪨', power:50, element:'earth' },
    metal:   { name:'铁壁',   icon:'⚙️', power:50, element:'metal' },
  };
  return map[gene] || null;
}

// 获取宠物所有技能
function getPetSkills(pet) {
  const gene = (pet.genes && pet.genes.length > 0) ? pet.genes[0] : null;
  const ele = getElementSkillForGene(gene);
  return [
    { key:'tackle', name:'撞击', icon:'💥', power:30, type:'attack', desc:'基础攻击' },
    ele ? { key:gene+'Skill', name:ele.name, icon:ele.icon, power:ele.power, type:'attack', element:ele.element, desc:gene+'系技能' }
      : { key:'slash', name:'利爪', icon:'🪓', power:40, type:'attack', desc:'物理攻击' },
    { key:'heal', name:'治愈', icon:'💚', power:0, type:'heal', desc:'回复30%HP' },
  ];
}

// 基因相克倍率
function getTypeMultiplier(attackElement, defendElement) {
  const chart = {
    fire:    { grass:2, water:0.5, fire:1, ice:2, dark:1, light:1 },
    water:   { fire:2, grass:0.5, water:1, earth:2, electric:0.5 },
    grass:   { water:2, fire:0.5, grass:1, poison:0.5, fire:0.5 },
    electric:{ water:2, earth:0, grass:0.5, electric:1, metal:2 },
    ice:     { grass:2, water:0.5, ice:1, fire:0.5, earth:0.5 },
    dark:    { light:2, dark:0.5, dark:1, ghost:2, neutral:1 },
    light:   { dark:2, light:0.5, light:1, ghost:0.5, neutral:1 },
    wind:    { fire:0.5, grass:2, earth:0, wind:1, bird:2 },
    earth:   { fire:2, water:0.5, grass:0.5, electric:2, earth:1, metal:0.5 },
    metal:   { earth:2, fire:0.5, metal:1, ice:2, electric:2 },
  };
  if (attackElement && defendElement) {
    const row = chart[attackElement];
    if (row && row[defendElement] !== undefined) return row[defendElement];
  }
  return 1;
}

// 计算伤害
function calcDamage(skill, attacker, defender) {
  const basePower = skill.power || 30;
  const levelBonus = 1 + attacker.level * 0.2;
  const starBonus = 1 + (attacker.star - 1) * 0.3;
  const base = Math.round(basePower * levelBonus * starBonus);

  // 元素倍率（defender基因取第一个作为防御属性）
  const defenderGene = (defender.genes && defender.genes.length > 0) ? defender.genes[0] : null;
  const multiplier = getTypeMultiplier(skill.element, defenderGene);

  // 随机波动 ±10%
  const variance = 0.9 + Math.random() * 0.2;
  return Math.max(1, Math.round(base * multiplier * variance));
}

// 存活宠物数量
function countAlive(pets) {
  return pets.filter(p => p.hp > 0).length;
}

// 获取HP条颜色
function getHpColor(ratio) {
  if (ratio > 0.6) return '#4CAF50';
  if (ratio > 0.3) return '#FFC107';
  return '#E53935';
}

// 切换宠物队伍分配
let battlePetTeam = {};  // petId -> 'A' | 'B'

function toggleBattlePet(petId, silent) {
  const pet = g.pets.find(p => p.id === petId);
  if (!pet || pet.restUntil > Date.now()) return;

  const current = battlePetTeam[petId];
  if (!current) {
    battlePetTeam[petId] = 'A';
  } else if (current === 'A') {
    battlePetTeam[petId] = 'B';
  } else {
    delete battlePetTeam[petId];
  }

  if (!silent) updateBattleTeamUI();
}

// 更新队伍UI
function updateBattleTeamUI() {
  const teamA = Object.keys(battlePetTeam).filter(id => battlePetTeam[id] === 'A').map(id => g.pets.find(p => p.id == id)).filter(Boolean);
  const teamB = Object.keys(battlePetTeam).filter(id => battlePetTeam[id] === 'B').map(id => g.pets.find(p => p.id == id)).filter(Boolean);

}

// 开始战斗
function startBattle() {
  const teamA = Object.keys(battlePetTeam).filter(id => battlePetTeam[id] === 'A').map(id => g.pets.find(p => p.id == id)).filter(Boolean);
  const teamB = Object.keys(battlePetTeam).filter(id => battlePetTeam[id] === 'B').map(id => g.pets.find(p => p.id == id)).filter(Boolean);

  if (teamA.length === 0 || teamB.length === 0) return;

  // 重置HP（从当前HP开始，允许战斗内回复）
  const allPets = [...teamA, ...teamB];
  allPets.forEach(p => {
    p._origHp = p.hp; // 记录战斗前HP
  });

  // 初始HP赋值（如果未初始化）
  allPets.forEach(p => { if (!p.maxHp) p.maxHp = p.star * 25; if (!p.hp || p.hp <= 0) p.hp = p.maxHp; });

  // 按速度排序（level+star高的先）
  allPets.sort((a, b) => (b.level + b.star) - (a.level + a.star));

  const teamAPetIds = new Set(teamA.map(p => p.id));
  const turnOrder = [...allPets];

  battleState = {
    state: 'battle',     // battle | anim | result
    teamA,
    teamB,
    teamAPetIds,
    turnOrder,
    turnIndex: 0,        // 当前行动宠物在turnOrder中的索引
    round: 1,
    log: [],              // 战斗日志 [{text, color}]
    winner: null,
    // 动画状态
    animPhase: 'skillSelect',  // skillSelect | targeting | anim | nextTurn | result
    turnTimer: 0,
    curAttacker: null,
    curSkill: null,
    curTarget: null,
    damageDisplay: null,  // { x, y, text, timer, color }
    resultMsg: '',
    skillBtns: [],       // [{ skillKey, x, y, w, h }]
    targetBtns: [],      // [{ petId, x, y, w, h }]
  };

  nextBattleTurn();
  document.getElementById('overlayMsg').style.maxWidth = '360px';
  closeOverlay();
  g.interactGame = 'battle';
}

// 下一回合
function nextBattleTurn() {
  const alive = battleState.turnOrder.filter(p => p.hp > 0);
  if (alive.length <= 1) {
    endBattle();
    return;
  }

  // 找到下一个存活的宠物
  let attempts = 0;
  while (attempts < battleState.turnOrder.length) {
    const pet = battleState.turnOrder[battleState.turnIndex];
    battleState.turnIndex = (battleState.turnIndex + 1) % battleState.turnOrder.length;
    attempts++;
    if (pet && pet.hp > 0) {
      battleState.curAttacker = pet;
      battleState.curSkill = null;
      battleState.curTarget = null;
      battleState.animPhase = 'skillSelect';
      battleState.turnTimer = 0;
      return;
    }
  }

  // 所有宠物都死了 → 下一轮
  battleState.round++;
  battleState.turnIndex = 0;
  nextBattleTurn();
}

// 施放技能（由UI按钮调用）
function doBattleSkill(skillKey) {
  const attacker = battleState.curAttacker;
  if (!attacker || battleState.animPhase !== 'skillSelect') return;

  const skills = getPetSkills(attacker);
  const skill = skills.find(s => s.key === skillKey) || skills[0];
  battleState.curSkill = skill;
  battleState.animPhase = 'targeting';
}

// 选择目标（由UI按钮调用）
function doBattleTarget(targetPetId) {
  if (battleState.animPhase !== 'targeting') return;
  const target = battleState.turnOrder.find(p => p.id === targetPetId);
  if (!target || target.hp <= 0) return;

  battleState.curTarget = target;
  battleState.animPhase = 'animating';
  battleState.turnTimer = 0;

  // 立即执行技能效果
  executeBattleAction();
}

function executeBattleAction() {
  const attacker = battleState.curAttacker;
  const skill = battleState.curSkill;
  const target = battleState.curTarget;
  if (!attacker || !skill || !target) { nextBattleTurn(); return; }

  let logText = '';
  let logColor = '#fff';

  if (skill.type === 'heal') {
    const healAmt = Math.round(attacker.maxHp * 0.3);
    attacker.hp = Math.min(attacker.maxHp, attacker.hp + healAmt);
    logText = `${attacker.name} 使用了${skill.name}，回复了 ${healAmt} HP！`;
    logColor = '#4CAF50';
    battleState.damageDisplay = { x: 360, y: 200, text: `+${healAmt}`, color: '#4CAF50', timer: 0 };
  } else {
    const dmg = calcDamage(skill, attacker, target);
    target.hp = Math.max(0, target.hp - dmg);
    attacker.exp = (attacker.exp || 0) + 2; // 回合经验

    const isEffective = getTypeMultiplier(skill.element, (target.genes&&target.genes[0])) > 1;
    logText = `${attacker.name} 对 ${target.name} 使用了${skill.name}，造成了 ${dmg} 点伤害！${isEffective?' 效果拔群！':''}`;
    logColor = isEffective ? '#FF9800' : '#fff';
    battleState.damageDisplay = { x: 360, y: 180, text: `-${dmg}`, color: '#E53935', timer: 0 };
  }

  battleState.log.unshift({ text: logText, color: logColor });
  if (battleState.log.length > 5) battleState.log.pop();

  // 检查目标是否倒下
  if (target.hp <= 0) {
    battleState.log.unshift({ text: `${target.name} 倒下了！`, color: '#f55' });
  }

  battleState.animPhase = 'waiting';
  battleState.turnTimer = 0;
}

// 结束战斗
function endBattle() {
  battleState.animPhase = 'result';

  const aliveA = countAlive(battleState.teamA);
  const aliveB = countAlive(battleState.teamB);

  if (aliveA > 0 && aliveB === 0) {
    battleState.winner = 'A';
    battleState.resultMsg = '🔵 A队获胜！';
    // 奖励
    battleState.teamA.forEach(p => {
      if (p.hp > 0) {
        addExp(p, 20);
        g.intimacy = Math.min(100, g.intimacy + 10);
      } else {
        p.hp = 0;
        p.restUntil = Date.now() + 3600 * 1000;
      }
    });
    battleState.teamB.forEach(p => {
      p.hp = 0;
      p.restUntil = Date.now() + 3600 * 1000;
    });
  } else if (aliveB > 0 && aliveA === 0) {
    battleState.winner = 'B';
    battleState.resultMsg = '🔴 B队获胜！';
    battleState.teamB.forEach(p => {
      if (p.hp > 0) {
        addExp(p, 20);
        g.intimacy = Math.min(100, g.intimacy + 10);
      } else {
        p.hp = 0;
        p.restUntil = Date.now() + 3600 * 1000;
      }
    });
    battleState.teamA.forEach(p => {
      p.hp = 0;
      p.restUntil = Date.now() + 3600 * 1000;
    });
  } else {
    battleState.winner = 'draw';
    battleState.resultMsg = '🤝 平局！';
  }

  saveGame();
}

// 退出战斗
function exitBattle() {
  battleState = null;
  battlePetTeam = {};
  g.interactGame = null;
}

// ─── 战斗每帧更新 ────────────────────────────────────────────────
function updateBattle(dt) {
  if (!battleState) return;

  // 伤害数字飘字
  if (battleState.damageDisplay) {
    battleState.damageDisplay.timer += dt;
    if (battleState.damageDisplay.timer > 1.5) {
      battleState.damageDisplay = null;
    }
  }

  // 等待动画结束后自动切换下一回合
  if (battleState.animPhase === 'waiting') {
    battleState.turnTimer += dt;
    if (battleState.turnTimer >= 1.0) {
      nextBattleTurn();
    }
  }
}

// ─── 战斗Canvas渲染 ─────────────────────────────────────────────
function drawBattle(ctx) {
  if (!battleState) return;

  // 背景
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 地面装饰
  ctx.fillStyle = '#1a2a1a';
  ctx.fillRect(0, 480, canvas.width, canvas.height - 480);
  ctx.strokeStyle = '#2a3a2a';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 480); ctx.lineTo(x + 20, canvas.height); ctx.stroke();
  }

  // 中央分隔线
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.setLineDash([8,8]);
  ctx.beginPath(); ctx.moveTo(360, 60); ctx.lineTo(360, 470); ctx.stroke();
  ctx.setLineDash([]);

  // 队伍标签
  ctx.fillStyle = '#64B5F6';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('🔵 A队', 20, 30);
  ctx.fillStyle = '#EF5350';
  ctx.fillText('🔴 B队', 620, 30);
  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.fillText(`第 ${battleState.round} 回合`, 320, 30);

  // 绘制宠物（两侧）
  const drawPetCard = (pet, x, y, isLeft, isActive) => {
    if (!pet) return;

    const alive = pet.hp > 0;
    const hpRatio = alive ? pet.hp / pet.maxHp : 0;
    const hpColor = getHpColor(hpRatio);
    const borderColor = isActive ? '#FFD700' : alive ? (battleState.teamAPetIds.has(pet.id) ? '#64B5F6' : '#EF5350') : '#333';

    // 卡片背景
    ctx.fillStyle = alive ? 'rgba(26,26,46,0.95)' : 'rgba(20,20,20,0.8)';
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = isActive ? 3 : 2;
    roundRect(ctx, x, y, 140, 100, 8);
    ctx.fill();
    ctx.stroke();

    // 名字
    ctx.fillStyle = alive ? '#fff' : '#666';
    ctx.font = 'bold 13px monospace';
    ctx.fillText(pet.name, x + 8, y + 18);

    // 星级
    ctx.fillStyle = STAR_COLORS[pet.star] || '#aaa';
    ctx.font = '11px monospace';
    ctx.fillText('★'.repeat(pet.star), x + 8, y + 34);

    // 基因图标
    const geneStr = (pet.genes||[]).map(gk=>(GENES[gk]||{}).icon||'').join('');
    ctx.fillStyle = '#aaa';
    ctx.font = '12px monospace';
    ctx.fillText(geneStr, x + 8, y + 50);

    // HP条
    ctx.fillStyle = '#333';
    ctx.fillRect(x + 8, y + 56, 124, 10);
    ctx.fillStyle = hpColor;
    ctx.fillRect(x + 8, y + 56, Math.round(124 * hpRatio), 10);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 8, y + 56, 124, 10);

    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.fillText(`${pet.hp} / ${pet.maxHp}`, x + 8, y + 78);

    // 死亡标记
    if (!alive) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(x, y, 140, 100);
      ctx.fillStyle = '#f55';
      ctx.font = 'bold 16px monospace';
      ctx.fillText('倒下', x + 40, y + 55);
    }

    // 存活指示点
    if (alive) {
      ctx.fillStyle = '#4CAF50';
      ctx.beginPath();
      ctx.arc(isLeft ? x + 8 : x + 132, y + 90, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  };

  // A队（左侧，x=10开始）
  battleState.teamA.forEach((pet, i) => {
    drawPetCard(pet, 10, 50 + i * 115, true, battleState.curAttacker && battleState.curAttacker.id === pet.id);
  });
  // B队（右侧，x=570开始）
  battleState.teamB.forEach((pet, i) => {
    drawPetCard(pet, 570, 50 + i * 115, false, battleState.curAttacker && battleState.curAttacker.id === pet.id);
  });

  // 伤害飘字
  if (battleState.damageDisplay) {
    const dd = battleState.damageDisplay;
    const alpha = Math.max(0, 1 - dd.timer / 1.5);
    const offsetY = -dd.timer * 40;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = dd.color;
    ctx.font = 'bold 28px monospace';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeText(dd.text, dd.x - 30, dd.y + offsetY);
    ctx.fillText(dd.text, dd.x - 30, dd.y + offsetY);
    ctx.globalAlpha = 1;
  }

  // 战斗日志（右侧）
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(460, 200, 250, 150);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.strokeRect(460, 200, 250, 150);
  battleState.log.forEach((entry, i) => {
    ctx.fillStyle = entry.color;
    ctx.font = '11px monospace';
    ctx.fillText(entry.text, 468, 218 + i * 22);
  });

  // 技能选择UI（底部）
  drawBattleSkillUI(ctx);

  // 结果界面
  if (battleState.animPhase === 'result') {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 32px monospace';
    ctx.fillText(battleState.resultMsg, 360 - ctx.measureText(battleState.resultMsg).width / 2, 250);
    ctx.fillStyle = '#fff';
    ctx.font = '14px monospace';
    ctx.fillText('奖励已发放！败者休息1小时', 360 - 110, 285);

    // 按钮
    drawBattleResultBtn(ctx, '🔄 再来一局', 280, 320, () => { exitBattle(); battlePetTeam = {}; setTimeout(() => showBattleSelect(), 100); });
    drawBattleResultBtn(ctx, '🚪 退出', 420, 320, () => { exitBattle(); battlePetTeam = {}; });
  }
}

// 圆角矩形辅助
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Canvas点击 → 映射到战斗UI按钮
const _origHandleClick = window.handleClick;
window.handleClick = function(mx, my) {
  // 战斗技能/目标按钮点击
  if (battleState && battleState.animPhase === 'skillSelect' && battleState.skillBtns) {
    for (const btn of battleState.skillBtns) {
      if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
        doBattleSkill(btn.skillKey);
        return;
      }
    }
  }

  if (battleState && battleState.animPhase === 'targeting' && battleState.targetBtns) {
    for (const btn of battleState.targetBtns) {
      if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
        doBattleTarget(btn.petId);
        return;
      }
    }
  }

  if (battleState && battleState.animPhase === 'result' && window._battleResultBtns) {
    for (const btn of window._battleResultBtns) {
      if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
        btn.onclick();
        window._battleResultBtns = [];
        return;
      }
    }
  }

  // 传递原始点击
  if (_origHandleClick) _origHandleClick(mx, my);
};

  if (!pet) return;
  // 找宠物当前位置作为起点
  const petX = pet.scenePos ? pet.scenePos.x : 360;
  const petY = pet.scenePos ? pet.scenePos.y : 350;

  ballGame = {
    pet: pet,
    petX: petX,
    petY: petY,
    petTargetX: petX,
    petTargetY: petY,
    ball: { x: petX, y: petY - 30, vx: 0, vy: 0, thrown: false, landed: false, landX: 0, landY: 0 },
    state: 'aim',  // 'aim' | 'throw' | 'chase' | 'catch' | 'miss' | 'done'
    score: 0,
    throwsLeft: 5,
    dragStart: null,
    dragEnd: null,
    catchTimer: 0,
    missTimer: 0,
    resultTimer: 0,
    caught: false,
  };
  g.interactGame = 'ball';

function updateBallGame(dt) {
  if (!ballGame) return;
  const bg = ballGame;

  if (bg.state === 'aim') {
    // 等待拖拽
  } else if (bg.state === 'throw') {
    // 球飞行
    const b = bg.ball;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.vy += 600 * dt; // 重力
    // 地面碰撞
    const groundY = bg.petY;
    if (b.y >= groundY - 10) {
      b.y = groundY - 10;
      b.landed = true;
      b.landX = b.x;
      b.landY = b.y;
      bg.state = 'chase';
      bg.petTargetX = b.x;
      bg.petTargetY = b.y;
      playSound('pet');
    }
    // 出界
    if (b.x < 50 || b.x > 670 || b.y > 580) {
      bg.state = 'miss';
      bg.missTimer = 1.5;
    }
  } else if (bg.state === 'chase') {
    // 宠物追球
    const speed = 180;
    const dx = bg.petTargetX - bg.petX;
    const dy = bg.petTargetY - bg.petY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 5) {
      bg.petX += (dx / dist) * speed * dt;
      bg.petY += (dy / dist) * speed * dt;
      // 宠物朝向
      bg.pet.facingRight = dx > 0;
    } else {
      // 到达球位置
      if (bg.ball.landed) {
        // 球已落地，错过接球机会
        bg.state = 'miss';
        bg.missTimer = 1.0;
        bg.throwsLeft--;
        showToast(`球已落地，没接住... ${bg.throwsLeft}次机会`);
        playSound('warning');
        if (bg.throwsLeft <= 0) {
          bg.state = 'done';
          bg.resultTimer = 2.0;
        }
      } else {
        // 空中接住
        bg.state = 'catch';
        bg.catchTimer = 1.0;
        bg.caught = Math.random() < 0.85; // 85% 概率接住
      }
    }
  } else if (bg.state === 'catch') {
    bg.catchTimer -= dt;
    if (bg.catchTimer <= 0) {
      if (bg.caught) {
        bg.score++;
        bg.throwsLeft--;
        showToast(`接住了！${bg.throwsLeft}次机会`);
        playSound('levelUp');
      } else {
        bg.throwsLeft--;
        showToast(`没接住... ${bg.throwsLeft}次机会`);
        playSound('warning');
      }
      if (bg.throwsLeft <= 0) {
        bg.state = 'done';
        bg.resultTimer = 2.0;
      } else {
        // 重置到aim
        bg.ball.thrown = false;
        bg.ball.landed = false;
        bg.ball.x = bg.petX;
        bg.ball.y = bg.petY - 30;
        bg.state = 'aim';
      }
    }
  } else if (bg.state === 'miss') {
    bg.missTimer -= dt;
    if (bg.missTimer <= 0) {
      bg.throwsLeft--;
      showToast(`出界了... ${bg.throwsLeft}次机会`);
      if (bg.throwsLeft <= 0) {
        bg.state = 'done';
        bg.resultTimer = 2.0;
      } else {
        bg.ball.thrown = false;
        bg.ball.landed = false;
        bg.ball.x = bg.petX;
        bg.ball.y = bg.petY - 30;
        bg.state = 'aim';
      }
    }
  } else if (bg.state === 'done') {
    bg.resultTimer -= dt;
    if (bg.resultTimer <= 0) {
      endBallGame();
    }
  }
}

function endBallGame() {
  const bg = ballGame;
  if (!bg) return;
  // 结算奖励
  const bonus = bg.score * 2;
  const intimacyGain = bg.score * 10;
  g.intimacy = Math.min(100, g.intimacy + intimacyGain);
  addExp(bg.pet, bg.score * 5);
  g.hunger = Math.max(0, g.hunger - bg.score);
  showToast(`${bg.pet.name} 扔球结束！接住 ${bg.score} 个，亲密+${intimacyGain}`);
  playSound('levelUp');
  saveGame();
  ballGame = null;
  g.interactGame = null;
  selectedInteractPets = [];
}

// ─── 排球游戏 ────────────────────────────────────────────────────────
let volleyGame = null;
// volleyGame: {
//   pets: [pet1, pet2],
//   pos: [{x,y}, {x,y}],
//   ball: {x, y, vx, vy, dragging: bool},
//   state: 'serve' | 'fly' | 'hit' | 'miss' | 'done',
//   scores: [0, 0], serveSide: 0, rallyCount: 0,
//   winner: null, dragStart, dragEnd, catchTarget
// }

// 预测球在 t 秒后的位置（用于宠物拦截点计算）
function predictBallAt(ball, t, gravity, netX, netTop, groundY) {
  let x = ball.x, y = ball.y;
  let vx = ball.vx, vy = ball.vy;
  const dt = 0.03;
  for (let i = 0; i < Math.ceil(t / dt); i++) {
    vy += gravity * dt;
    x += vx * dt;
    y += vy * dt;
    // 天花板
    if (y < 30) { y = 30; vy = Math.abs(vy) * 0.6; }
    // 地面
    if (y > groundY - 12) { y = groundY - 12; vy = -Math.abs(vy) * 0.65; vx *= 0.75; }
    // 出界
    if (x < 15 || x > 705) break;
    // 触网
    if (x > netX - 12 && x < netX + 12 && y > netTop) break;
  }
  return { x, y };
}

function startVolleyballGame() {
  closeOverlay();
  if (selectedInteractPets.length !== 2) return;
  initAudio();
  playSound('pet');

  const pet1 = g.pets.find(p => p.id === selectedInteractPets[0]);
  const pet2 = g.pets.find(p => p.id === selectedInteractPets[1]);
  if (!pet1 || !pet2) return;

  volleyGame = {
    pets: [pet1, pet2],
    pos: [
      { x: 120, y: 420 },
      { x: 600, y: 420 }
    ],
    ball: { x: 120, y: 380, vx: 0, vy: 0, dragging: false },
    state: 'serve',
    scores: [0, 0],
    serveSide: 0, // 0=左半场先发
    rallyCount: 0,
    winner: null,
    dragStart: null,
    dragEnd: null,
    gravity: 600,
    netX: 360,
    netTop: 340,
    groundY: 470,
    winScore: 5,
  };
  g.interactGame = 'volleyball';
  resetBallToServer();
}

function resetBallToServer() {
  const vg = volleyGame;
  const server = vg.serveSide;
  const sx = server === 0 ? 120 : 600;
  vg.pos[server].x = sx;
  vg.pos[server].y = 420;
  vg.pos[1 - server].x = server === 0 ? 600 : 120;
  vg.pos[1 - server].y = 420;
  vg.ball.x = sx;
  vg.ball.y = 380;
  vg.ball.vx = 0;
  vg.ball.vy = 0;
  vg.ball.dragging = false;
  vg.state = 'serve';
  vg.dragStart = null;
  vg.dragEnd = null;
}

function updateVolleyball(dt) {
  if (!volleyGame) return;
  const vg = volleyGame;

  if (vg.state === 'done') return;

  // ── 智能接球目标：当球飞行时，预测拦截点 ──
  if ((vg.state === 'fly' || vg.state === 'hit') && !vg.ball.dragging) {
    const receiver = 1 - vg.serveSide;
    const rp = vg.pos[receiver];
    // 宠物到达 ball 位置的预估时间（按移动速度 200px/s）
    const distToBall = Math.sqrt((vg.ball.x - rp.x) ** 2 + (vg.ball.y - rp.y) ** 2);
    const timeToReach = Math.max(0.2, distToBall / 220);
    const predicted = predictBallAt(vg.ball, timeToReach, vg.gravity, vg.netX, vg.netTop, vg.groundY);
    // 接球目标：预测球位置，但 y 不低于 200（宠物能跳起来接）
    vg.catchTarget = vg.catchTarget || [null, null];
    vg.catchTarget[receiver] = {
      x: predicted.x,
      y: Math.max(200, Math.min(vg.groundY - 30, predicted.y))
    };
  }

  // 宠物自动移动到接球目标
  for (let i = 0; i < 2; i++) {
    const p = vg.pos[i];
    const target = vg.catchTarget && vg.catchTarget[i] ? vg.catchTarget[i] : null;
    if (target) {
      const dx = target.x - p.x;
      if (Math.abs(dx) > 5) {
        p.x += (dx > 0 ? 1 : -1) * Math.min(Math.abs(dx), 200 * dt);
      }
      const dy = target.y - p.y;
      if (Math.abs(dy) > 5) {
        p.y += (dy > 0 ? 1 : -1) * Math.min(Math.abs(dy), 150 * dt);
      }
      // 边界
      if (i === 0) {
        p.x = Math.max(50, Math.min(vg.netX - 40, p.x));
      } else {
        p.x = Math.max(vg.netX + 40, Math.min(670, p.x));
      }
      // 宠物可跳起接球：y 下限从 350 改为 200（数值越小跳得越高）
      p.y = Math.max(200, Math.min(vg.groundY - 30, p.y));
    }
  }

  if (vg.state === 'serve') {
    // 等待拖拽发球
  } else if (vg.state === 'fly') {
    const b = vg.ball;
    b.vy += vg.gravity * dt;
    b.x += b.vx * dt;
    b.y += b.vy * dt;

    // 地面反弹
    if (b.y >= vg.groundY - 12) {
      b.y = vg.groundY - 12;
      b.vy = -Math.abs(b.vy) * 0.65;
      b.vx *= 0.75;
      playSound('pet');
      if (Math.abs(b.vy) < 60) {
        // 球停了，对方得分
        vg.state = 'miss';
        const loser = b.x < vg.netX ? 0 : 1;
        setTimeout(() => scorePointVolley(1 - loser), 800);
        return;
      }
    }

    // 天花板
    if (b.y < 30) {
      b.y = 30;
      b.vy = Math.abs(b.vy) * 0.6;
    }

    // 出界
    if (b.x < 15 || b.x > 705) {
      vg.state = 'miss';
      const loser = b.x < vg.netX ? 0 : 1;
      setTimeout(() => scorePointVolley(1 - loser), 800);
      return;
    }

    // 触网
    if (b.x > vg.netX - 12 && b.x < vg.netX + 12 && b.y > vg.netTop) {
      vg.state = 'miss';
      const loser = b.x < vg.netX ? 0 : 1;
      setTimeout(() => scorePointVolley(1 - loser), 800);
      return;
    }

    // 对方宠物接球检测
    const receiver = 1 - vg.serveSide;
    const rp = vg.pos[receiver];
    const dx = b.x - rp.x;
    const dy = b.y - (rp.y - 15);
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 38 && b.vy > -50) {
      // 接住了！反弹回去
      vg.state = 'hit';
      vg.rallyCount++;
      playSound('pet');
      // 计算反弹方向：向对方半场打
      const targetX = receiver === 0 ? 550 : 170;
      const angle = Math.atan2(-200, (targetX - rp.x));
      const speed = 250 + Math.random() * 80;
      b.vx = Math.cos(angle) * speed * (receiver === 0 ? 1 : -1);
      b.vy = Math.sin(angle) * speed;
      // 交换发球方
      vg.serveSide = receiver;
      vg.state = 'fly';
      // 设定接球目标为发球方（接完球要去接下一次）
      vg.catchTarget = [null, null];
      vg.catchTarget[vg.serveSide] = { x: vg.serveSide === 0 ? 120 : 600, y: 400 };
      vg.catchTarget[1 - vg.serveSide] = { x: vg.serveSide === 0 ? 550 : 170, y: 380 + Math.random() * 60 };
    }

    // 自己接自己的球？（漏接）
    const server = vg.serveSide;
    const sp = vg.pos[server];
    const sdx = b.x - sp.x;
    const sdy = b.y - (sp.y - 15);
    const sdist = Math.sqrt(sdx * sdx + sdy * sdy);
    if (sdist < 38 && b.vy > -50 && vg.rallyCount === 0) {
      // 发球失误，直接丢分
      vg.state = 'miss';
      setTimeout(() => scorePointVolley(1 - server), 800);
    }
  } else if (vg.state === 'hit') {
    // 球飞行中，等待下一次接球或得分
    const b = vg.ball;
    b.vy += vg.gravity * dt;
    b.x += b.vx * dt;
    b.y += b.vy * dt;

    if (b.y >= vg.groundY - 12) {
      b.y = vg.groundY - 12;
      b.vy = -Math.abs(b.vy) * 0.65;
      b.vx *= 0.75;
      playSound('pet');
      if (Math.abs(b.vy) < 60) {
        vg.state = 'miss';
        const loser = b.x < vg.netX ? 0 : 1;
        setTimeout(() => scorePointVolley(1 - loser), 800);
        return;
      }
    }
    if (b.y < 30) { b.y = 30; b.vy = Math.abs(b.vy) * 0.6; }
    if (b.x < 15 || b.x > 705) {
      vg.state = 'miss';
      const loser = b.x < vg.netX ? 0 : 1;
      setTimeout(() => scorePointVolley(1 - loser), 800);
      return;
    }
    if (b.x > vg.netX - 12 && b.x < vg.netX + 12 && b.y > vg.netTop) {
      vg.state = 'miss';
      const loser = b.x < vg.netX ? 0 : 1;
      setTimeout(() => scorePointVolley(1 - loser), 800);
      return;
    }

    // 接球检测
    const receiver = 1 - vg.serveSide;
    const rp = vg.pos[receiver];
    const dx = b.x - rp.x;
    const dy = b.y - (rp.y - 15);
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 38 && b.vy > -50) {
      vg.state = 'hit';
      vg.rallyCount++;
      playSound('pet');
      const targetX = receiver === 0 ? 550 : 170;
      const angle = Math.atan2(-200, (targetX - rp.x));
      const speed = 280 + Math.random() * 80;
      b.vx = Math.cos(angle) * speed * (receiver === 0 ? 1 : -1);
      b.vy = Math.sin(angle) * speed;
      vg.serveSide = receiver;
      vg.catchTarget = [null, null];
      vg.catchTarget[vg.serveSide] = { x: vg.serveSide === 0 ? 120 : 600, y: 400 };
      vg.catchTarget[1 - vg.serveSide] = { x: vg.serveSide === 0 ? 550 : 170, y: 380 + Math.random() * 60 };
    }
  }
}

function scorePointVolley(winnerIdx) {
  const vg = volleyGame;
  if (!vg || vg.state === 'done') return;
  vg.scores[winnerIdx]++;
  playSound('warning');

  if (vg.scores[winnerIdx] >= vg.winScore) {
    vg.winner = winnerIdx;
    vg.state = 'done';
    showToast(`🏆 ${vg.pets[winnerIdx].name} 获胜！`);
    addExp(vg.pets[winnerIdx], 20);
    addExp(vg.pets[1 - winnerIdx], 8);
    saveGame();
  } else {
    showToast(`${vg.pets[winnerIdx].name} 得一分！${vg.scores[0]}-${vg.scores[1]}`);
    // 丢分方发球
    vg.serveSide = 1 - winnerIdx;
    vg.rallyCount = 0;
    vg.catchTarget = [null, null];
    setTimeout(() => {
      if (volleyGame) resetBallToServer();
    }, 1000);
  }
}

function endVolleyballGame() {
  volleyGame = null;
  g.interactGame = null;
  selectedInteractPets = [];
}

function drawVolleyballGame(ctx) {
  if (!volleyGame) return;
  const vg = volleyGame;

  // 天空
  ctx.fillStyle = '#1a2a4a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 地面
  ctx.fillStyle = '#2a6a2a';
  ctx.fillRect(0, vg.groundY, canvas.width, canvas.height - vg.groundY);
  ctx.fillStyle = '#3a8a3a';
  ctx.fillRect(0, vg.groundY, canvas.width, 6);

  // 场地线
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.strokeRect(20, vg.groundY + 5, 680, 96);

  // 网
  ctx.fillStyle = '#bbb';
  ctx.fillRect(vg.netX - 2, vg.netTop - 5, 4, vg.groundY - vg.netTop + 5);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  for (let ny = vg.netTop; ny < vg.groundY; ny += 18) {
    ctx.beginPath();
    ctx.moveTo(vg.netX - 18, ny);
    ctx.lineTo(vg.netX + 18, ny);
    ctx.stroke();
  }

  // 分数
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px monospace';
  ctx.fillText(`${vg.pets[0].name}: ${vg.scores[0]}`, 40, 38);
  ctx.fillText(`${vg.pets[1].name}: ${vg.scores[1]}`, 480, 38);
  ctx.font = '13px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText(`回合 ${vg.rallyCount}`, 310, 38);

  // 发球提示
  if (vg.state === 'serve') {
    const server = vg.serveSide;
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 14px monospace';
    ctx.fillText(`拖动球发球 →`, vg.pos[server].x - 50, vg.pos[server].y - 65);
  }

  // 拖拽预览轨迹
  if (vg.dragStart && vg.dragEnd && vg.state === 'serve') {
    const ds = vg.dragStart;
    const de = vg.dragEnd;
    const dx = de.x - ds.x;
    const dy = de.y - ds.y;
    const power = Math.min(Math.sqrt(dx * dx + dy * dy) * 2.5, 500);
    const angle = Math.atan2(dy, dx);

    // 预测轨迹点
    ctx.strokeStyle = 'rgba(255,200,0,0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    let px = vg.ball.x, py = vg.ball.y;
    let pvx = Math.cos(angle) * power;
    let pvy = Math.sin(angle) * power;
    ctx.moveTo(px, py);
    for (let t = 0; t < 40; t++) {
      pvy += vg.gravity * 0.03;
      px += pvx * 0.03;
      py += pvy * 0.03;
      if (py > vg.groundY - 12) break;
      if (px < 10 || px > 710) break;
      ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // 箭头
    ctx.fillStyle = '#FF6600';
    ctx.beginPath();
    ctx.arc(de.x, de.y, 7, 0, Math.PI * 2);
    ctx.fill();
  }

  // 宠物
  for (let i = 0; i < 2; i++) {
    const petCanvas = getPetSpriteCanvas(vg.pets[i]);
    if (petCanvas) {
      ctx.save();
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(petCanvas, vg.pos[i].x - 24, vg.pos[i].y - 48, 48, 48);
      ctx.restore();
    }
    ctx.fillStyle = STAR_COLORS[vg.pets[i].star] || '#aaa';
    ctx.font = '11px monospace';
    ctx.fillText(vg.pets[i].name, vg.pos[i].x - 22, vg.pos[i].y - 52);
  }

  // 排球
  const b = vg.ball;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(b.x, b.y, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(b.x - 12, b.y);
  ctx.lineTo(b.x + 12, b.y);
  ctx.moveTo(b.x, b.y - 12);
  ctx.lineTo(b.x, b.y + 12);
  ctx.stroke();

  // 提示
  if (vg.state === 'done') {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 28px monospace';
    ctx.fillText(`🏆 ${vg.pets[vg.winner].name} 获胜！`, 180, 260);
    ctx.font = '15px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('点击任意处结束', 280, 300);
  }
}

// 排球拖拽发球
function onVolleyDragStart(x, y) {
  if (!volleyGame || volleyGame.state !== 'serve') return;
  const vg = volleyGame;
  const b = vg.ball;
  const dx = x - b.x, dy = y - b.y;
  if (Math.sqrt(dx * dx + dy * dy) < 35) {
    vg.ball.dragging = true;
    vg.dragStart = { x, y };
    vg.dragEnd = { x, y };
  }
}

function onVolleyDragMove(x, y) {
  if (!volleyGame || !volleyGame.ball.dragging) return;
  volleyGame.dragEnd = { x, y };
}

function onVolleyDragEnd() {
  if (!volleyGame || !volleyGame.ball.dragging) return;
  const vg = volleyGame;
  const ds = vg.dragStart;
  const de = vg.dragEnd;
  if (ds && de) {
    const dx = de.x - ds.x;
    const dy = de.y - ds.y;
    const power = Math.min(Math.sqrt(dx * dx + dy * dy) * 2.5, 500);
    const angle = Math.atan2(dy, dx);
    vg.ball.vx = Math.cos(angle) * power;
    vg.ball.vy = Math.sin(angle) * power;
    vg.state = 'fly';
    // 设定接球目标
    const receiver = 1 - vg.serveSide;
    vg.catchTarget = [null, null];
    vg.catchTarget[receiver] = { x: receiver === 0 ? 200 + Math.random() * 200 : 320 + Math.random() * 200, y: 380 + Math.random() * 60 };
    playSound('pet');
  }
  vg.ball.dragging = false;
  vg.dragStart = null;
  vg.dragEnd = null;
}

function doFeedItem(type) {
  // type: 'treat', 'fruit', 'worm'
  if (g.feedCdLeft > 0) {
    showToast(`喂食冷却 ${Math.ceil(g.feedCdLeft)}秒`);
    return;
  }

  if (type === 'treat') {
    if (g.inventory.treat <= 0) {
      showToast('没有神秘饲料了！');
      return;
    }
    g.inventory.treat--;
    g.hunger = Math.min(100, g.hunger + 40);
    g.intimacy = Math.min(100, g.intimacy + 15);
    g.hatchPct = Math.min(100, g.hatchPct + 5);
    playSound('feedTreat');
    showToast('神秘饲料！饥饿+40 亲密度+15');
  } else if (type === 'fruit') {
    if (g.inventory.fruit <= 0) {
      showToast('没有水果了！');
      return;
    }
    g.inventory.fruit--;
    g.hunger = Math.min(100, g.hunger + 25);
    g.intimacy = Math.min(100, g.intimacy + 8);
    g.hatchPct = Math.min(100, g.hatchPct + 2);
    playSound('feedFruit');
    showToast('水果！饥饿+25 亲密度+8');
  } else if (type === 'worm') {
    if (g.inventory.worm <= 0) {
      showToast('没有虫子了！');
      return;
    }
    g.inventory.worm--;
    g.hunger = Math.min(100, g.hunger + 15);
    g.intimacy = Math.min(100, g.intimacy + 4);
    playSound('feedWorm');
    showToast('虫子！饥饿+15 亲密度+4');
  }

  if (g.currentPet) addExp(g.currentPet, 8);
  g.feedCdLeft = FEED_COOLDOWN;
  updateBtnUI();
  saveGame();
}

// ─── 图鉴记录 ────────────────────────────────────────────────
const PET_TYPE_NAMES = ['猫', '狗', '兔子', '狐狸', '鼠', '龙', '鸟', '熊'];

function getPetType(pet) {
  let h = 0;
  for (let i = 0; i < pet.name.length; i++) h = (h * 31 + pet.name.charCodeAt(i)) & 0xFFFF;
  return h % 8;
}

function recordDiscovery(pet) {
  const typeIdx = getPetType(pet);
  if (!g.discoveredTypes.includes(typeIdx)) g.discoveredTypes.push(typeIdx);
  (pet.genes || []).forEach(gene => {
    if (!g.discoveredGenes.includes(gene)) g.discoveredGenes.push(gene);
  });
}

const PET_EMOJI = ['🐱', '🐶', '🐰', '🦊', '🐭', '🐉', '🐦', '🐻'];

// 基因说明
function getGeneDesc(gk) {
  const descs = {
    fire: '孵化加速',
    water: '成长加速',
    grass: '抗寒增强',
    electric: '充电加速',
    ice: '抗热增强',
    dark: '夜间加成',
    light: '白天加成',
    wind: '移动加速',
    earth: '防御增强',
    metal: '寿命延长',
  };
  return descs[gk] || '未知';
}

function drawPetSprite(canvas, pet, animTime) {
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, 48, 48);

  const t = animTime || 0;
  // 动画时间戳（秒）
  const breathe = Math.sin(t * 2.5) * 1.5;     // 呼吸：上下浮动
  const tailSwing = Math.sin(t * 3.5) * 2;       // 尾巴：左右摇摆
  const earWiggle = Math.sin(t * 5) * 1.5;       // 耳朵：快速抖动（兔子）
  // 眨眼：每4秒眨一次，持续0.15秒
  const blinkCycle = t % 4;
  const isBlinking = blinkCycle > 3.85;

  // Generate colors and type from pet name + genes
  const hash = (s) => { let h = 0; for (let i = 0; i < s.length; i++) h = (h*31 + s.charCodeAt(i)) & 0xFFFF; return h; };
  const h = hash(pet.name);

  // Pet type: 0=猫, 1=狗, 2=兔子, 3=狐狸, 4=鼠, 5=龙, 6=鸟, 7=熊
  const petType = h % 8;
  const hue = (h * 7) % 360;

  // 基因颜色融合
  let geneHue = hue;
  let geneSat = 55;
  let geneLit = 55;
  if (pet.genes && pet.genes.length > 0) {
    const geneHues = pet.genes.map(gk => {
      const g = GENES[gk];
      // 从基因颜色提取色相
      if (gk === 'fire') return 15;
      if (gk === 'water') return 210;
      if (gk === 'grass') return 120;
      if (gk === 'electric') return 50;
      if (gk === 'ice') return 190;
      if (gk === 'dark') return 270;
      if (gk === 'light') return 50;
      if (gk === 'wind') return 150;
      if (gk === 'earth') return 35;
      if (gk === 'metal') return 200;
      return 0;
    });
    geneHue = geneHues[0];
    if (pet.genes.length > 1) geneSat = 70; // 双基因更鲜艳
  }

  const bodyColor = `hsl(${geneHue},${geneSat}%,55%)`;
  const darkColor = `hsl(${geneHue},${geneSat}%,35%)`;
  const lightColor = `hsl(${geneHue},${geneSat}%,75%)`;

  const cx = 24, cy = 26 + breathe; // 呼吸影响全身位置

  // ========== 尾巴 ==========
  const tailOff = Math.round(tailSwing);
  if (petType === 0) {
    // 猫尾巴 (弯曲上扬+摇摆)
    ctx.fillStyle = bodyColor;
    ctx.fillRect(cx + 10 + tailOff, cy + 2, 4, 6);
    ctx.fillRect(cx + 12 + tailOff, cy - 2, 4, 6);
    ctx.fillRect(cx + 14 + tailOff, cy - 6, 3, 5);
    ctx.fillStyle = lightColor;
    ctx.fillRect(cx + 15 + tailOff, cy - 4, 2, 3);
  } else if (petType === 1) {
    // 狗尾巴 (短小摇尾)
    ctx.fillStyle = bodyColor;
    ctx.fillRect(cx + 8 + tailOff, cy - 2, 5, 4);
    ctx.fillRect(cx + 11 + tailOff, cy - 5, 4, 4);
    ctx.fillStyle = lightColor;
    ctx.fillRect(cx + 13 + tailOff, cy - 4, 2, 3);
  } else if (petType === 2) {
    // 兔子尾巴 (圆球+摇摆)
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx + 10 + tailOff, cy + 6, 6, 6);
    ctx.fillStyle = bodyColor;
    ctx.fillRect(cx + 11 + tailOff, cy + 7, 4, 4);
  } else if (petType === 3) {
    // 狐狸尾巴 (大毛茸茸+摇摆)
    ctx.fillStyle = bodyColor;

    // 鼠小鼻+胡须
    ctx.fillStyle = '#FFB6C1';
    ctx.fillRect(cx - 1, headY + 3, 2, 2);
  } else if (petType === 5) {
    // 龙鼻 (宽)
    ctx.fillStyle = darkColor;
    ctx.fillRect(cx - 3, headY + 3, 6, 3);
    ctx.fillStyle = '#FF4500';
    ctx.fillRect(cx - 1, headY + 4, 2, 1);
  } else if (petType === 6) {
    // 鸟喙已画在头部，无额外嘴
  } else if (petType === 7) {
    // 熊鼻 (大圆)
    ctx.fillStyle = '#222';
    ctx.fillRect(cx - 2, headY + 3, 4, 3);
    ctx.fillStyle = lightColor;
    ctx.fillRect(cx - 1, headY + 4, 2, 1);
  } else {
    // 兔子三瓣嘴
    ctx.fillStyle = '#FFB6C1';
    ctx.fillRect(cx - 1, headY + 4, 2, 2);
    ctx.fillStyle = darkColor;
    ctx.fillRect(cx - 2, headY + 6, 1, 2);
    ctx.fillRect(cx + 1, headY + 6, 1, 2);
  }

  // 腮红
  ctx.fillStyle = 'rgba(255,182,193,0.5)';
  ctx.fillRect(cx - 11, headY + 1, 3, 2);
  ctx.fillRect(cx + 8, headY + 1, 3, 2);
}

// ─── Save / Load ────────────────────────────────────────────────
function saveGame() {
  const data = {
    temp: g.temp, hatchPct: g.hatchPct, intimacy: g.intimacy,
    power: g.power, heatOn: g.heatOn, iceOn: g.iceOn, time: g.time,
    isDay: g.isDay, inventory: g.inventory, pets: g.pets,
    petCdLeft: g.petCdLeft, feedCdLeft: g.feedCdLeft, forageCdLeft: g.forageCdLeft,
    hunger: g.hunger, currentPet: g.currentPet,
    dayCount: g.dayCount, nextHatchDay: g.nextHatchDay,
    lastSave: Date.now()
  };
  try {
    localStorage.setItem('hatchgame_save', JSON.stringify(data));
  } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem('hatchgame_save');
    if (!raw) return;
    const data = JSON.parse(raw);
    Object.assign(g, data);
    // Restore currentPet reference (since JSON.parse creates new objects)
    if (g.currentPet && g.pets.length > 0) {
      const cp = g.pets.find(p => p.name === g.currentPet.name && p.day === g.currentPet.day);
      if (cp) g.currentPet = cp;
      else g.currentPet = g.pets[g.pets.length - 1];
    }
    // 确保 currentPet.genes 也是数组
    if (g.currentPet && !Array.isArray(g.currentPet.genes)) {
      g.currentPet.genes = [];
    }
    // 旧存档升级：补全新宠物字段
    g.pets.forEach(p => {
      if (p.star === undefined) p.star = 1;
      if (p.level === undefined) p.level = 1;
      if (p.exp === undefined) p.exp = 0;
      if (!Array.isArray(p.genes)) p.genes = []; // 确保是数组
      if (p.generation === undefined) p.generation = 1;
      if (p.father === undefined) p.father = null;
      if (p.mother === undefined) p.mother = null;
      if (p.breedCount === undefined) p.breedCount = 0;
      // 旧存档：补全多宠物场景位置和互动状态
      if (!p.scenePos) {
        p.scenePos = { x: 0, y: 0 }; // 网格自动排列
      }
      if (p.clickReaction === undefined) p.clickReaction = null;
      if (p.petMood === undefined) p.petMood = 'normal';
      if (!p.moodBubble || typeof p.moodBubble.timer !== 'number') {
        p.moodBubble = { show: false, timer: 0 };
      }
      // 战斗系统字段
      if (p.hp === undefined) p.hp = (p.star || 1) * 25;
      if (p.maxHp === undefined) p.maxHp = (p.star || 1) * 25;
      if (p.restUntil === undefined) p.restUntil = 0;
    });
    // 旧存档升级：补全道具栏
    if (!g.inventory.tools) {
      g.inventory.tools = { waterBucket:5, torch:5, flashlight:5, icePack:5, fan:5, soil:5, gem:5, bone:5, musicBox:5, brush:5, blanket:5 };
    }
    // Offline progress
    if (data.lastSave) {
      const offline = (Date.now() - data.lastSave) / 1000; // 秒
      const offlineMins = Math.min(offline / 60, 10); // 转换为分钟，最多10分钟离线
      g.temp = Math.max(TEMP_MIN, g.temp - offlineMins * 0.02);
      g.hatchPct = Math.min(100, g.hatchPct + offlineMins * 0.05);
      if (g.hunger !== undefined) {
        g.hunger = Math.max(0, g.hunger - offlineMins * 0.5); // 离线饥饿度下降
      }
    }
    // Handle old saves without nextHatchDay
    if (g.nextHatchDay === undefined) {
      g.nextHatchDay = 0;
    }
    // 旧存档升级：补全拖拽系统字段
    if (g.draggingPetId === undefined) g.draggingPetId = null;
    // 扫描已有宠物到图鉴
    g.pets.forEach(p => recordDiscovery(p));
    // 统一网格排列
    arrangePetsIso();
  } catch(e) {}
}

function drawDroppedFood() {

// ─── 宠物寻路捡食 ───────────────────────────────────────────────
function seekFood(pet) {
  if (g.droppedFood.length === 0) return;
  if (pet.interactAnim && pet.interactAnim.time > 0) return;

  // 找最近的未被其他宠物认领的食物（自己认领过的可以继续）
  let nearest = null, nearDist = Infinity;
  g.droppedFood.forEach(f => {
    if (f.claimedBy !== undefined && f.claimedBy !== pet.id) return;
    const dx = f.x - pet.scenePos.x;
    const dy = f.y - pet.scenePos.y;
    const d = dx * dx + dy * dy;
    if (d < nearDist) { nearDist = d; nearest = f; }
  });
  if (!nearest) return;

  const dist = Math.sqrt(nearDist);
  if (dist < 20) {
    const foodType = nearest.type;
    const gains = { worm: 15, fruit: 25, treat: 40 };
    g.hunger = Math.min(100, g.hunger + (gains[foodType] || 15));
    // 吃东西也涨孵化进度和亲密度
    const hatchGains = { worm: 0.5, fruit: 1, treat: 2 };
    g.hatchPct = Math.min(100, g.hatchPct + (hatchGains[foodType] || 0));
    g.intimacy = Math.min(100, g.intimacy + (foodType === 'treat' ? 3 : foodType === 'fruit' ? 2 : 1));
    // 吃地上食物也增加经验值
    const expGains = { treat: 5, fruit: 3, worm: 2 };
    addExp(pet, expGains[foodType] || 2);
    g.droppedFood = g.droppedFood.filter(f => f !== nearest);
    pet.clickReaction = { type: 'heart', time: 0 };
    showToast(`${pet.name} 吃了${foodType === 'worm' ? '虫子' : foodType === 'fruit' ? '水果' : '饲料'}！`);
    pet.wanderTarget = null;
    pet.wanderIdle = 1 + Math.random() * 2;
    pet.wanderTimer = pet.wanderIdle;
    saveGame();
    return;
  }

  // 认领该食物（用宠物ID标记，自己可见、其他宠物不可见）
  nearest.claimedBy = pet.id;
  pet.wanderTarget = { x: nearest.x, y: nearest.y };
  pet.wanderSpeed = 1.2;
  pet.wanderTimer = 999;
  if (nearest.x < pet.scenePos.x) pet.facingRight = false;
  else pet.facingRight = true;
}

// ─── 地面食物更新 ───────────────────────────────────────────────
function updateDroppedFood(dt) {
  g.droppedFood = g.droppedFood.filter(f => {
    f.timer -= dt;

    // 被认领但 timer 快到了还无人吃掉 → 释放让其他宠物尝试
    if (f.claimedBy !== undefined && f.timer < 50) {
      // 检查是否有宠物还在走向它
      const hasClaimer = g.pets.some(p =>
        p.wanderTarget &&
        Math.abs(p.wanderTarget.x - f.x) < 5 &&
        Math.abs(p.wanderTarget.y - f.y) < 5
      );
      if (!hasClaimer) f.claimed = false;
    }

    // 抛射 + 弹跳动画
    if (f.phase === 'fly') {
      f.offY += f.vY * dt;
      f.vY += 400 * dt; // 重力
      if (f.offY >= 0) { // 落到地面
        f.offY = 0;
        f.vY = -f.vY * 0.35;
        f.phase = Math.abs(f.vY) < 15 ? 'idle' : 'bounce';
      }
    } else if (f.phase === 'bounce') {
      f.offY += f.vY * dt;
      f.vY += 400 * dt;
      if (f.offY >= 0) {
        f.offY = 0;
        f.vY = -f.vY * 0.35;
        if (Math.abs(f.vY) < 15) { f.vY = 0; f.phase = 'idle'; }
      }
    }

    return f.timer > 0;
  });
}

function drawTextToCtx(targetCtx, x, y, text, color, scale) {
  if (text == null) return;
  targetCtx.fillStyle = color;
  const fontSize = Math.max(10, Math.floor(14 * scale));
  targetCtx.font = `${fontSize}px "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif`;
  targetCtx.textBaseline = 'top';
  targetCtx.fillText(text, Math.floor(x), Math.floor(y));
}

function drawSunMoonToCtx(targetCtx) {

  if (isDay) {

        targetCtx.beginPath(); targetCtx.arc(cx, cy, cr, 0, Math.PI * 2); targetCtx.fill();
      });
    }
  } else {
    targetCtx.fillStyle = '#FFFACD';
    targetCtx.beginPath(); targetCtx.arc(620, 70, 28, 0, Math.PI * 2); targetCtx.fill();
    targetCtx.fillStyle = '#E8E4B8';
    [[608, 60, 5], [628, 75, 4], [618, 82, 3], [632, 58, 3]].forEach(([mx, my, mr]) => {
      targetCtx.beginPath(); targetCtx.arc(mx, my, mr, 0, Math.PI * 2); targetCtx.fill();
    });

}

function drawIncubatorToCtx(targetCtx) {
  const ex = 360, ey = 270, ew = 180, eh = 120;
  targetCtx.fillStyle = '#3a3020';
  targetCtx.fillRect(ex - ew/2 - 4, ey - eh/2 - 4, ew + 8, eh + 8);
  targetCtx.fillStyle = '#2a2010';
  targetCtx.fillRect(ex - ew/2, ey - eh/2, ew, eh);
  targetCtx.fillStyle = 'rgba(255,200,100,0.08)';
  targetCtx.fillRect(ex - ew/2, ey - eh/2, ew, eh);
  targetCtx.strokeStyle = '#555';
  targetCtx.lineWidth = 2;
  targetCtx.strokeRect(ex - ew/2, ey - eh/2, ew, eh);
  targetCtx.fillStyle = '#4a3a20';
  targetCtx.fillRect(ex - ew/2 - 8, ey - eh/2 + eh - 20, ew + 16, 20);
  targetCtx.fillRect(ex - ew/2 - 8, ey - eh/2, 8, eh);
  targetCtx.fillRect(ex + ew/2, ey - eh/2, 8, eh);
}

function drawEggToCtx(targetCtx) {
  if (g.hatchPct >= 100 || g.isHatching) return;
  const ex = 360, ey = 270;
  const crack = Math.floor(g.hatchPct / 25);
  const eggW = 60, eggH = 82;
  targetCtx.save();
  targetCtx.imageSmoothingEnabled = false;
  // Egg body - 真正的椭圆蛋形
  for (let py = -eggH / 2; py < eggH / 2; py++) {
    const prog = py / (eggH / 2);
    let w;
    if (py < 0) {
      w = Math.floor(eggW / 2 * Math.sqrt(1 - prog * prog * 0.85));
    } else {
      w = Math.floor(eggW / 2 * Math.sqrt(1 - prog * prog * 0.95));
    }
    let col;
    if (py < -eggH / 4) {
      col = '#f8f0e0';
    } else if (py < 0) {
      col = '#f5e6c8';
    } else if (py < eggH / 4) {
      col = '#eed8a8';
    } else {
      col = '#e8d098';
    }
    targetCtx.fillStyle = col;
    targetCtx.fillRect(ex - w, ey + py, w * 2, 1);
  }
  // 斑点装饰
  targetCtx.fillStyle = 'rgba(180, 140, 80, 0.35)';
  const spots = [[-15, -25], [10, -15], [-5, 5], [18, -5], [-20, 10], [12, 20]];
  spots.forEach(([dx, dy]) => {
    const spotW = 5 + Math.abs(dx) % 3;
    targetCtx.fillRect(ex + dx - spotW / 2, ey + dy - spotW / 2, spotW, spotW);
  });
  // 高光
  targetCtx.fillStyle = 'rgba(255, 255, 240, 0.6)';
  targetCtx.fillRect(ex - 12, ey - eggH / 2 + 12, 6, 10);
  // Crack stages
  if (crack > 0) {
    targetCtx.fillStyle = '#5a4030';
    const cracks = [
      [[-8, -18], [2, -12]],
      [[-18, 0], [8, 6], [-6, 14]],
      [[-24, -6], [14, -10], [-12, 20], [2, -24]],
    ];
    cracks.slice(0, crack).forEach(crackGroup => {
      crackGroup.forEach(([cx, cy]) => {
        targetCtx.fillRect(ex + cx - 2, ey + cy - 2, 6, 4);
      });
    });
  }
  targetCtx.restore();
  // Progress bar
  const bx = ex - 60, by = ey + eggH / 2 + 12, bw = 120, bh = 10;
  targetCtx.fillStyle = '#222';
  targetCtx.fillRect(bx, by, bw, bh);
  targetCtx.fillStyle = g.hatchPct < 100 ? '#FFD700' : '#4CAF50';
  targetCtx.fillRect(bx, by, bw * g.hatchPct / 100, bh);
  drawTextToCtx(targetCtx, bx, by + 12, `孵化 ${Math.floor(g.hatchPct)}%`, P.dim, 1);
  // Days hint
  if (g.nextHatchDay > 0) {
    const daysLeft = g.nextHatchDay - g.dayCount;
    if (daysLeft > 0) drawTextToCtx(targetCtx, ex - 75, ey + eggH / 2 + 30, `还剩${daysLeft}天`, P.warn, 2);
    drawTextToCtx(targetCtx, ex - 64, ey + eggH / 2 + 55, `(${g.dayCount}天)`, P.dim, 2);
  }
}

function drawHatchingAnimToCtx(targetCtx) {
  if (!g.isHatching) return;
  const ex = 360, ey = 270;
  const t = g.hatchAnim;
  // Egg wobble
  const wobble = Math.sin(t * 20) * (3 + t * 5);
  targetCtx.save();
  targetCtx.imageSmoothingEnabled = false;
  // Glowing crack
  targetCtx.fillStyle = `rgba(255,220,100,${0.3 + t * 0.5})`;
  targetCtx.beginPath(); targetCtx.arc(ex + wobble, ey, 50 + t * 20, 0, Math.PI * 2); targetCtx.fill();
  targetCtx.fillStyle = '#f5e6c8';
  targetCtx.beginPath(); targetCtx.ellipse(ex + wobble, ey, 35, 45, 0, 0, Math.PI * 2); targetCtx.fill();
  // Flash
  if (t > 0.8) {
    const flash = (t - 0.8) / 0.2;
    targetCtx.fillStyle = `rgba(255,255,200,${flash * 0.8})`;
    targetCtx.beginPath(); targetCtx.ellipse(ex, ey, 60 + flash * 30, 70 + flash * 30, 0, 0, Math.PI * 2); targetCtx.fill();
  }
  targetCtx.restore();
}

// 在场景中绘制宠物到指定Context（支持多宠物独立状态）
// targetCtx: 目标画布上下文
// pet: 宠物对象
// x, y: 宠物在场景中的位置
// options: { isDragging, clickReaction, petMood, moodBubble }
function drawPetToCtx(targetCtx, pet, x, y, options) {
  if (!pet) return;

  const basePx = x, basePy = y;
  let scale = 1.33;
  const isDragging = options?.isDragging || false;
  const clickReaction = options?.clickReaction || null;
  const moodBubble = options?.moodBubble || { show: false };

  if (isDragging) scale = 1.33 * 1.15; // 拖拽时放大

  // 点击反应动画
  let offsetY = 0;
  if (clickReaction) {
    const t = clickReaction.time;
    const type = clickReaction.type;
    if (type === 'jump') {
      offsetY = -Math.sin(t * Math.PI) * 30;
    } else if (type === 'bounce') {
      const bounce = Math.abs(Math.sin(t * Math.PI * 3)) * (1 - t);
      offsetY = -bounce * 20;
    } else if (type === 'spin') {
      scale = 1.33 * (1 + Math.sin(t * Math.PI * 4) * 0.1);
    } else if (type === 'heart') {
      offsetY = Math.sin(t * Math.PI * 4) * 5;
    }
  }

  // 使用缓存的精灵 canvas
  const petCanvas = getPetSpriteCanvas(pet);

  // ─── 地面投影（先画） ───
  if (!isDragging) {
    const shadowW = 50 * scale * 0.5;
    const shadowH = 8 * scale * 0.5;
    const shadowY = basePy + 20;
    targetCtx.save();
    targetCtx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    targetCtx.beginPath();
    targetCtx.ellipse(basePx, shadowY, shadowW, shadowH, 0, 0, Math.PI * 2);
    targetCtx.fill();
    targetCtx.restore();
  }

  let walkBob = 0;
  if (pet.wanderTarget) {
    walkBob = Math.sin(g.lastTs / 120) * 2;
  }

  // Draw scaled pet to target canvas
  targetCtx.save();
  targetCtx.imageSmoothingEnabled = false;
  // 拖拽时添加阴影效果
  if (isDragging) {
    targetCtx.shadowColor = 'rgba(255, 105, 180, 0.5)';
    targetCtx.shadowBlur = 15;
  }
  targetCtx.drawImage(petCanvas, basePx - 24 * scale, basePy - 24 * scale + offsetY + walkBob, 48 * scale, 48 * scale);
  targetCtx.restore();

  // ─── 撒娇气泡（圆角矩形 + 三角尾巴） ───
  if (moodBubble.show) {
    const bubbleX = basePx + 30, bubbleY = basePy - 45;
    const bw = 80, bh = 24, r = 8;
    targetCtx.fillStyle = 'rgba(255,255,255,0.9)';
    targetCtx.beginPath();
    targetCtx.roundRect(bubbleX - bw/2, bubbleY - bh/2, bw, bh, r);
    targetCtx.fill();
    targetCtx.fillStyle = 'rgba(255,255,255,0.9)';
    targetCtx.beginPath();
    targetCtx.moveTo(bubbleX - 6, bubbleY + bh/2 - 2);
    targetCtx.lineTo(bubbleX, bubbleY + bh/2 + 8);
    targetCtx.lineTo(bubbleX + 6, bubbleY + bh/2 - 2);
    targetCtx.closePath();
    targetCtx.fill();
    const bubbleText = moodBubble.text || '摸摸我~';
    drawTextToCtx(targetCtx, bubbleX - bubbleText.length * 4, bubbleY - 6, bubbleText, '#FF69B4', 1);
  }

  // ─── 宠物上方标签（名字、星级、基因、等级） ───
  drawTextToCtx(targetCtx, basePx - 25, basePy - 48, pet.name, STAR_COLORS[pet.star] || '#aaa', 1);
  const geneStr = (pet.genes || []).map(gk => (GENES[gk] || {}).icon || '').join('');
  const extra = (geneStr ? ` ${geneStr}` : '');
  drawTextToCtx(targetCtx, basePx - 25, basePy - 70, `${pet.star}★ Lv${pet.level}${extra}`, '#aaa', 0.5);

  if (g.hunger < 30) {
    drawTextToCtx(targetCtx, basePx + 45, basePy - 20, '饿了!', P.danger, 1.5);
  }

  const expNext = EXP_TABLE[pet.level] || EXP_TABLE[10];
  const expCur = pet.level > 1 ? EXP_TABLE[pet.level - 1] : 0;
  const expProg = Math.max(0, Math.min(1, (pet.exp - expCur) / (expNext - expCur)));
  const barW = 50;
  targetCtx.fillStyle = P.barBg;
  targetCtx.fillRect(basePx - barW / 2, basePy - 56, barW, 4);
  targetCtx.fillStyle = '#90EE90';
  targetCtx.fillRect(basePx - barW / 2, basePy - 56, Math.floor(barW * expProg), 4);
}


// ─── Main Loop ──────────────────────────────────────────────────
function loop() {
  const now = Date.now();
  const dt = Math.min((now - g.lastTs) / 1000, 1);
  g.lastTs = now;

  update(dt);

  // 更新场景切换动画
  if (g.sceneTransition.active) {
    g.sceneTransition.progress += dt / 0.3; // 300ms过渡
    if (g.sceneTransition.progress >= 1) {
      g.sceneTransition.progress = 1;
      g.sceneTransition.active = false;
      g.currentScene = g.sceneTransition.to;
      saveGame();
    }
  }

  // Render (canvas 720x576)
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ─── 互动游戏渲染 ───
  if (g.interactGame === 'ball' && ballGame) {
    updateBallGame(dt);
    drawBallGame(ctx);
    requestAnimationFrame(loop);
    return;
  }
  if (g.interactGame === 'volleyball' && volleyGame) {
    updateVolleyball(dt);
    drawVolleyballGame(ctx);
    requestAnimationFrame(loop);
    return;
  }

  // ─── 宠物战斗渲染 ───
  if (battleState !== null) {
    updateBattle(dt);
    drawBattle(ctx);
    requestAnimationFrame(loop);
    return;
  }

  // ─── 滑动过渡渲染 ───
  if (g.sceneTransition.active) {
    const p = g.sceneTransition.progress;
    const ease = 1 - Math.pow(1 - p, 3); // ease-out cubic
    const toPets = g.sceneTransition.to === 'pets';

    // 旧场景和新场景的偏移量
    const oldOffset = Math.round((toPets ? ease : -ease) * canvas.width);
    const newOffset = Math.round((toPets ? (1 - ease) : -(1 - ease)) * canvas.width);

    // ── 旧场景 ──
    initTransCanvases();
    transOldCtx.clearRect(0, 0, canvas.width, canvas.height);
    if (g.sceneTransition.from === 'incubator') {
      drawBgToCtx(transOldCtx);
      drawIncubatorToCtx(transOldCtx);
      if (g.isHatching) drawHatchingAnimToCtx(transOldCtx);
      else drawEggToCtx(transOldCtx);
    } else {
      drawBgToCtx(transOldCtx);
      // 旧场景过渡：绘制所有宠物（depth sorted）
      if (g.pets.length > 0) {
        const sortedPets = [...g.pets].sort((a, b) => {
          const da = (a.isoCol || 0) + (a.isoRow || 0);
          const db = (b.isoCol || 0) + (b.isoRow || 0);
          if (da !== db) return da - db;
          return (a.isoCol || 0) - (b.isoCol || 0);
        });
        sortedPets.forEach(pet => {
          if (pet.scenePos) {
            const feetY = pet.scenePos.y - TILE_H / 2;
            drawPetToCtx(transOldCtx, pet, pet.scenePos.x, feetY, {
              isDragging: g.draggingPetId === pet.id
            });
          }
        });
      } else {
        drawTextToCtx(transOldCtx, 300, 260, '还没有宠物', P.dim, 2);
        drawTextToCtx(transOldCtx, 290, 290, '去孵蛋室孵化吧', P.dim, 1);
      }
    }
    ctx.drawImage(transOldCanvas, oldOffset, 0);

    // ── 新场景 ──
    transNewCtx.clearRect(0, 0, canvas.width, canvas.height);
    if (g.sceneTransition.to === 'incubator') {
      drawBgToCtx(transNewCtx);
      drawIncubatorToCtx(transNewCtx);
      if (g.isHatching) drawHatchingAnimToCtx(transNewCtx);
      else drawEggToCtx(transNewCtx);
    } else {
      drawBgToCtx(transNewCtx);
      // 新场景过渡：绘制所有宠物（depth sorted）
      if (g.pets.length > 0) {
        const sortedPets = [...g.pets].sort((a, b) => {
          const da = (a.isoCol || 0) + (a.isoRow || 0);
          const db = (b.isoCol || 0) + (b.isoRow || 0);
          if (da !== db) return da - db;
          return (a.isoCol || 0) - (b.isoCol || 0);
        });
        sortedPets.forEach(pet => {
          if (pet.scenePos) {
            const feetY = pet.scenePos.y - TILE_H / 2;
            drawPetToCtx(transNewCtx, pet, pet.scenePos.x, feetY, {
              isDragging: g.draggingPetId === pet.id
            });
          }
        });
      } else {
        drawTextToCtx(transNewCtx, 300, 260, '还没有宠物', P.dim, 2);
        drawTextToCtx(transNewCtx, 290, 290, '去孵蛋室孵化吧', P.dim, 1);
      }
    }
    ctx.drawImage(transNewCanvas, newOffset, 0);
  } else {
    // 先画地面（铺满整个 canvas，不受 translate 影响）
    drawIsoGround();

    // 游戏内容偏移（居中到 1280 画布）
    ctx.save();
    ctx.translate(CONTENT_OFFSET, 0);

    // 绘制太阳/月亮（固定位置，随内容偏移）
    drawSunMoon();
    // 绘制地面食物（在宠物和场景内容之前）
    drawDroppedFood();
    if (g.currentScene === 'incubator') {
      drawIncubator();
      if (g.isHatching) {
        drawHatchingAnim();
      } else {
        drawEgg();
      }
    } else {
      // 宠物间场景：绘制所有宠物
      if (g.pets.length > 0) {
        // 先绘制爱心粒子（所有宠物共享）
        g.heartParticles.forEach(p => {
          const hx = Math.floor(p.x), hy = Math.floor(p.y);
          const hs = Math.floor(p.size);
          if (p.isWater) {
            // 水花粒子：蓝色圆点
            ctx.fillStyle = `rgba(30, 144, 255, ${p.life * 0.8})`;
            ctx.beginPath();
            ctx.arc(hx, hy, hs * 0.5, 0, Math.PI * 2);
            ctx.fill();
          } else {
            // 爱心粒子：粉色
            ctx.fillStyle = `rgba(255, 105, 180, ${p.life})`;
            ctx.fillRect(hx - hs/2, hy - hs/4, hs/2, hs/4);
            ctx.fillRect(hx, hy - hs/4, hs/2, hs/4);
            ctx.fillRect(hx - hs/4, hy, hs/2, hs/2);
            ctx.fillRect(hx, hy, hs/2, hs/2);
          }
        });
        // 绘制道具粒子（彩色星星）
        toolParticles.forEach(p => {
          ctx.fillStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2, '0');
          const px = Math.floor(p.x), py = Math.floor(p.y);
          const ps = Math.floor(p.size);
          ctx.fillRect(px - ps/2, py - ps/2, ps, ps);
        });
        // 绘制每只宠物（按 isometric 深度排序：col+row 小的先画，同深度按 col 排）
        const sortedPets = [...g.pets].sort((a, b) => {
          const da = (a.isoCol || 0) + (a.isoRow || 0);
          const db = (b.isoCol || 0) + (b.isoRow || 0);
          if (da !== db) return da - db;
          return (a.isoCol || 0) - (b.isoCol || 0);
        });
        sortedPets.forEach(pet => {
          if (pet.scenePos) {
            // 脚底落在 isometric tile 顶端（tile center y - TILE_H/2）
            const feetY = pet.scenePos.y - TILE_H / 2;
            drawPet(pet, pet.scenePos.x, feetY, {
              isDragging: g.draggingPetId === pet.id,
              clickReaction: pet.clickReaction || null,
              petMood: pet.petMood || 'normal',
              moodBubble: pet.moodBubble || { show: false },
            });

            // 道具长按进度环
            if (g.toolMode && g.toolHold && g.toolHold.petId === pet.id && !g.toolHold.triggered) {
              const elapsed = (Date.now() - g.toolHold.startTime) / 1000;
              const progress = Math.min(elapsed / 0.5, 1);
              const cx = pet.scenePos.x, cy = pet.scenePos.y - 30;
              ctx.strokeStyle = 'rgba(255,215,0,0.8)';
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.arc(cx, cy, 28, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
              ctx.stroke();
              // 工具图标
              const t = TOOLS[g.toolMode.toolKey];
              ctx.font = '14px monospace';
              ctx.fillStyle = '#FFD700';
              ctx.textAlign = 'center';
              ctx.fillText(t.icon, cx, pet.scenePos.y - 58);
              ctx.textAlign = 'left';
            }
          }
        });
      } else {
        drawText('还没有宠物', 300, 260, P.dim, 2);
        drawText('去孵蛋室孵化吧', 290, 290, P.dim, 1);
      }
    }

    ctx.restore(); // 结束游戏内容偏移
  }

  // ─── 场景切换箭头（已迁移到 HTML 固定图标按钮，canvas 内不再绘制） ───
  // 旧箭头已隐藏，由 HTML 层的 #sceneNavLeft / #sceneNavRight 接管

  // 场景标签（顶部居中，在内容区上方）
  const sceneLabel = g.currentScene === 'incubator' ? '🥚 孵蛋室' : '🫂 宠物间';
  drawText(sceneLabel, CONTENT_OFFSET + 310, 8, '#aaa', 1);

  drawHUD();
  drawFeedInventory();

  // 每帧更新按钮UI（冷却时间等）
  updateBtnUI();

  requestAnimationFrame(loop);
}

// ─── Init ────────────────────────────────────────────────────────
loadGame();
updateBtnUI();
g.lastTs = Date.now();
loop();

// Auto-save every 30s
setInterval(saveGame, 30000);

// ─── 场景切换固定按钮 JS 事件绑定 ─────────────────────
document.getElementById('sceneNavLeft').addEventListener('click', function(e) {
  e.stopPropagation();
  console.log('[NavLeft] clicked, currentScene:', g.currentScene);
  doSceneSwitch('pets'); // 左按钮切到宠物间
});
document.getElementById('sceneNavRight').addEventListener('click', function(e) {
  e.stopPropagation();
  console.log('[NavRight] clicked, currentScene:', g.currentScene);
  doSceneSwitch('incubator'); // 右按钮切到孵蛋室
});
</script>
</html>
