<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>孵蛋像素版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: monospace;
  color: #fff;
}
#wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  max-width: 100vmin;
  gap: 8px;
}
#c {
  border: 4px solid #444;
  background: #0a0a0a;
  /* 优先填满宽度，aspect-ratio 自动算出高度 */
  width: min(1280px, 100vw);
  height: auto;
  aspect-ratio: 1280 / 800;
}
#btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 4px 8px;
  max-width: 100%;
}
.bt {
  background: #222;
  border: 3px solid #555;
  color: #fff;
  padding: 8px 10px;
  font-family: monospace;
  font-size: 13px;
  cursor: pointer;
  min-width: 70px;
  min-height: 44px;
  text-align: center;
  flex: 1 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.bt:hover { background: #333; border-color: #888; }
.bt:active { background: #444; transform: scale(0.96); }
.bt.off { border-color: #f55; color: #faa; }
.bt .cooldown { color: #888; font-size: 11px; }
/* 道具按钮悬停 */
#overlay button:not([disabled]):hover { background: #333 !important; border-color: #888 !important; }
#overlay button:active { background: #444 !important; transform: scale(0.96); }
/* 商店按钮 */
#shopBtn { position:fixed; top:8px; right:8px; z-index:20; background:rgba(30,30,30,0.9); border:2px solid #FFD700; color:#FFD700; font-family:monospace; font-size:13px; padding:7px 14px; cursor:pointer; border-radius:4px; }
#shopBtn:hover { background:rgba(60,50,10,0.95); }
/* 道具瞄准模式 */
#toolAimHint { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); z-index:20; background:rgba(0,0,0,0.8); color:#fff; font-family:monospace; font-size:12px; padding:6px 16px; border-radius:4px; display:none; pointer-events:none; }
#toolCancelBtn { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); z-index:20; background:rgba(80,30,30,0.9); border:2px solid #f55; color:#fff; font-family:monospace; font-size:12px; padding:6px 16px; cursor:pointer; border-radius:4px; display:none; }
/* 场景切换固定图标按钮 */
.sceneNavBtn { width:44px; height:44px; border-radius:50%; background:rgba(0,0,0,0.7); border:2px solid rgba(255,255,255,0.4); color:rgba(255,255,255,0.85); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s, border-color 0.15s, transform 0.1s; user-select:none; pointer-events:auto; }
.sceneNavBtn:hover { background:rgba(60,60,60,0.85); border-color:rgba(255,255,255,0.8); transform:scale(1.08); }
.sceneNavBtn:active { transform:scale(0.95); }
#sceneNavLeft { position:fixed; left:10px; top:50%; transform:translateY(-50%); z-index:20; pointer-events:auto; }
#sceneNavRight { position:fixed; right:10px; top:50%; transform:translateY(-50%); z-index:20; pointer-events:auto; }
@media (max-width: 500px) {
  .bt {
    min-width: 60px;
    min-height: 48px;
    padding: 6px 8px;
    font-size: 12px;
  }
  .bt .cooldown { font-size: 10px; }
}
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  z-index: 10;
  padding: 20px;
}
#overlay.show { display: flex; }
#overlay .msg {
  background: #1a1a2e;
  border: 3px solid #555;
  padding: 16px 20px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  font-size: 14px;

}
#overlay .msg .title { font-size: 16px; color: #FFD700; margin-bottom: 8px; }

#overlay button { padding: 10px 24px; font-family: monospace; font-size: 14px; min-height: 44px; }
#evt {
  position: fixed;
  top: max(env(safe-area-inset-top), 20px);
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a2e;
  border: 2px solid #FFD700;
  padding: 8px 16px;
  font-size: 13px;
  display: none;
  z-index: 20;
  text-align: center;
  max-width: min(300px, calc(100vw - 32px));
}
#evt.show { display: block; }
</style>

<div id="wrap">

  <div id="btns">

    <button class="bt" onclick="showToolSelect()">🧰 道具</button>

</div>
<div id="evt"></div>

<script>
// ─── Constants ──────────────────────────────────────────────────
const DAY_SEC = 600, NGT_SEC = 300, CYCLE = DAY_SEC + NGT_SEC;
const TEMP_MIN = 20, TEMP_MAX = 45, TEMP_OPT_MIN = 36.5, TEMP_OPT_MAX = 38.5;
const POWER_MAX = 100, HEAT_DRAIN = 2, POWER_DAY_REGEN = 150, POWER_NGT_REGEN = 75;
const HATCH_RATE = 1.5, HATCH_RATE_COLD = 0.5, HATCH_RATE_HOT = -1.0;
const PET_COOLDOWN = 5, FEED_COOLDOWN = 120, FORAGE_COOLDOWN = 30;
const INV_MAX = 10;
const PET_MAX = 20; // 宠物上限

// 基因类型
const GENES = {

// 道具系统
const TOOLS = {

  torch:       { name:'火把',  icon:'🔥', gene:'fire',     desc:'点火' },
  flashlight:  { name:'手电筒',icon:'🔦', gene:'light',     desc:'照光' },
  icePack:     { name:'冰袋',  icon:'❄️', gene:'ice',      desc:'降温' },
  fan:         { name:'吹风机',icon:'💨', gene:'wind',     desc:'吹风' },
  soil:        { name:'土壤',  icon:'🪨', gene:'earth',    desc:'松土' },
  gem:         { name:'宝石',  icon:'💎', gene:'metal',    desc:'闪耀' },

  brush:       { name:'梳子',  icon:'🪥', gene:null,       desc:'通用' },
  blanket:     { name:'毯子',  icon:'🛏️', gene:'dark',     desc:'保暖' },
};

// 宠物战斗技能系统
const SKILLS = {
  tackle:     { name:'撞击',   icon:'💥', power:30, category:'attack' },
  waterBlast: { name:'水炮',   icon:'🌊', power:50, category:'element', element:'water' },
  fireFang:   { name:'火焰牙', icon:'🔥', power:50, category:'element', element:'fire' },
  grassWhip:  { name:'藤鞭',   icon:'🌿', power:50, category:'element', element:'grass' },
  thunderBolt:{ name:'雷电',   icon:'⚡', power:50, category:'element', element:'electric' },
  iceShard:   { name:'冰息',   icon:'❄️', power:50, category:'element', element:'ice' },
  darkBall:   { name:'暗影球', icon:'🌑', power:50, category:'element', element:'dark' },
  lightRay:   { name:'光弹',   icon:'☀', power:50, category:'element', element:'light' },
  windBlade:  { name:'风刃',   icon:'🌀', power:50, category:'element', element:'wind' },
  rockFall:   { name:'落石',   icon:'🪨', power:50, category:'element', element:'earth' },
  metalStorm: { name:'铁壁',   icon:'⚙️', power:50, category:'element', element:'metal' },
  heal:        { name:'治愈',   icon:'💚', power:0,  category:'heal' },
};

// 星级颜色
const STAR_COLORS = ['', '#AAAAAA', '#DDDDDD', '#FFD700', '#FF69B4', '#FF4500'];

// 经验表：每等级需要的累计经验
const EXP_TABLE = [0, 100, 250, 500, 900, 1500, 2300, 3500, 5000, 7000, 10000];

// ─── Palette ────────────────────────────────────────────────────
const P = {
  skyDay: '#87CEEB', skyNgt: '#0d1b2a',
  sun: '#FFD700', moon: '#E0E0E0', star: '#FFFFFF',
  ground: '#8B4513',
  eggLight: '#FFF8DC', eggShd: '#D4A574', eggCrack: '#8B7355',
  incBase: '#8B0000', incLight: '#CD5C5C', flame: ['#FF4500','#FF8C00','#FFD700'],
  heart: '#FF69B4',
  tempHot: '#FF4500', tempCold: '#00BFFF',
  barBg: '#333', barFill: '#555',
  white: '#FFFFFF', black: '#000000',
  txt: '#FFFFFF', dim: '#AAAAAA',
  happy: '#90EE90', warn: '#FFA500', danger: '#FF4444',
  eggInt: '#FFE4B5',
  grassLight: '#7CFC00', grassDark: '#228B22',
  cloud: '#FFFFFF',
  starFull: '#FFD700', starEmpty: '#444444',
};

// ─── State ──────────────────────────────────────────────────────
let g = {
  temp: 25,           // °C
  hatchPct: 0,        // 0-100
  intimacy: 50,      // 0-100
  power: 80,         // 0-100
  heatOn: false,
  iceOn: false,      // 冰袋降温中
  time: 0,           // seconds in cycle
  isDay: true,
  petCdLeft: 0,
  feedCdLeft: 0,
  forageCdLeft: 0,
  hunger: 100,     // 饥饿度 0-100
  lastTs: Date.now(),
  inventory: { worm: 2, fruit: 1, treat: 0, tools: { waterBucket:5, torch:5, flashlight:5, icePack:5, fan:5, soil:5, gem:5, bone:5, musicBox:5, brush:5, blanket:5 } },
  droppedFood: [],           // 地上的食物 { x, y, type, timer }
  foodDropCd: 0,             // 扔食物冷却
  discoveredTypes: [],       // 已发现过的宠物类型索引
  discoveredGenes: [],       // 已发现过的基因名称
  eggs: [{ id: 1, temp: 25, hatch: 0, intimacy: 50 }],
  pets: [],
  nextHatchDay: 0,  // 第几天可以孵化下一只
  eventCooldown: 0,
  eventMsg: '',
  eventTimer: 0,
  crackStage: 0,      // 0-4 visual stage
  babyName: '',
  babyTraits: [],
  isHatching: false,
  hatchAnim: 0,
  powerRegenTimer: 0,
  feedTimer: 0,
  dayCount: 0,
  touchedToday: false,
  currentPet: null,  // 当前显示的宠物
  currentScene: 'incubator', // 'incubator' | 'pets'
  sceneTransition: { active: false, progress: 0, from: 'incubator', to: 'pets' },

  // ─── 宠物互动增强（全局状态） ───
  heartParticles: [],       // 爱心粒子特效（全局共享）

  // ─── 道具瞄准模式 ───
  toolMode: null,           // null | { toolKey, uses, maxUses }
  toolHold: null,           // null | { petId, startTime, triggered }

  // ─── 拖拽系统 ───
  draggingPetId: null,     // 当前正在拖拽的宠物ID
  dragMoved: false,         // 鼠标是否移动过（区分点击和拖拽）
  dragOffsetX: 0,          // 拖拽偏移X
  dragOffsetY: 0,          // 拖拽偏移Y

  // ─── 互动游戏系统 ───
  interactMode: null,      // null | 'selectPet' | 'selectGame' | 'ballGame'
  selectedInteractPet: null, // 选中的互动宠物
  interactGame: null,      // 'ball' | ...
};

// ─── 预分配的过渡 Canvas（性能优化） ───
let transOldCanvas = null;
let transNewCanvas = null;
let transOldCtx = null;
let transNewCtx = null;

function initTransCanvases() {
  if (!transOldCanvas) {
    transOldCanvas = document.createElement('canvas');
    transOldCanvas.width = canvas.width;
    transOldCanvas.height = canvas.height;
    transOldCtx = transOldCanvas.getContext('2d');
    transOldCtx.imageSmoothingEnabled = false;
  }
  if (!transNewCanvas) {
    transNewCanvas = document.createElement('canvas');
    transNewCanvas.width = canvas.width;
    transNewCanvas.height = canvas.height;
    transNewCtx = transNewCanvas.getContext('2d');
    transNewCtx.imageSmoothingEnabled = false;
  }
}

// ─── 宠物精灵缓存（性能优化：避免每帧重绘） ───
const petSpriteCache = new Map(); // petId -> { canvas, timestamp }

function getPetSpriteCanvas(pet) {
  if (!pet) return null;
  const cacheKey = pet.id;
  const cached = petSpriteCache.get(cacheKey);
  // 缓存10秒，超时重新绘制
  if (cached && Date.now() - cached.timestamp < 10000) {
    return cached.canvas;
  }
  // 创建新的精灵 canvas
  const canvas = document.createElement('canvas');
  canvas.width = 48;
  canvas.height = 48;
  drawPetSprite(canvas, pet, 0);
  petSpriteCache.set(cacheKey, { canvas, timestamp: Date.now() });
  return canvas;
}

// ─── Sound System ────────────────────────────────────────────────
let audioCtx = null;
let soundEnabled = true; // 音效开关，默认开启

// 初始化 AudioContext（需要用户交互后才能创建）
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

// 播放指定频率和时长的音调
function playTone(freq, duration, type = 'sine', volume = 0.3, startTime = 0) {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime + startTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + startTime);
  osc.stop(audioCtx.currentTime + startTime + duration);
}

// 播放和弦
function playChord(freqs, duration, type = 'sine', volume = 0.2) {
  if (!soundEnabled || !audioCtx) return;
  freqs.forEach(f => playTone(f, duration, type, volume));
}

// ─── 音效库 ──────────────────────────────────────────────────────

// 孵化成功 - 上升音阶 + 和弦
function soundHatch() {
  if (!audioCtx) initAudio();
  const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
  notes.forEach((n, i) => playTone(n, 0.3, 'sine', 0.25, i * 0.12));
  playChord([1047, 1319, 1568], 0.5, 'sine', 0.15, 0.4); // C6, E6, G6
}

// 喂食 - 根据食物类型不同音效
function soundFeed(type) {
  if (!audioCtx) initAudio();
  if (type === 'treat') {
    // 零食：清脆的"叮"声
    playTone(880, 0.1, 'sine', 0.3);
    playTone(1100, 0.15, 'sine', 0.2, 0.05);
  } else if (type === 'fruit') {
    // 水果：柔和的"噗"声
    playTone(440, 0.15, 'triangle', 0.25);
    playTone(330, 0.2, 'triangle', 0.2, 0.08);
  } else {
    // 虫子：有趣的"吱"声
    playTone(600, 0.08, 'square', 0.15);
    playTone(800, 0.1, 'square', 0.12, 0.06);
  }
}

// 抚摸 - 柔和的"噗"声
function soundPet() {
  if (!audioCtx) initAudio();
  playTone(300, 0.12, 'sine', 0.2);
  playTone(250, 0.15, 'sine', 0.15, 0.1);
}

// 合成成功 - 魔法般的闪烁声
function soundSynth(mutation = false) {
  if (!audioCtx) initAudio();
  if (mutation) {
    // 突变：惊喜的上滑音
    playTone(400, 0.1, 'sine', 0.25);
    playTone(600, 0.1, 'sine', 0.25, 0.08);
    playTone(900, 0.15, 'sine', 0.25, 0.16);
    playChord([900, 1120, 1350], 0.3, 'triangle', 0.15, 0.25);
  } else {
    // 普通合成：轻柔的上升音
    playTone(523, 0.15, 'sine', 0.2);
    playTone(659, 0.15, 'sine', 0.2, 0.12);
    playTone(784, 0.2, 'sine', 0.2, 0.24);
  }
}

// 觅食成功 - 轻快的"叮"声
function soundForage() {
  if (!audioCtx) initAudio();
  playTone(880, 0.08, 'sine', 0.25);
  playTone(1100, 0.1, 'sine', 0.2, 0.06);
  playTone(1320, 0.12, 'sine', 0.15, 0.12);
}

// 加热开启 - 温暖的启动声
function soundHeatOn() {
  if (!audioCtx) initAudio();
  playTone(150, 0.3, 'sawtooth', 0.15);
  playTone(200, 0.25, 'sawtooth', 0.12, 0.1);
}

// 冰敷开启 - 清凉的冰冻声
function soundIceOn() {
  if (!audioCtx) initAudio();

canvas.height = 800;

// 游戏内容横向偏移量（把 720 内容居中到 1280 画布）
const CONTENT_OFFSET = Math.round((canvas.width - 720) / 2); // 280px

// 获取画布坐标（支持鼠标和触摸）
function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  // rect.width/height 是显示尺寸，canvas.width/height 是实际像素尺寸
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  let clientX, clientY;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    clientX = e.changedTouches[0].clientX;
    clientY = e.changedTouches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

// 触摸事件辅助：获取指定触摸点
function getTouchPoint(e, index = 0) {
  if (e.touches && e.touches[index]) {
    return { clientX: e.touches[index].clientX, clientY: e.touches[index].clientY };
  }
  if (e.changedTouches && e.changedTouches[index]) {
    return { clientX: e.changedTouches[index].clientX, clientY: e.changedTouches[index].clientY };
  }
  return null;
}

// 画布点击检测（宠物列表 + 场景切换 + 宠物点击）
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  // ─── 扔球游戏结束点击 ───
  if (g.interactGame === 'ball' && ballGame && ballGame.state === 'done') {
    endBallGame();
    return;
  }

  // ─── 排球游戏结束点击 ───
  if (g.interactGame === 'volleyball' && volleyGame && volleyGame.state === 'done') {
    endVolleyballGame();
    return;
  }

  // ─── 宠物点击检测（支持多宠物，排除拖拽） ───
  if (!g.sceneTransition.active && g.draggingPetId === null && !g.dragMoved) {
    const petClickRadius = 70;
    let clickedPet = null;
    let clickedPetPos = null;

    // 遍历所有宠物检测点击
    for (const pet of g.pets) {
      if (!pet.scenePos) continue;
      const dx = mx - pet.scenePos.x;
      const dy = my - pet.scenePos.y;
      if (dx * dx + dy * dy <= petClickRadius * petClickRadius) {
        clickedPet = pet;
        clickedPetPos = pet.scenePos;
        break;
      }
    }

    if (clickedPet) {
      // 点击了宠物！触发互动
      initAudio();
      playSound('pet');

      // 增加亲密度
      g.intimacy = Math.min(100, g.intimacy + 3);
      g.lastInteractTime = Date.now();
      g.idleTime = 0;

      // 随机触发特效（设置在该宠物身上）
      const reactions = ['jump', 'heart', 'spin', 'bounce'];
      clickedPet.clickReaction = {
        type: reactions[Math.floor(Math.random() * reactions.length)],
        time: 0
      };

      // 发射爱心粒子（从宠物当前位置）
      for (let i = 0; i < 5; i++) {
        g.heartParticles.push({
          x: clickedPetPos.x + (Math.random() - 0.5) * 40,
          y: clickedPetPos.y - 20 + (Math.random() - 0.5) * 40,
          vx: (Math.random() - 0.5) * 2,

          size: 4 + Math.random() * 4

      // 短暂显示开心表情（设置在该宠物身上）
      clickedPet.petMood = 'happy';

      // 水性宠物：点击获得更多经验 + 水花特效
      const isWaterPet = clickedPet.genes && clickedPet.genes.includes('water');
      const expGain = isWaterPet ? 8 : 3;
      const moodTexts = isWaterPet
        ? ['好舒服~', '凉快！', '溅水啦~', '夏天就该这样！']
        : null;

      if (isWaterPet) {
        clickedPet.moodBubble = { show: true, timer: 2, text: moodTexts[Math.floor(Math.random() * moodTexts.length)] };
        // 水花粒子
        for (let i = 0; i < 10; i++) {
          g.heartParticles.push({
            x: clickedPetPos.x + (Math.random() - 0.5) * 50,
            y: clickedPetPos.y - 10 + (Math.random() - 0.5) * 30,

      updateBtnUI();
      saveGame();
      return;

// ─── Isometric Grid System ────────────────────────────────────────
// 等轴测 45 度俯视角，2:1 菱形格子
const ISO_COLS = 5, ISO_ROWS = 3;
const TILE_W = 80, TILE_H = 40;
const OX = 360, OY = 150; // 屏幕原点 — 45度俯视角，网格原点在画布中部，地面铺满整张画布

// 网格 (col, row) → 屏幕 (x, y)：tile 中心点
function isoToScreen(col, row) {
  return {
    x: (col - row) * (TILE_W / 2) + OX,
    y: (col + row) * (TILE_H / 2) + OY,
  };
}

// 屏幕 (x, y) → 网格 (col, row)
function screenToIso(sx, sy) {
  const x = sx - OX;
  const y = sy - OY;
  const col = Math.round((x / (TILE_W / 2) + y / (TILE_H / 2)) / 2);
  const row = Math.round((y / (TILE_H / 2) - x / (TILE_W / 2)) / 2);
  return { col, row };
}

// 按深度排序（col+row 越小越靠前，先画）
function isoDepth(col, row) {
  return col + row;
}

// ─── 等轴测地面（连续平面，无独立 tile 边界） ───
// 5×3 网格背面 = y≈100，网格正面 = y=220；向下延伸到 canvas 底 y=576
function drawIsoGround() {
  const isDay = g.isDay;

  // 地面铺满整张画布（独立于 OY，确保45度俯视角全屏地面）
  if (isDay) {
    ctx.fillStyle = '#3d8b37';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#1a4515';
    ctx.fillRect(0, canvas.height - 10, canvas.width, 10);
  } else {
    ctx.fillStyle = '#1f4a1f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0a120a';
    ctx.fillRect(0, canvas.height - 10, canvas.width, 10);
  }
}

// ─── 宠物场景等轴测地面（绘制到指定 ctx） ───
function drawIsoGroundToCtx(targetCtx) {
  const isDay = g.isDay;

  if (isDay) {
    targetCtx.fillStyle = '#3d8b37';
    targetCtx.fillRect(0, 0, canvas.width, canvas.height);
    targetCtx.fillStyle = '#1a4515';
    targetCtx.fillRect(0, canvas.height - 10, canvas.width, 10);
  } else {
    targetCtx.fillStyle = '#1f4a1f';
    targetCtx.fillRect(0, 0, canvas.width, canvas.height);
    targetCtx.fillStyle = '#0a120a';
    targetCtx.fillRect(0, canvas.height - 10, canvas.width, 10);
  }
}

// ─── 等轴测网格排列 ───
// 5×3 格子，最多 15 个位置，宠物的 isoCol/isoRow 决定其格子
function arrangePetsIso() {
  g.pets.forEach((pet, idx) => {
    if (!pet.scenePos) pet.scenePos = { x: 0, y: 0 };
    const col = idx % ISO_COLS;
    const row = Math.floor(idx / ISO_COLS);
    const pos = isoToScreen(col, row);
    pet.scenePos.x = pos.x;
    pet.scenePos.y = pos.y;
    pet.isoCol = col;
    pet.isoRow = row;
  });
}

// ─── 等轴测坐标吸附 ───
function snapPetToIsoGrid(pet) {
  if (!pet || !pet.scenePos) return;
  const { col, row } = screenToIso(pet.scenePos.x, pet.scenePos.y);
  const clampedCol = Math.max(0, Math.min(ISO_COLS - 1, col));
  const clampedRow = Math.max(0, Math.min(ISO_ROWS - 1, row));
  const pos = isoToScreen(clampedCol, clampedRow);
  pet.scenePos.x = pos.x;
  pet.scenePos.y = pos.y;
  pet.isoCol = clampedCol;
  pet.isoRow = clampedRow;
}

// ─── 宠物网格吸附系统 ───────────────────────────────────────────────

canvas.addEventListener('mouseup', () => {
  // ─── 扔球游戏：释放时抛球 ───
  if (g.interactGame === 'ball' && ballGame && ballGame.dragStart && ballGame.state === 'aim') {
    const bg = ballGame;
    const ds = bg.dragStart;
    const de = bg.dragEnd;
    if (ds && de) {
      const dx = de.x - ds.x;
      const dy = de.y - ds.y;
      // 拖拽距离越大，球飞得越远越快
      const power = Math.min(Math.sqrt(dx * dx + dy * dy) * 3, 600);
      const angle = Math.atan2(dy, dx);
      bg.ball.vx = Math.cos(angle) * power;
      bg.ball.vy = Math.min(dy * 3, -100); // 向上抛
      bg.ball.thrown = true;
      bg.state = 'throw';
    }
    bg.dragStart = null;
    bg.dragEnd = null;
    return;
  }

  // ─── 排球：释放发球 ───
  if (g.interactGame === 'volleyball' && volleyGame) {
    onVolleyDragEnd();
    return;
  }

  // ─── 道具长按取消 ───
  if (g.toolHold) {
    g.toolHold = null;
  }

  if (g.draggingPetId !== null) {
    const pet = g.pets.find(p => p.id === g.draggingPetId);
    if (pet) {
      // 拖拽结束：触发弹跳效果，重置游走状态
      if (g.dragMoved) {
        pet.clickReaction = { type: 'bounce', time: 0 };
        pet.wanderTarget = null;
        pet.wanderIdle = 2 + Math.random() * 3;
        pet.wanderTimer = pet.wanderIdle;
        saveGame();
      }
    }
    g.draggingPetId = null;
    canvas.style.cursor = 'default';
    saveGame();
  }
});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (g.interactGame === 'ball' && ballGame && ballGame.dragStart && ballGame.state === 'aim') {
    const bg = ballGame;
    const ds = bg.dragStart;
    const de = bg.dragEnd;
    if (ds && de) {
      const dx = de.x - ds.x;
      const dy = de.y - ds.y;
      const power = Math.min(Math.sqrt(dx * dx + dy * dy) * 3, 600);
      const angle = Math.atan2(dy, dx);
      bg.ball.vx = Math.cos(angle) * power;
      bg.ball.vy = Math.min(dy * 3, -100);
      bg.ball.thrown = true;
      bg.state = 'throw';
    }
    bg.dragStart = null;
    bg.dragEnd = null;
  } else if (g.interactGame === 'volleyball' && volleyGame) {
    onVolleyDragEnd();
  }
  if (g.toolHold) { g.toolHold = null; }
}, { passive: false });

// Draw pixel char at position
function drawChar(ch, x, y, color, sz = 1) {
  ctx.fillStyle = color;
  const pattern = fontPatterns[ch] || fontPatterns[' '];
  if (!pattern) return;
  const patW = pattern[0].length;
  const patH = pattern.length;
  for (let py = 0; py < patH; py++) {
    for (let px2 = 0; px2 < patW; px2++) {
      if (pattern[py][px2]) {
        ctx.fillRect(x + px2 * sz, y + py * sz, sz, sz);
      }
    }
  }
}

  const fontSize = Math.max(10, Math.floor(14 * scale));
  ctx.font = `${fontSize}px "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif`;

  ctx.fillText(text, Math.floor(x), Math.floor(y));
}

function drawSunMoon() {
  const t = Date.now();
  if (g.isDay) {
    // Sun - larger and more prominent
    const sx = 640, sy = 60, sr = 24;

    // Sun glow (outer)
    ctx.fillStyle = 'rgba(255,200,80,0.15)';
    ctx.fillRect(sx - 40, sy - 40, 80, 80);
    ctx.fillStyle = 'rgba(255,180,60,0.2)';
    ctx.fillRect(sx - 30, sy - 30, 60, 60);

    // Sun body
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(sx - sr, sy - sr, sr * 2, sr * 2);
    ctx.fillStyle = '#FFFACD';
    ctx.fillRect(sx - sr + 4, sy - sr + 4, sr * 2 - 8, sr * 2 - 8);

    // Rays
    ctx.fillStyle = '#FFD700';
    const rayLen = 14;
    const rayW = 4;
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + t / 3000;
      const rx = Math.cos(angle) * (sr + 6);
      const ry = Math.sin(angle) * (sr + 6);
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(angle);
      ctx.fillRect(rayW / 2, -(sr + rayLen), rayW, rayLen);
      ctx.restore();
    }

    // Animated clouds drifting
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    const cloudData = [
      [80, 90, 60, 1],
      [220, 70, 80, 1.2],
      [400, 100, 50, 0.8],
      [560, 80, 70, 1.1],
    ];
    cloudData.forEach(([cx, cy, cw, speed]) => {
      const offset = ((t / 10000 * speed) % 1) * 800 - 100;
      const px = (cx + offset) % 800 - 80;
      // Cloud puffs
      ctx.fillRect(px, cy, cw, 14);

    ctx.fillRect(mx - 6, my + 8, 6, 6);

    ctx.fillRect(mx - 8, my - 6, 4, 4);
    ctx.fillRect(mx + 6, my + 4, 5, 5);

      [350, 50], [410, 20], [480, 40], [540, 25], [600, 55],
      [50, 80], [130, 100], [190, 75], [260, 95], [320, 70],
      [380, 90], [440, 80], [500, 60], [560, 100], [620, 85],
      [80, 130], [150, 150], [210, 120], [270, 140], [330, 115],
      [390, 145], [450, 125], [510, 135], [570, 150], [95, 175],
      [175, 195], [255, 170], [335, 185], [415, 160], [495, 180],
      [15, 55], [65, 115], [125, 165], [185, 35], [245, 85],
      [305, 135], [365, 55], [425, 105], [485, 155], [545, 95]

function drawIncubator() {
  // 居中显示在游戏区下方
  const bx = 234, by = 290, bw = 252, bh = 100;

  // Base body
  ctx.fillStyle = P.incBase;
  ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = P.incLight;
  ctx.fillRect(bx + 6, by + 6, bw - 12, 16);

  // Bowl/ring
  ctx.fillStyle = '#660000';
  ctx.fillRect(bx + 12, by + 22, bw - 24, 10);
  ctx.fillStyle = P.incLight;
  ctx.fillRect(bx + 18, by + 24, bw - 36, 5);

  // Heat flame
  if (g.heatOn && g.power > 0) {
    const t = Date.now() / 150;
    const flameY = by + bh - 16;
    ctx.fillStyle = P.flame[0];
    ctx.fillRect(bx + 60 + Math.sin(t) * 6, flameY - 12, 10, 16);
    ctx.fillRect(bx + 84 + Math.sin(t * 1.3) * 6, flameY - 16, 10, 22);
    ctx.fillRect(bx + 108 + Math.sin(t * 0.8) * 6, flameY - 8, 10, 12);
    ctx.fillStyle = P.flame[2];
    ctx.fillRect(bx + 66 + Math.sin(t) * 6, flameY - 8, 5, 7);
    ctx.fillRect(bx + 90 + Math.sin(t * 1.3) * 6, flameY - 12, 5, 10);
  } else {
    // Off state - cold embers
    ctx.fillStyle = '#444';
    ctx.fillRect(bx + 66, by + bh - 12, 6, 5);
    ctx.fillRect(bx + 90, by + bh - 14, 6, 7);
  }

  // Ice bag (when ice is on) - 放在孵化器左侧
  if (g.iceOn) {
    const iceX = bx - 56;
    const iceY = by + 10;
    // Ice bag body
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(iceX, iceY, 40, 50);

    ctx.fillRect(iceX + 3, iceY + 3, 12, 16);

    ctx.fillStyle = '#E0FFFF';
    ctx.fillRect(iceX + 20, iceY + 20, 10, 10);

    ctx.fillStyle = '#fff';
    ctx.fillRect(iceX + 6, iceY + 6, 6, 6);
    ctx.fillRect(iceX + 28, iceY + 12, 6, 6);
  }

  // Incubator label
  drawText('INCUBATOR', bx + 66, by + bh - 16, '#888', 1);
}

    for (let py = -eggH / 2; py < eggH / 2; py++) {
      const prog = py / (eggH / 2);
      // 上半部分稍窄，下半部分圆润
      let w;
      if (py < 0) {
        // 上半部分：较窄的椭圆
        w = Math.floor(eggW / 2 * Math.sqrt(1 - prog * prog * 0.85));
      } else {
        // 下半部分：更圆润的椭圆
        w = Math.floor(eggW / 2 * Math.sqrt(1 - prog * prog * 0.95));
      }
      // 颜色渐变：顶部浅，底部深
      let col;
      if (py < -eggH / 4) {
        col = '#f8f0e0'; // 顶部最浅
      } else if (py < 0) {
        col = '#f5e6c8'; // 上部
      } else if (py < eggH / 4) {
        col = '#eed8a8'; // 中下部
      } else {
        col = '#e8d098'; // 底部
      }
      ctx.fillStyle = col;
      ctx.fillRect(ex - w, ey + py, w * 2, 1);
    }

    ctx.globalAlpha = 1;
    // Show waiting text
    drawText(`等待第${g.nextHatchDay}天`, ex - 75, ey + eggH / 2 + 15, P.warn, 2);
    drawText(`(${daysLeft}天后)`, ex - 64, ey + eggH / 2 + 35, P.dim, 2);
    return;
  }

  // Crack stage
  const stage = Math.floor(g.hatchPct / 20);

  // Egg body - 真正的椭圆蛋形
  for (let py = -eggH / 2; py < eggH / 2; py++) {
    const prog = py / (eggH / 2);
    let w;
    if (py < 0) {
      w = Math.floor(eggW / 2 * Math.sqrt(1 - prog * prog * 0.85));
    } else {
      w = Math.floor(eggW / 2 * Math.sqrt(1 - prog * prog * 0.95));
    }
    let col;
    if (py < -eggH / 4) {
      col = '#f8f0e0';
    } else if (py < 0) {
      col = '#f5e6c8';
    } else if (py < eggH / 4) {
      col = '#eed8a8';
    } else {
      col = '#e8d098';
    }
    ctx.fillStyle = col;
    ctx.fillRect(ex - w, ey + py, w * 2, 1);
  }

  // 斑点装饰
  ctx.fillStyle = 'rgba(180, 140, 80, 0.35)';
  const spots = [[-15, -25], [10, -15], [-5, 5], [18, -5], [-20, 10], [12, 20]];
  spots.forEach(([dx, dy]) => {
    const spotW = 5 + Math.abs(dx) % 3;
    ctx.fillRect(ex + dx - spotW / 2, ey + dy - spotW / 2, spotW, spotW);
  });

  // 高光
  ctx.fillStyle = 'rgba(255, 255, 240, 0.6)';
  ctx.fillRect(ex - 12, ey - eggH / 2 + 12, 6, 10);

  // 阴影（底部）
  ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
  ctx.fillRect(ex - eggW / 2 + 5, ey + eggH / 2 - 6, eggW - 10, 4);

  // Crack lines based on stage
  if (stage >= 1) {
    ctx.fillStyle = P.eggCrack;
    ctx.fillRect(ex - 8, ey - 18, 6, 8);
    ctx.fillRect(ex + 2, ey - 12, 8, 6);
  }
  if (stage >= 2) {
    ctx.fillRect(ex - 18, ey, 10, 6);
    ctx.fillRect(ex + 8, ey + 6, 8, 8);
    ctx.fillRect(ex - 6, ey + 14, 6, 6);
  }
  if (stage >= 3) {
    ctx.fillRect(ex - 24, ey - 6, 8, 6);
    ctx.fillRect(ex + 14, ey - 10, 6, 12);
    ctx.fillRect(ex - 12, ey + 20, 12, 6);
    ctx.fillRect(ex + 2, ey - 24, 8, 6);
  }
  if (stage >= 4) {
    // Major cracks
    ctx.fillStyle = P.eggInt;
    ctx.fillRect(ex - 14, ey - 10, 28, 32);
    ctx.fillStyle = P.eggCrack;
    for (let i = 0; i < 6; i++) {
      const cx = ex - 24 + Math.floor(Math.random() * 48);
      const cy = ey - 24 + Math.floor(Math.random() * 54);
      ctx.fillRect(cx, cy, 6, 6);
    }
    // Shadow inside
    ctx.fillStyle = '#D4A574';
    ctx.fillRect(ex - 8, ey - 6, 16, 24);
    // Eye peek
    ctx.fillStyle = '#000';
    ctx.fillRect(ex - 3, ey, 6, 6);
    ctx.fillStyle = '#fff';
    ctx.fillRect(ex, ey, 2, 2);
  }
}

let wobble = 0;

// 在场景中绘制宠物（支持多宠物）
// pet: 宠物对象
// x, y: 宠物在场景中的位置
// options: { isDragging, clickReaction, petMood, moodBubble }
function drawPet(pet, x, y, options) {
  if (!pet) return;

  const basePx = x, basePy = y;
  let scale = 1.33;
  const isDragging = options?.isDragging || false;
  const clickReaction = options?.clickReaction || null;
  const petMood = options?.petMood || 'normal';
  const moodBubble = options?.moodBubble || { show: false };

  if (isDragging) scale = 1.33 * 1.15; // 拖拽时放大

  // 点击反应动画
  let offsetY = 0;
  if (clickReaction) {
    const t = clickReaction.time;
    const type = clickReaction.type;
    if (type === 'jump') {
      // 跳跃：先上升后下落
      offsetY = -Math.sin(t * Math.PI) * 30;
    } else if (type === 'bounce') {
      // 弹跳：多次小弹跳
      const bounce = Math.abs(Math.sin(t * Math.PI * 3)) * (1 - t);
      offsetY = -bounce * 20;
    } else if (type === 'spin') {
      // 旋转：通过缩放实现
      scale = 1.33 * (1 + Math.sin(t * Math.PI * 4) * 0.1);
    } else if (type === 'heart') {
      // 爱心：轻微上下晃动
      offsetY = Math.sin(t * Math.PI * 4) * 5;
    }
  }

  // 使用缓存的精灵 canvas
  const petCanvas = getPetSpriteCanvas(pet);

  // ─── 地面投影（先画，让宠物覆盖在上面） ───
  if (!isDragging) {
    const shadowW = 50 * scale * 0.5;
    const shadowH = 8 * scale * 0.5;
    const shadowY = basePy + 20;
    ctx.save();
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.beginPath();
    ctx.ellipse(basePx, shadowY, shadowW, shadowH, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // 行走弹跳（游走时上下起伏）
  let walkBob = 0;
  if (pet.wanderTarget) {
    walkBob = Math.sin(g.lastTs / 120) * 2;
  }

  // Draw scaled pet to main canvas
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  // 拖拽时添加阴影效果
  if (isDragging) {
    ctx.shadowColor = 'rgba(255, 105, 180, 0.5)';
    ctx.shadowBlur = 15;
  }
  ctx.drawImage(petCanvas, basePx - 24 * scale, basePy - 24 * scale + offsetY + walkBob, 48 * scale, 48 * scale);
  ctx.restore();

  // ─── 撒娇气泡（圆角矩形 + 三角尾巴） ───
  if (moodBubble.show) {
    const bubbleX = basePx + 30, bubbleY = basePy - 45;
    const bw = 80, bh = 24, r = 8;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.roundRect(bubbleX - bw/2, bubbleY - bh/2, bw, bh, r);
    ctx.fill();
    // 气泡尾巴（小三角）
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.moveTo(bubbleX - 6, bubbleY + bh/2 - 2);
    ctx.lineTo(bubbleX, bubbleY + bh/2 + 8);
    ctx.lineTo(bubbleX + 6, bubbleY + bh/2 - 2);
    ctx.closePath();
    ctx.fill();
    const bubbleText = moodBubble.text || '摸摸我~';
    drawText(bubbleText, bubbleX - bubbleText.length * 4, bubbleY - 6, '#FF69B4', 1);
  }

  // ─── 宠物上方标签 ───
  // 第一行：名字（居中）
  drawText(pet.name, basePx - 25, basePy - 48, STAR_COLORS[pet.star] || '#aaa', 1);
  // 第二行：星级 + 等级 + 基因 紧凑排列
  const geneStr = (pet.genes || []).map(gk => (GENES[gk] || {}).icon || '').join('');
  const extra = (geneStr ? ` ${geneStr}` : '');
  drawText(`${pet.star}★ Lv${pet.level}${extra}`, basePx - 25, basePy - 70, '#aaa', 0.5);

  // 饥饿警告（宠物右侧）
  if (g.hunger < 30) {
    drawText('饿了!', basePx + 45, basePy - 20, P.danger, 1.5);
  }

  // 经验条（头顶上方）
  const expNext = EXP_TABLE[pet.level] || EXP_TABLE[10];
  const expCur = pet.level > 1 ? EXP_TABLE[pet.level - 1] : 0;
  const expProg = Math.max(0, Math.min(1, (pet.exp - expCur) / (expNext - expCur)));
  const barW = 50;
  ctx.fillStyle = P.barBg;
  ctx.fillRect(basePx - barW / 2, basePy - 56, barW, 4);
  ctx.fillStyle = '#90EE90';
  ctx.fillRect(basePx - barW / 2, basePy - 56, Math.floor(barW * expProg), 4);
}

// 绘制所有已孵化宠物列表
function drawHatchingAnim() {
  // 居中显示孵化动画
  const t = Date.now() / 200;
  const cx = 360, cy = 300;

  // Egg pieces falling
  ctx.fillStyle = P.eggLight;
  for (let i = 0; i < 6; i++) {
    const px = cx - 60 + i * 24 + Math.sin(t + i) * 12;
    const py = cy - 40 + (i % 3) * 20 + Math.floor(t + i) % 20;
    ctx.fillRect(Math.floor(px), Math.floor(py), 16, 16);
  }

  // Glowing center
  const glow = (Math.sin(t * 2) + 1) * 0.5;
  ctx.fillStyle = `rgba(255, 200, 100, ${glow * 0.8})`;
  ctx.fillRect(cx - 40, cy - 40, 80, 80);

  // Baby peek
  if (g.hatchAnim > 10) {
    const peek = Math.min(1, (g.hatchAnim - 10) / 20);
    ctx.fillStyle = '#FFE4B5';
    ctx.fillRect(cx - 30 * peek, cy - 30 * peek, 60 * peek, 60 * peek);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(cx - 18, cy - 10, 10, 10);
    ctx.fillRect(cx + 8, cy - 10, 10, 10);
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 16, cy - 8, 4, 4);
    ctx.fillRect(cx + 10, cy - 8, 4, 4);
  }
}

function drawHUD() {
  // Force crisp text rendering
  ctx.imageSmoothingEnabled = false;
  // Top bar background - 两行布局，充分利用canvas宽度
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, canvas.width, 80);

  // ========== 第一行：昼夜+时间 | 孵化进度条 | 温度 | 电量 ==========
  const Y1 = 8;  // 第一行

  // 昼夜图标 + 时间 (x: 0-70)
  if (g.isDay) {
    ctx.fillStyle = P.sun;
    ctx.fillRect(8, Y1, 20, 20);
    ctx.fillRect(4, Y1 + 4, 4, 4);
    ctx.fillRect(28, Y1 + 4, 4, 4);
    ctx.fillRect(12, Y1, 4, 4);
    ctx.fillRect(12, Y1 + 20, 4, 4);
  } else {
    ctx.fillStyle = P.moon;
    ctx.fillRect(8, Y1, 20, 20);
    ctx.fillStyle = P.skyNgt;
    ctx.fillRect(14, Y1 + 6, 10, 10);
  }
  const rem = g.isDay ? DAY_SEC - g.time : NGT_SEC - (g.time - DAY_SEC);
  drawText(`${Math.floor(rem/60)}:${String(Math.floor(rem%60)).padStart(2,'0')}`, 36, Y1, P.txt, 1);

  // 孵化进度 (x: 80-280，200宽进度条)
  drawText('孵化', 80, Y1, P.txt, 1);
  ctx.fillStyle = P.barBg;
  ctx.fillRect(80, Y1 + 16, 140, 10);
  ctx.fillStyle = g.hatchPct > 80 ? P.happy : (g.hatchPct > 50 ? P.warn : '#aaa');
  ctx.fillRect(80, Y1 + 16, Math.floor(140 * g.hatchPct / 100), 10);
  drawText(`${Math.floor(g.hatchPct)}%`, 226, Y1, P.txt, 1);

  // 温度 (x: 300-400)
  const inOpt = g.temp >= TEMP_OPT_MIN && g.temp <= TEMP_OPT_MAX;
  const tempColor = g.temp > 40 ? P.danger : (g.temp < 30 ? P.tempCold : (inOpt ? P.happy : P.warn));
  drawText('温度', 300, Y1, P.dim, 1);
  drawText(`${g.temp.toFixed(1)}°`, 300, Y1 + 16, tempColor, 1);

  // 电量 (x: 400-500)
  const pColor = g.power < 20 ? P.danger : (g.power < 40 ? P.warn : '#4CAF50');
  drawText('电量', 400, Y1, P.dim, 1);
  drawText(`${Math.floor(g.power)}`, 400, Y1 + 16, pColor, 1);

  // ========== 第二行：天数 | 亲密度 | 饥饿度 ==========
  const Y2 = 40;
  const BAR_Y = Y2 + 16;
  const BAR_H = 10;

  // 天数 (x: 0-80)
  drawText(`第${g.dayCount}天`, 8, Y2, P.dim, 1);

  // 亲密度 (x: 100-220)
  drawText('亲密', 100, Y2, P.dim, 1);
  const hearts = g.currentPet ? Math.floor(g.intimacy / 20) : 0;
  ctx.fillStyle = P.heart;
  for (let i = 0; i < hearts; i++) {
    ctx.fillRect(100 + i * 18, BAR_Y, 10, 10);
    ctx.fillRect(98 + i * 18, BAR_Y + 2, 14, 8);
    ctx.fillRect(100 + i * 18, BAR_Y + 10, 10, 4);
  }

  // 饥饿度 (x: 250-400)
  if (g.currentPet) {
    const hungerColor = g.hunger < 30 ? P.danger : (g.hunger < 60 ? P.warn : '#4CAF50');
    drawText('饥饿', 250, Y2, P.dim, 1);
    ctx.fillStyle = P.barBg;
    ctx.fillRect(300, BAR_Y, 100, BAR_H);
    ctx.fillStyle = hungerColor;
    ctx.fillRect(300, BAR_Y, Math.floor(100 * g.hunger / 100), BAR_H);
    drawText(`${Math.floor(g.hunger)}`, 406, Y2, hungerColor, 1);
  }
}

function drawFeedInventory() {

// ─── Pet Exp / Level System ─────────────────────────────────────
function addExp(pet, amount) {
  if (!pet) return;
  pet.exp += amount;
  // 检查升级
  while (pet.level < 10 && pet.exp >= EXP_TABLE[pet.level]) {
    pet.level++;
    if (pet.expireDay !== undefined) {
      pet.expireDay += 3; // 每升一级延长3天寿命
    }
    initAudio();
    playSound('levelUp');
    showToast(`🎉 ${pet.name} 升级了！Lv.${pet.level}（寿命+3天）`);
  }
}

// ─── Synthesis System ────────────────────────────────────────────
let synthSelect = []; // 当前选中的用于合成的宠物

function doSynthesize() {
  if (g.pets.length < 3) {
    showToast('需要至少3只宠物才能合成');
    return;
  }
  synthSelect = [];
  const overlay = document.getElementById('overlay');
  const msg = document.getElementById('overlayMsg');
  // 按星级分组显示提示
  const starGroups = {};
  g.pets.forEach((p, i) => {
    if (!starGroups[p.star]) starGroups[p.star] = [];
    starGroups[p.star].push(i);
  });
  const starHint = Object.keys(starGroups)
    .filter(s => starGroups[s].length >= 3)
    .map(s => `${s}星(${starGroups[s].length}只)`).join('、') || '无3只同星';

  const listHtml = g.pets.map((p, i) => {
    const starStr = '★'.repeat(p.star || 1) + '☆'.repeat(5 - (p.star || 1));
    const geneStr = (p.genes || []).map(gk => (GENES[gk] || {}).icon || '').join('');
    return `<div class="breed-pet-item" id="breed_item_${i}" onclick="toggleSynthSelect(${i})" style="display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid #333;cursor:pointer">
      <canvas id="breed_canvas_${i}" width="48" height="48" style="image-rendering:pixelated"></canvas>
      <div>
        <div style="color:${STAR_COLORS[p.star]}">${p.name} ${starStr}</div>
        <div style="color:#aaa;font-size:11px">F${p.generation} · ${geneStr} · Lv.${p.level}</div>
      </div>
      <div id="breed_check_${i}" style="margin-left:auto;color:#444;font-size:20px">○</div>
    </div>`;
  }).join('');
  msg.innerHTML = `<div class="title">⚗️ 宠物合成</div>
    <div style="color:#aaa;font-size:12px;margin-bottom:4px">选择3只<b style="color:#FFD700">同星级</b>宠物合成1只<b style="color:#FFD700">+1星</b>宠物</div>
    <div style="color:#666;font-size:11px;margin-bottom:8px">可选：${starHint} &nbsp; <span style="color:#f55">副宠物将被消耗</span></div>
    <div id="breed_list" style="max-height:60vh;overflow-y:auto">${listHtml}</div>
    <div id="breed_error" style="color:#f55;font-size:12px;margin-top:6px;display:none">请选择3只同星级的宠物</div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button onclick="confirmSynth()" style="flex:1;padding:8px;background:#222;border:2px solid #555;color:#fff;cursor:pointer">合成</button>
      <button onclick="closeOverlay()" style="flex:1;padding:8px;background:#222;border:2px solid #555;color:#fff;cursor:pointer">取消</button>
    </div>`;
  overlay.classList.add('show');
  g.pets.forEach((p, i) => {
    setTimeout(() => {
      const c = document.getElementById(`breed_canvas_${i}`);
      if (c) drawPetSprite(c, p);
    }, 30);
  });
}

function toggleSynthSelect(idx) {
  const alreadyIdx = synthSelect.indexOf(idx);
  if (alreadyIdx >= 0) {
    synthSelect.splice(alreadyIdx, 1);
  } else if (synthSelect.length < 3) {
    synthSelect.push(idx);
  }
  g.pets.forEach((_, i) => {
    const el = document.getElementById(`breed_check_${i}`);
    const item = document.getElementById(`breed_item_${i}`);
    if (el) el.textContent = synthSelect.includes(i) ? '◉' : '○';
    if (item) item.style.background = synthSelect.includes(i) ? '#2a2a4a' : 'transparent';
  });
  document.getElementById('breed_error').style.display = 'none';
}

function confirmSynth() {
  if (synthSelect.length !== 3) {
    document.getElementById('breed_error').style.display = 'block';
    document.getElementById('breed_error').textContent = '请选择3只宠物';
    return;
  }
  const [idxA, idxB, idxC] = synthSelect;
  const petA = g.pets[idxA];
  const petB = g.pets[idxB];
  const petC = g.pets[idxC];
  // 检查是否同星
  if (petA.star !== petB.star || petB.star !== petC.star) {
    document.getElementById('breed_error').style.display = 'block';
    document.getElementById('breed_error').textContent = '必须选择3只同星级的宠物';
    return;
  }
  // 检查是否五星满级
  if (petA.star >= 5) {
    document.getElementById('breed_error').style.display = 'block';
    document.getElementById('breed_error').textContent = '五星宠物已达上限，无法继续合成';
    return;
  }
  closeOverlay();
  finalizeSynth(petA, idxA, petB, idxB, petC, idxC);
}

function finalizeSynth(petA, idxA, petB, idxB, petC, idxC) {
  initAudio();
  // 升星
  const newStar = petA.star + 1;

  // 基因融合（来自三只宠物）+ 小概率变异
  const allGenes = [...petA.genes, ...petB.genes, ...petC.genes];
  const unique = [...new Set(allGenes)];
  let childGenes = unique.slice(0, 2);
  // 15%概率基因突变
  if (Math.random() < 0.15 && childGenes.length < 2) {
    const parentGeneSet = new Set(allGenes);
    const allGeneKeys = Object.keys(GENES).filter(k => !parentGeneSet.has(k));
    if (allGeneKeys.length > 0) {
      const mutant = allGeneKeys[Math.floor(Math.random() * allGeneKeys.length)];
      childGenes.push(mutant);
    }
  }

  // 代系取最大
  const childGen = Math.max(petA.generation, petB.generation, petC.generation) + 1;

  // 名字沿用主宠物
  const childName = petA.name + '·进化';

  // 性格随机选一个
  const allTraits = [...petA.traits, ...petB.traits, ...petC.traits];
  const uniqueTraits = [...new Set(allTraits)];
  const childTraits = uniqueTraits.slice(0, 2);
  if (childTraits.length === 0) childTraits.push('普通');

  // 副宠物 idx 降序排列（先删idx大的避免偏移）
  const removeIdxs = [idxB, idxC, idxA].sort((a, b) => b - a);
  removeIdxs.forEach(idx => g.pets.splice(idx, 1));

  // 生成进化后宠物
  const child = {
    id: Date.now(),
    name: childName,
    traits: childTraits,
    star: newStar,
    level: 1,
    exp: 0,
    genes: childGenes,
    generation: childGen,
    father: petA.name,
    mother: petB.name,
    day: g.dayCount,
    expireDay: g.dayCount + 10,
    breedCount: 0,
    // 多宠物场景位置（网格自动排列）
    scenePos: { x: 0, y: 0 },
    // 宠物互动状态
    clickReaction: null,
    petMood: 'normal',
    moodBubble: { show: false, timer: 0 },
  };

  recordDiscovery(child);
  g.pets.push(child);
  arrangePetsIso(); // 统一网格排列
  g.currentPet = child;
  g.currentScene = 'pets'; // 合成后自动切换到宠物间
  g.hunger = 100;

  const starStr = '★'.repeat(child.star || 1) + '☆'.repeat(5 - (child.star || 1));
  const geneStr = (child.genes || []).map(gk => (GENES[gk] || {}).icon || '').join('');
  const geneNameStr = (child.genes || []).map(gk => (GENES[gk] || {}).name || '').join('');
  const mutated = childGenes.length > 2 || (childGenes.length === 2 && ![...petA.genes, ...petB.genes, ...petC.genes].includes(childGenes[1]));
  const mutText = mutated ? '<br><span style="color:#ff69b4;font-size:12px">✨ 发生基因突变！</span>' : '';
  // 播放音效：突变播放特殊音效
  if (mutated) {
    playSound('synthMutation');
  } else {
    playSound('synth');
  }

  const overlay = document.getElementById('overlay');
  const msg = document.getElementById('overlayMsg');
  const canvasId = 'hatch_pet_sprite';
  msg.innerHTML = `<div class="title">⚗️ ${childName} 进化成功！</div>
    <div style="color:#aaa;font-size:12px;margin-bottom:4px">${petA.name} + ${petB.name} + ${petC.name}</div>
    <canvas id="${canvasId}" width="64" height="64" style="image-rendering:pixelated;margin:6px auto;display:block;border:1px solid #444"></canvas>
    <div style="color:${STAR_COLORS[child.star]};font-size:20px">${starStr}</div>
    <div style="margin-top:4px">${geneStr} <span style="color:#aaa">${geneNameStr}</span></div>
    <div style="color:#aaa">${childTraits.join('、')}</div>
    <div style="color:#aaa;margin-top:6px">F${child.generation} · Lv.1</div>
    ${mutText}`;
  overlay.classList.add('show');
  setTimeout(() => {
    const c = document.getElementById(canvasId);
    if (c) drawPetSprite(c, child);
  }, 50);
  saveGame();
}

// 放归宠物
function releasePet(idx) {

  g.pets.splice(idx, 1);
  if (g.currentPet === pet) {
    g.currentPet = g.pets.length > 0 ? g.pets[g.pets.length - 1] : null;
  }
  closeOverlay();
  saveGame();
}

function setCurrentPet(idx) {

// ─── Game Logic ─────────────────────────────────────────────────
function update(dt) {
  // dt in seconds
  g.time += dt;
  if (g.time >= CYCLE) {
    g.time = 0;
    g.isDay = true;
    g.dayCount++;
  } else if (g.time >= DAY_SEC && g.isDay) {
    g.isDay = false;
  }

  updateInteractBtn();

  // ─── 道具长按触发 ───
  if (g.toolHold && !g.toolHold.triggered && g.toolMode) {
    const elapsed = (Date.now() - g.toolHold.startTime) / 1000;
    if (elapsed >= 0.5) {
      const pet = g.pets.find(p => p.id === g.toolHold.petId);
      if (pet) {
        g.toolHold.triggered = true;
        applyToolToPet(pet);
      }
      g.toolHold = null;
    }
  }

  g.powerRegenTimer += dt;
  if (g.powerRegenTimer >= 15) {
    g.powerRegenTimer = 0;
    const regen = g.isDay ? Math.floor(POWER_DAY_REGEN / 2) : Math.floor(POWER_NGT_REGEN / 2);
    g.power = Math.min(POWER_MAX, g.power + regen);
  }

  // Pet expiration check (宠物每10天消失)
  if (g.currentPet && g.dayCount > g.currentPet.expireDay) {
    initAudio();
    playSound('petLeave');
    // 宠物消失
    const petName = g.currentPet.name;
    g.pets = g.pets.filter(p => p !== g.currentPet);
    g.currentPet = g.pets.length > 0 ? g.pets[g.pets.length - 1] : null;
    showToast(`${petName}离开了...`);
    saveGame();
  }

  // 地面食物计时
  updateDroppedFood(dt);
  if (g.foodDropCd > 0) g.foodDropCd = Math.max(0, g.foodDropCd - dt);

  // Cooldowns
  if (g.petCdLeft > 0) g.petCdLeft = Math.max(0, g.petCdLeft - dt);
  if (g.feedCdLeft > 0) g.feedCdLeft = Math.max(0, g.feedCdLeft - dt);
  if (g.forageCdLeft > 0) g.forageCdLeft = Math.max(0, g.forageCdLeft - dt);

  // Heat & Ice
  if (g.heatOn && g.power > 0) {
    g.temp = Math.min(TEMP_MAX, g.temp + 0.3 * dt);
    g.power = Math.max(0, g.power - HEAT_DRAIN * dt);
    if (g.power <= 0) {
      g.heatOn = false;
      // 警告音效只在电量刚好耗尽时触发一次
      initAudio();
      playSound('warning');
    }
  } else if (g.iceOn) {
    // 冰袋降温：每秒降3度
    g.temp = Math.max(TEMP_MIN, g.temp - 3 * dt);
  } else {
    // 无加热/冰袋：缓慢趋向室温（25°C），不会无限降温
    const roomTemp = 25;
    if (Math.abs(g.temp - roomTemp) > 0.5) {
      g.temp += (roomTemp - g.temp) * 0.02 * dt;
    }
  }

  // Hatch rate
  let rate = HATCH_RATE;
  if (g.temp < TEMP_OPT_MIN) {
    rate = HATCH_RATE_COLD;
    if (g.temp < 30) {
      g.intimacy = Math.max(0, g.intimacy - 0.05 * dt);
    }
  } else if (g.temp > TEMP_OPT_MAX) {
    rate = HATCH_RATE_HOT;
  }
  // Intimacy bonus
  rate *= (1 + (g.intimacy / 100) * 0.5);

  // Passive hatch: not heating, not icing -> every 30sec add 1%
  if (!g.heatOn && !g.iceOn) {
    g.passiveHatchTimer = (g.passiveHatchTimer || 0) + dt;
    if (g.passiveHatchTimer >= 30) {
      g.passiveHatchTimer = 0;
      g.hatchPct = Math.min(100, g.hatchPct + 1);
    }
  } else {
    g.passiveHatchTimer = 0;
  }

  // Hunger decay (only when pet exists) - 每秒下降0.01，约100分钟降到0
  if (g.currentPet) {
    g.hunger = Math.max(0, g.hunger - 0.01 * dt);
  }

  const oldStage = Math.floor(g.hatchPct / 20);
  g.hatchPct = Math.min(100, g.hatchPct + rate * dt);
  const newStage = Math.floor(g.hatchPct / 20);

  // 裂纹阶段增加时播放音效
  if (newStage > oldStage && newStage >= 1 && newStage <= 4) {
    initAudio();
    playSound('crack');
  }

  // Random events
  g.eventCooldown -= dt;
  if (g.eventCooldown <= 0 && !g.eventMsg) {
    triggerRandomEvent();
  }
  if (g.eventMsg && g.eventTimer > 0) {
    g.eventTimer -= dt;
    if (g.eventTimer <= 0) {
      g.eventMsg = '';
    }
  }

  // Hatching check - hatchPct 100% 时直接孵化，不再受 nextHatchDay 限制
  if (g.hatchPct >= 100 && !g.isHatching) {
    startHatch();
  }
  if (g.isHatching) {
    g.hatchAnim += dt * 60;
    if (g.hatchAnim > 120) {
      finalizeHatch();
    }
  }
  
  // ─── 宠物互动增强：心情系统（简化版，仅处理点击触发的表情） ───
  // 更新每只宠物的点击反应动画
  g.pets.forEach(pet => {
    if (pet.clickReaction && typeof pet.clickReaction.time === 'number') {
      pet.clickReaction.time += dt;
      if (pet.clickReaction.time > 0.8) {
        pet.clickReaction = null;
      }
    }
    // 更新心情气泡计时器
    if (pet.moodBubble && typeof pet.moodBubble.timer === 'number' && pet.moodBubble.timer > 0) {
      pet.moodBubble.timer -= dt;
      if (pet.moodBubble.timer <= 0) {
        pet.moodBubble.show = false;
        pet.moodBubble.timer = 0;
      }
    }
    // 互动心情重置（互动触发的happy表情自动恢复）
    if (pet._moodResetTimer > 0) {
      pet._moodResetTimer -= dt;
      if (pet._moodResetTimer <= 0 && pet.petMood === 'happy') {
        pet.petMood = 'normal';
      }
    }
  });

  // 更新爱心粒子
  g.heartParticles = g.heartParticles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    // 水花粒子更轻飘，爱心粒子重力正常
    p.vy += p.isWater ? 0.03 : 0.05;
    p.vx *= p.isWater ? 0.98 : 1; // 水花有阻力
    p.life -= dt * (p.isWater ? 1.2 : 1.5);
    return p.life > 0;
  });

  // 更新道具粒子
  updateToolParticles(dt);

  // ─── 宠物自主移动 Wander AI ──────────────────────────────────
  updatePetWander(dt);
  updatePetInteractions(dt);
}

// ─── 宠物自主移动 Wander AI ────────────────────────────────────
function updatePetWander(dt) {
  g.pets.forEach(pet => {
    if (!pet.scenePos) return;
    if (g.draggingPetId === pet.id) return;
    if (g.hoveredPetId === pet.id) return; // 悬停时暂停移动
    if (pet.interactAnim && pet.interactAnim.time > 0) return;

    // 优先寻路捡食（只设目标，不跳转）
    seekFood(pet);

    pet.wanderTimer -= dt;

    if (pet.wanderTimer <= 0) {
      if (Math.random() < 0.6) {
        pet.wanderTarget = {
          x: 80 + Math.random() * 560,
          y: 310 + Math.random() * 180,
        };
        pet.wanderSpeed = 0.4 + Math.random() * 0.8;
        pet.wanderIdle = 0;
        if (pet.wanderTarget.x < pet.scenePos.x) pet.facingRight = false;
        else if (pet.wanderTarget.x > pet.scenePos.x) pet.facingRight = true;
      } else {
        pet.wanderTarget = null;
        pet.wanderIdle = 1 + Math.random() * 3;
      }
      pet.wanderTimer = pet.wanderTarget ? 3 + Math.random() * 4 : pet.wanderIdle;
    }

    if (pet.wanderTarget && !pet.interactAnim) {
      const dx = pet.wanderTarget.x - pet.scenePos.x;
      const dy = pet.wanderTarget.y - pet.scenePos.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 3) {
        pet.wanderTarget = null;
        pet.wanderIdle = 1 + Math.random() * 3;
        pet.wanderTimer = pet.wanderIdle;
      } else {
        const speed = pet.wanderSpeed * 60 * dt;
        const moveX = (dx / dist) * speed;
        const moveY = (dy / dist) * speed;
        pet.scenePos.x += moveX;
        pet.scenePos.y += moveY;
        pet.scenePos.x = Math.max(50, Math.min(670, pet.scenePos.x));
        pet.scenePos.y = Math.max(290, Math.min(500, pet.scenePos.y));
        if (moveX < -0.1) pet.facingRight = false;
        else if (moveX > 0.1) pet.facingRight = true;
        const { col, row } = screenToIso(pet.scenePos.x, pet.scenePos.y);
        pet.isoCol = Math.max(0, Math.min(4, col));
        pet.isoRow = Math.max(0, Math.min(2, row));
      }
    }
  });
}

// ─── 宠物间互动系统 ──────────────────────────────────────────────
function updatePetInteractions(dt) {
  g.pets.forEach(pet => {
    if (pet.interactCooldown > 0) pet.interactCooldown -= dt;
    if (pet.interactAnim && pet.interactAnim.time > 0) {
      pet.interactAnim.time -= dt;
      if (pet.interactAnim.time <= 0) {
        pet.interactAnim = null;
        pet.interactPartner = null;
      }
    }
  });

  g._interactCheckTimer = (g._interactCheckTimer || 0) - dt;
  if (g._interactCheckTimer > 0) return;
  g._interactCheckTimer = 1;

  for (let i = 0; i < g.pets.length; i++) {
    for (let j = i + 1; j < g.pets.length; j++) {
      const a = g.pets[i], b = g.pets[j];
      if (!a.scenePos || !b.scenePos) continue;
      if (a.interactCooldown > 0 || b.interactCooldown > 0) continue;
      if (a.interactAnim || b.interactAnim) continue;
      if (g.draggingPetId === a.id || g.draggingPetId === b.id) continue;
      const dx = a.scenePos.x - b.scenePos.x;
      const dy = a.scenePos.y - b.scenePos.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        triggerPetInteraction(a, b);
      }
    }
  }
}

function triggerPetInteraction(petA, petB) {
  const types = ['play', 'nuzzle', 'dance'];
  const type = types[Math.floor(Math.random() * types.length)];
  const duration = 1.5 + Math.random();

  petA.interactAnim = { type, time: duration };
  petB.interactAnim = { type, time: duration };
  petA.interactPartner = petB.id;
  petB.interactPartner = petA.id;
  petA.interactCooldown = 8 + Math.random() * 7;
  petB.interactCooldown = 8 + Math.random() * 7;

  const mx = (petA.scenePos.x + petB.scenePos.x) / 2;
  const my = (petA.scenePos.y + petB.scenePos.y) / 2;
  for (let i = 0; i < 5; i++) {
    g.heartParticles.push({
      x: mx + (Math.random() - 0.5) * 30,
      y: my - 10 - Math.random() * 20,
      vx: (Math.random() - 0.5) * 1.5,
      vy: -2 - Math.random() * 2,
      life: 1.5 + Math.random(),
    });
  }

  const bubbles = ['一起玩!', '蹭蹭~', '♪♪♪'];
  petA.moodBubble = { show: true, timer: 2, text: bubbles[Math.floor(Math.random() * bubbles.length)] };
  petB.moodBubble = { show: true, timer: 2, text: '♡' };
  petA.petMood = 'happy';
  petB.petMood = 'happy';
  petA._moodResetTimer = 3;
  petB._moodResetTimer = 3;
}

function triggerRandomEvent() {
  initAudio();
  playSound('event');
  const dayEvents = [
    { text: '晴空万里！孵化+5%', effect: () => { g.hatchPct = Math.min(100, g.hatchPct + 5); } },
    { text: '小虫靠近！获得虫子×1', effect: () => { g.inventory.worm = Math.min(INV_MAX, g.inventory.worm + 1); } },
    { text: '发现野果！获得水果×1', effect: () => { g.inventory.fruit = Math.min(INV_MAX, g.inventory.fruit + 1); } },
    { text: '热浪来袭！温度+3°C', effect: () => { g.temp = Math.min(TEMP_MAX, g.temp + 3); } },
    { text: '蚊虫骚扰！亲密度-5', effect: () => { g.intimacy = Math.max(0, g.intimacy - 5); } },
  ];
  const nightEvents = [
    { text: '月色温柔...亲密度+10', effect: () => { g.intimacy = Math.min(100, g.intimacy + 10); } },
    { text: '流星划过！孵化+8%', effect: () => { g.hatchPct = Math.min(100, g.hatchPct + 8); } },
    { text: '找到零食！获得饲料×1', effect: () => { g.inventory.treat = Math.min(INV_MAX, g.inventory.treat + 1); } },
    { text: '寒流来袭！温度-5°C', effect: () => { g.temp = Math.max(TEMP_MIN, g.temp - 5); } },
    { text: '做了噩梦...亲密度-5', effect: () => { g.intimacy = Math.max(0, g.intimacy - 5); } },
  ];

  const pool = g.isDay ? dayEvents : nightEvents;
  const ev = pool[Math.floor(Math.random() * pool.length)];
  g.eventMsg = ev.text;
  g.eventTimer = 5;
  ev.effect();
  g.eventCooldown = g.isDay ? 120 : 90;

  // Show event in DOM
  const el = document.getElementById('evt');
  el.textContent = ev.text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

function startHatch() {
  g.isHatching = true;
  g.hatchAnim = 0;
}

function finalizeHatch() {
  initAudio();
  playSound('hatch');
  g.isHatching = false;
  g.hatchPct = 0;

  // Determine baby traits
  const traits = [];
  if (g.intimacy >= 80) traits.push('亲人');
  if (g.intimacy >= 60) traits.push('活泼');
  if (g.inventory.worm >= 3) traits.push('贪吃');
  if (g.intimacy < 30) traits.push('调皮');
  if (traits.length === 0) traits.push('普通');

  const names = ['小火', '毛球', '蛋蛋', '小灰', '绒绒', '豆芽', '噗噗', '糖豆'];
  const petName = names[Math.floor(Math.random() * names.length)];

  // 随机基因 F1 代
  const geneKeys = Object.keys(GENES);
  const numGenes = Math.random() < 0.3 ? 2 : 1; // 30%概率双基因
  const petGenes = [];
  const shuffled = geneKeys.sort(() => Math.random() - 0.5);
  for (let i = 0; i < numGenes; i++) petGenes.push(shuffled[i]);

  // 随机星级：1-3星，概率权重
  const starRoll = Math.random();
  const star = starRoll < 0.5 ? 1 : (starRoll < 0.8 ? 2 : 3);

  // 构造宠物对象
  const newPet = {
    id: Date.now(),
    name: petName,
    traits: [...traits],
    star: star,
    level: 1,
    exp: 0,
    genes: petGenes,         // 血脉基因数组
    generation: 1,           // F1 原生代
    father: null,
    mother: null,
    day: g.dayCount,
    expireDay: g.dayCount + 10,  // 寿命10天
    breedCount: 0,            // 已被繁殖次数
    // 多宠物场景位置（网格自动排列）
    scenePos: { x: 0, y: 0 },
    // 宠物互动状态
    clickReaction: null,
    petMood: 'normal',
    moodBubble: { show: false, timer: 0 },
    // 自主移动 wander 系统
    wanderTarget: null,     // {x, y} 目标位置
    wanderTimer: 2 + Math.random() * 3, // 下次行动倒计时(秒)
    wanderSpeed: 0.3 + Math.random() * 0.5, // 移动速度(px/帧)
    wanderIdle: 0,          // 停留时间
    facingRight: true,      // 朝向
    // 宠物互动系统
    interactCooldown: 0,    // 互动冷却(秒)
    interactPartner: null,  // 互动目标petId
    interactAnim: null,     // {type, time} 互动动画状态
    // 战斗系统
    hp: star * 25,          // 当前HP（星级决定上限）
    maxHp: star * 25,       // HP上限
    restUntil: 0,            // 休息截止时间戳（0=可战斗）
  };

  // 宠物上限检查：满了则拒绝孵化
  if (g.pets.length >= PET_MAX) {
    showToast('宠物已满！请放归一只宠物腾出位置');
    g.hatchAnim = 0;
    g.heatOn = false;
    g.iceOn = false;
    return;
  }

  recordDiscovery(newPet);
  g.pets.push(newPet);
  arrangePetsIso(); // 统一网格排列
  g.currentPet = g.pets[g.pets.length - 1];
  g.currentScene = 'pets'; // 孵化完成自动切换到宠物间
  g.hunger = 100;

  // 显示星级和基因
  const starStr = '★'.repeat(star) + '☆'.repeat(5 - star);
  const geneStr = petGenes.map(gk => GENES[gk].icon).join('');
  const geneNameStr = petGenes.map(gk => GENES[gk].name).join('');

// 对指定宠物使用当前手持道具
function applyToolToPet(pet) {
  if (!g.toolMode) return;
  const { toolKey } = g.toolMode;
  const t = TOOLS[toolKey];
  const petPos = pet.scenePos || { x: 360, y: 300 };
  const hasGene = pet.genes && pet.genes.includes(t.gene);

  // 消耗1次
  g.toolMode.uses--;
  g.inventory.tools[toolKey] = g.toolMode.uses;

  if (t.gene === null) {
    // 通用道具
    if (toolKey === 'bone') {
      g.intimacy = Math.min(100, g.intimacy + 5);
      showToast(`${pet.name}很开心！🦴 亲密+5`);
    } else if (toolKey === 'musicBox') {
      pet.petMood = 'happy';
      pet.moodBubble = { show: true, timer: 3, text: '好开心~♪' };
      pet.clickReaction = { type: 'spin', time: 0 };
      showToast(`${pet.name}心情愉悦！🎵`);
    } else if (toolKey === 'brush') {
      g.intimacy = Math.min(100, g.intimacy + 3);
      pet.petMood = 'happy';
      pet.moodBubble = { show: true, timer: 2, text: '舒服~' };
      showToast(`${pet.name}很舒服！🪥 亲密+3`);
    }
    spawnToolParticles(petPos, 'love');
    playSound('pet');
  } else if (hasGene) {
    addExp(pet, 8);
    pet.petMood = 'happy';
    const goodTexts = {
      waterBucket: '好凉快！💧', torch: '好暖和~🔥', flashlight: '好舒服~🔦',
      icePack: '好清爽！❄️', fan: '好凉快~💨', soil: '好舒服~🪨', gem: '闪闪发光！💎',
      blanket: '好温暖~🛏️',
    };
    pet.moodBubble = { show: true, timer: 3, text: goodTexts[toolKey] || '很舒服！' };
    pet.clickReaction = { type: 'jump', time: 0 };
    if (toolKey === 'blanket') {
      g.intimacy = Math.min(100, g.intimacy + 5);
      showToast(`${pet.name}很享受！${t.icon} +8经验 +5亲密`);
    } else {
      showToast(`${pet.name}很享受！${t.icon} +8经验`);
    }
    spawnToolParticles(petPos, 'love');
    playSound('levelUp');
  } else if (toolKey === 'flashlight') {

    showToast(`${pet.name}不是光系宠物，手电筒没有效果`);
    spawnToolParticles(petPos, 'neutral');
  } else if (toolKey === 'blanket') {
    // 毯子只对暗系有效

    showToast(`${pet.name}不是暗系宠物，毯子没有效果`);
    spawnToolParticles(petPos, 'neutral');

    pet.moodBubble = { show: true, timer: 1.5, text: '还好吧' };
    showToast(`${pet.name}没什么特别反应`);
    spawnToolParticles(petPos, 'neutral');

  if (g.toolMode.uses <= 0) {

  } else {
    document.getElementById('toolAimHint').textContent = `${t.icon} 剩余 ${g.toolMode.uses} 次`;

function buyTool(toolKey, price) {
  const pet = g.currentPet || (g.pets.length > 0 ? g.pets[0] : null);
  const intimacy = g.intimacy || 0;
  const petExp = pet ? (pet.exp || 0) : 0;
  const currency = intimacy + petExp;
  if (currency < price) { showToast('资产不足！'); return; }
  // 扣除资产（优先扣经验，再扣亲密）
  let remain = price;
  if (petExp >= remain) {
    if (pet) pet.exp = Math.max(0, pet.exp - remain);
  } else {
    if (pet) pet.exp = 0;
    remain -= petExp;
    g.intimacy = Math.max(0, g.intimacy - remain);
  }
  // 增加道具
  if (!g.inventory.tools) g.inventory.tools = {};
  g.inventory.tools[toolKey] = (g.inventory.tools[toolKey] || 0) + 1;
  showToast(`购买成功！${TOOLS[toolKey].icon} ${TOOLS[toolKey].name} ×1`);
  playSound('levelUp');
  updateBtnUI();
  saveGame();
  openShop(); // 刷新商店
}

// 生成道具粒子
function spawnToolParticles(pos, type) {
  const colors = type === 'love'
    ? ['#FF69B4','#FF1493','#FF6EB4','#FFD700']
    : ['#CCCCCC','#AAAAAA','#888888'];
  const count = type === 'love' ? 12 : 6;
  for (let i = 0; i < count; i++) {
    toolParticles.push({
      x: pos.x + (Math.random() - 0.5) * 60,
      y: pos.y - 20 + (Math.random() - 0.5) * 40,
      vx: (Math.random() - 0.5) * 3,
      vy: -Math.random() * 3 - 1,
      life: 1,
      size: 4 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

// 更新道具粒子（每帧）
function updateToolParticles(dt) {
  toolParticles = toolParticles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life -= dt * 1.5;
    return p.life > 0;
  });
}

// ─── 语音指令系统 ────────────────────────────────────────────────────
let voiceRec = null;      // SpeechRecognition instance
let voiceActive = false;  // 是否正在聆听

// 宠物叫声音效（通过 AudioContext 合成）
function playPetSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    const now = ctx.currentTime;
    if (type === 'dog') {
      // 狗：低频吠叫
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(150, now + 0.1);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.2);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'cat') {
      // 猫：高频喵叫
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
      osc.frequency.exponentialRampToValueAtTime(500, now + 0.25);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'rabbit') {
      // 兔子：高音尖叫
      osc.type = 'sine';
      osc.frequency.setValueAtTime(900, now);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
      osc.start(now); osc.stop(now + 0.25);
    } else if (type === 'fox') {
      // 狐狸：尖啸
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(1400, now + 0.15);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.3);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
      osc.start(now); osc.stop(now + 0.35);
    } else if (type === 'mouse') {
      // 鼠：尖锐吱吱
      osc.type = 'square';
      osc.frequency.setValueAtTime(1200, now);
      osc.frequency.exponentialRampToValueAtTime(1000, now + 0.1);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
    } else if (type === 'dragon') {
      // 龙：低吼
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(100, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
    } else if (type === 'bird') {
      // 鸟：清脆鸣叫
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1000, now);
      osc.frequency.exponentialRampToValueAtTime(1400, now + 0.08);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
    } else if (type === 'bear') {
      // 熊：低沉吼叫
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(120, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
    }
    setTimeout(() => ctx.close(), 500);
  } catch(e) {}
}

const PET_SOUND_NAMES = { dog:'汪汪！', cat:'喵~', rabbit:'尖叫！', fox:'尖啸！', mouse:'吱吱！', dragon:'低吼！', bird:'啾啾！', bear:'吼！' };
const CALL_REACTIONS = { dog:'🐕 汪汪叫', cat:'🐱 喵喵叫', rabbit:'🐰 尖叫', fox:'🦊 尖啸', mouse:'🐭 吱吱', dragon:'🐉 低吼', bird:'🐦 啾啾', bear:'🐻 吼叫' };

function executeTextCommand() {

// 执行语音指令
function executeVoiceCommand(text) {
  const t = text.trim();
  if (!t) return;

  // 叫名字反应：喊 "[名字]" → 该宠物叫
  const nameMatch = t.match(/^(.+?)[\s,，.。!！?？]?$/);
  if (nameMatch) {
    const calledName = nameMatch[1].trim();
    // 排除已知指令
    if (['所有宠物排队', '所有宠物'].includes(calledName)) {
      // 排队指令，下面处理
    } else {
      const pet = g.pets.find(p => p.name === calledName);
      if (pet) {
        const typeIdx = getPetType(pet);
        const soundType = PET_SOUNDS[typeIdx];
        playPetSound(soundType);
        showToast(`${pet.name}：${PET_SOUND_NAMES[soundType] || '叫了一声'}`);
        // 宠物开心反应
        pet.petMood = 'happy';
        pet.moodBubble = { show: true, timer: 2.5, text: PET_SOUND_NAMES[soundType] || '叫了' };
        pet.clickReaction = { type: 'bounce', time: 0 };
        return;
      }
    }
  }

  // "[名字]，过来" → 宠物跑到中间
  const comeMatch = t.match(/^(.+?)[,，]\s*过来$/);
  if (comeMatch) {
    const petName = comeMatch[1].trim();
    const pet = g.pets.find(p => p.name === petName);
    if (pet) {
      if (!pet.scenePos) pet.scenePos = { x: 360, y: 300 };
      pet.scenePos.x = 360;
      pet.scenePos.y = 300;
      pet.petMood = 'happy';
      pet.moodBubble = { show: true, timer: 2, text: '来啦！' };
      pet.clickReaction = { type: 'bounce', time: 0 };
      showToast(`${pet.name}跑过来了！`);
      playPetSound(PET_SOUNDS[getPetType(pet)]);
      return;
    } else {
      showToast(`没找到叫「${petName}」的宠物`);
      return;
    }
  }

  // ─── 队形指令 ───────────────────────────────────────────────────
  // 通用：设置宠物位置和表情
  const setPetsPositions = (positions, holdSeconds = 8) => {
    g.pets.forEach((pet, i) => {
      if (!pet.scenePos) pet.scenePos = { x: 360, y: 300 };
      if (positions[i]) {
        pet.scenePos.x = positions[i].x;
        pet.scenePos.y = positions[i].y;
      }
      // 重置漫游状态，让宠物保持队形一段时间
      pet.wanderTarget = null;
      pet.wanderTimer = holdSeconds + Math.random() * 3; // 保持8-11秒
      pet.wanderIdle = 0;
      pet.petMood = 'happy';
      pet.moodBubble = { show: true, timer: holdSeconds, text: '到！' };
    });
  };

  // 一排（横排）
  if (t.includes('一排') || t.includes('横排') || t.includes('排成一排') || t.includes('站好') || t.includes('立正')) {
    if (g.pets.length === 0) { showToast('还没有宠物！'); return; }
    const count = g.pets.length;
    const spacing = Math.min(80, 700 / count); // 增加间距
    const startX = 360 - (count - 1) * spacing / 2;
    const positions = g.pets.map((_, i) => ({ x: startX + i * spacing, y: 300 }));
    setPetsPositions(positions);
    showToast(`🐾 ${count}只宠物排成一排！`);
    return;
  }

  // 两排
  if (t.includes('两排') || t.includes('两行') || t.includes('排成两排') || t.includes('排成两行')) {
    if (g.pets.length === 0) { showToast('还没有宠物！'); return; }
    const count = g.pets.length;
    const half = Math.ceil(count / 2);
    const spacing = Math.min(80, 500 / half); // 增加间距
    const startX = 360 - (half - 1) * spacing / 2;
    const positions = g.pets.map((_, i) => ({
      x: startX + (i % half) * spacing,
      y: i < half ? 240 : 360
    }));
    setPetsPositions(positions);
    showToast(`🐾 ${count}只宠物排成两排！`);
    return;
  }

  // 三排
  if (t.includes('三排') || t.includes('三行') || t.includes('排成三排') || t.includes('排成三行')) {
    if (g.pets.length === 0) { showToast('还没有宠物！'); return; }
    const count = g.pets.length;
    const cols = Math.ceil(count / 3);
    const spacingX = Math.min(80, 600 / cols); // 增加间距
    const spacingY = 70; // 增加行间距
    const startX = 360 - (cols - 1) * spacingX / 2;
    const positions = g.pets.map((_, i) => ({
      x: startX + (i % cols) * spacingX,
      y: 200 + Math.floor(i / cols) * spacingY
    }));
    setPetsPositions(positions);
    showToast(`🐾 ${count}只宠物排成三排！`);
    return;
  }

  // 圆圈 / 围圈
  if (t.includes('圆圈') || t.includes('围成圈') || t.includes('围圈') || t.includes('站成一圈') || t.includes('围成圆')) {
    if (g.pets.length === 0) { showToast('还没有宠物！'); return; }
    const count = g.pets.length;
    const radius = Math.min(160, 80 * count); // 增加半径
    const cx = 360, cy = 300;
    const positions = g.pets.map((_, i) => {
      const angle = (i / count) * Math.PI * 2 - Math.PI / 2;
      return { x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius };
    });
    setPetsPositions(positions);
    showToast(`🐾 ${count}只宠物围成一圈！`);
    return;
  }

  // 方阵
  if (t.includes('方阵') || t.includes('方队') || t.includes('排成方阵')) {
    if (g.pets.length === 0) { showToast('还没有宠物！'); return; }
    const count = g.pets.length;
    const cols = Math.ceil(Math.sqrt(count));
    const spacing = 75; // 增加间距
    const startX = 360 - (cols - 1) * spacing / 2;
    const startY = 300 - (cols - 1) * spacing / 2;
    const positions = g.pets.map((_, i) => ({
      x: startX + (i % cols) * spacing,
      y: startY + Math.floor(i / cols) * spacing
    }));
    setPetsPositions(positions);
    showToast(`🐾 ${count}只宠物排成方阵！`);
    return;
  }

  // 散开 / 分散
  if (t.includes('散开') || t.includes('分散') || t.includes('自由活动')) {
    if (g.pets.length === 0) { showToast('还没有宠物！'); return; }
    const positions = g.pets.map(() => ({
      x: 100 + Math.random() * 520,
      y: 150 + Math.random() * 250
    }));
    setPetsPositions(positions);
    showToast(`🐾 ${g.pets.length}只宠物散开自由活动！`);
    return;
  }

  // 报数
  if (t.includes('报数') || t.includes('报数')) {
    if (g.pets.length === 0) { showToast('还没有宠物！'); return; }
    // 先排成一排
    const count = g.pets.length;
    const spacing = 80;
    const startX = 360 - (count - 1) * spacing / 2;
    const positions = g.pets.map((_, i) => ({ x: startX + i * spacing, y: 300 }));
    setPetsPositions(positions, 15); // 保持15秒

    // 依次报数
    let reportText = '🐾 报数：';
    g.pets.forEach((pet, i) => {
      setTimeout(() => {
        pet.petMood = 'happy';
        pet.moodBubble = { show: true, timer: 3, text: `第${i + 1}！` };
        pet.clickReaction = { type: 'bounce', time: 0 };
        playPetSound(PET_SOUNDS[getPetType(pet)]);
        showToast(`${pet.name}：第${i + 1}！`, 2);
      }, i * 800); // 每800ms报一个
    });

    showToast(`🐾 ${count}只宠物报数！`);
    return;
  }

  // 集中 / 聚拢 / 集合
  if (t.includes('集中') || t.includes('聚拢') || t.includes('集合') || t.includes('过来') || t.includes('过来集合')) {
    if (g.pets.length === 0) { showToast('还没有宠物！'); return; }
    const positions = g.pets.map((_, i) => {
      const angle = (i / g.pets.length) * Math.PI * 2;
      return { x: 360 + Math.cos(angle) * 60, y: 300 + Math.sin(angle) * 40 };
    });
    setPetsPositions(positions);
    showToast(`🐾 ${g.pets.length}只宠物集合！`);
    return;
  }

  // 排队（无具体队形，默认一排）
  if (t === '排队' || t === '排队列' || t.includes('排队')) {
    if (g.pets.length === 0) { showToast('还没有宠物！'); return; }
    const count = g.pets.length;
    const spacing = Math.min(60, 600 / count);
    const startX = 360 - (count - 1) * spacing / 2;
    const positions = g.pets.map((_, i) => ({ x: startX + i * spacing, y: 300 }));
    setPetsPositions(positions);
    showToast(`🐾 ${count}只宠物排成一排！`);
    return;
  }

  // 全部宠物（无队形指令，默认为一排）
  if (t.includes('所有宠物') || t.includes('全部宠物') || t === '来') {
    if (g.pets.length === 0) { showToast('还没有宠物！'); return; }
    const count = g.pets.length;
    const spacing = Math.min(60, 600 / count);
    const startX = 360 - (count - 1) * spacing / 2;
    const positions = g.pets.map((_, i) => ({ x: startX + i * spacing, y: 300 }));
    setPetsPositions(positions);
    showToast(`🐾 ${count}只宠物排成一排！`);
    return;
  }

  showToast(`听不懂：「${t}」`);
}

// ─── 本地语音识别配置 ───────────────────────────────────────────────
const VOICE_API_URL = 'http://127.0.0.1:8765/api/transcribe';
let mediaRecorder = null;
let audioChunks = [];

// 开始语音指令（使用本地 Faster-Whisper 服务）
async function startVoiceCommand() {
  if (voiceActive) {
    // 停止录制
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
    voiceActive = false;
    document.getElementById('voiceStatus').textContent = '可用';
    return;
  }

  // 检查麦克风权限
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    // 停止这个测试流
    stream.getTracks().forEach(track => track.stop());
  } catch (e) {
    if (e.name === 'NotAllowedError') {
      showToast('🎤 麦克风权限被拒绝，请在浏览器设置中允许');
    } else {
      showToast('🎤 无法访问麦克风');
    }
    return;
  }

  voiceActive = true;
  audioChunks = [];
  document.getElementById('voiceStatus').textContent = '聆听中...';
  showToast('🎤 请说话（喊名字、名字+过来、所有宠物排队）', 4);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    // 优先使用 webm 编码，Safari 用 mp4
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/mp4')
        ? 'audio/mp4'
        : 'audio/webm';

    mediaRecorder = new MediaRecorder(stream, { mimeType });

    mediaRecorder.ondataavailable = (event) => {
      if (event.data && event.data.size > 0) {
        audioChunks.push(event.data);
      }
    };

    mediaRecorder.onstop = async () => {
      // 停止所有轨道
      stream.getTracks().forEach(track => track.stop());

      if (audioChunks.length === 0) {
        voiceActive = false;
        document.getElementById('voiceStatus').textContent = '可用';
        return;
      }

      document.getElementById('voiceStatus').textContent = '识别中...';

      // 合并音频块
      const audioBlob = new Blob(audioChunks, { type: mimeType });

      // 转换为 base64
      const reader = new FileReader();
      reader.onloadend = async () => {
        const base64 = reader.result.split(',')[1];

        // 发送到本地 Faster-Whisper API
        try {
          const response = await fetch(VOICE_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ audio: base64, language: 'zh' }),
          });

          if (!response.ok) {
            throw new Error(`API错误: ${response.status}`);
          }

          const result = await response.json();
          const text = result.text || '';
          const rawText = result.raw_text || text;

          // 记录识别日志
          console.log(`🎤 语音识别: "${rawText}" → "${text}"`);

          if (text) {
            showToast(`你说：「${text}」`, 3);
            executeVoiceCommand(text);
          } else {
            showToast('🎤 没听清楚，请再说一次');
          }
        } catch (e) {
          console.error('语音识别失败:', e);
          // 如果 API 不可用，尝试降级到浏览器原生识别
          if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
            showToast('🎤 本地识别服务未启动，请运行: python voice_server.py', 5);
          } else {
            showToast(`🎤 识别失败: ${e.message}`);
          }
        }

        voiceActive = false;
        document.getElementById('voiceStatus').textContent = '可用';
      };
      reader.readAsDataURL(audioBlob);
    };

    mediaRecorder.onerror = (e) => {
      console.error('MediaRecorder错误:', e);
      stream.getTracks().forEach(track => track.stop());
      voiceActive = false;
      document.getElementById('voiceStatus').textContent = '可用';
      showToast('🎤 录音出错');
    };

    // 开始录制，最长10秒
    mediaRecorder.start();
    setTimeout(() => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
    }, 10000);

  } catch (e) {
    console.error('录音错误:', e);
    voiceActive = false;
    document.getElementById('voiceStatus').textContent = '可用';
    if (e.name === 'NotAllowedError') {
      showToast('🎤 麦克风权限被拒绝');
    } else {
      showToast(`🎤 录音失败: ${e.message}`);
    }
  }
}
