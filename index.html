<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥚</text></svg>">
<title>孵蛋像素版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: monospace;
  color: #fff;
}
#wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  max-width: 100vmin;
  gap: 8px;
}
#c {
  border: 4px solid #444;
  background: #0a0a0a;
  /* 响应式：优先填满宽度，高度由 JS 控制 */
  width: min(1280px, 100vw);
  height: auto;
  aspect-ratio: 720 / 576;
  position: relative;
  z-index: 1;
}
#btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 4px 8px;
  max-width: 100%;
}
.bt {
  background: #222;
  border: 3px solid #555;
  color: #fff;
  padding: 8px 10px;
  font-family: monospace;
  font-size: 13px;
  cursor: pointer;
  min-width: 70px;
  min-height: 44px;
  text-align: center;
  flex: 1 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.bt:hover { background: #333; border-color: #888; }
.bt:active { background: #444; transform: scale(0.96); }
.bt.off { border-color: #f55; color: #faa; }
.bt .cooldown { color: #888; font-size: 11px; }
/* 道具按钮悬停 */
#overlay button:not([disabled]):hover { background: #333 !important; border-color: #888 !important; }
#overlay button:active { background: #444 !important; transform: scale(0.96); }
/* 商店按钮 */
#shopBtn { position:fixed; top:8px; right:8px; z-index:20; background:rgba(30,30,30,0.9); border:2px solid #FFD700; color:#FFD700; font-family:monospace; font-size:13px; padding:7px 14px; cursor:pointer; border-radius:4px; }
#shopBtn:hover { background:rgba(60,50,10,0.95); }
/* 道具瞄准模式 */
#toolAimHint { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); z-index:20; background:rgba(0,0,0,0.8); color:#fff; font-family:monospace; font-size:12px; padding:6px 16px; border-radius:4px; display:none; pointer-events:none; }
#toolCancelBtn { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); z-index:20; background:rgba(80,30,30,0.9); border:2px solid #f55; color:#fff; font-family:monospace; font-size:12px; padding:6px 16px; cursor:pointer; border-radius:4px; display:none; }
/* 场景切换固定图标按钮 */
.sceneNavBtn { width:44px; height:44px; border-radius:50%; background:rgba(0,0,0,0.7); border:2px solid rgba(255,255,255,0.4); color:rgba(255,255,255,0.85); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s, border-color 0.15s, transform 0.1s; user-select:none; pointer-events:auto; }
.sceneNavBtn:hover { background:rgba(60,60,60,0.85); border-color:rgba(255,255,255,0.8); transform:scale(1.08); }
.sceneNavBtn:active { transform:scale(0.95); }
#sceneNavLeft { position:fixed; left:10px; top:50%; transform:translateY(-50%); z-index:20; pointer-events:auto; }
#sceneNavRight { position:fixed; right:10px; top:50%; transform:translateY(-50%); z-index:20; pointer-events:auto; }
@media (max-width: 500px) {
  .bt {
    min-width: 60px;
    min-height: 48px;
    padding: 6px 8px;
    font-size: 12px;
  }
  .bt .cooldown { font-size: 10px; }
}
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  z-index: 10;
  padding: 20px;
}
#overlay.show { display: flex; }
#overlay .msg {
  background: #1a1a2e;
  border: 3px solid #555;
  padding: 16px 20px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  line-height: 1.7;
}
#overlay .msg .title { font-size: 16px; color: #FFD700; margin-bottom: 8px; }
#overlay .msg .pet { font-size: 18px; color: #FF69B4; margin: 8px 0; }
#overlay button { padding: 10px 24px; font-family: monospace; font-size: 14px; min-height: 44px; }
#evt {
  position: fixed;
  top: max(env(safe-area-inset-top), 20px);
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a2e;
  border: 2px solid #FFD700;
  padding: 8px 16px;
  font-size: 13px;
  display: none;
  z-index: 20;
  text-align: center;
  max-width: min(300px, calc(100vw - 32px));
}
#evt.show { display: block; }
</style>
</head>
<body>
<!-- 场景切换固定图标 -->
<button id="sceneNavLeft" class="sceneNavBtn" title="切换场景" onclick="toggleScene()">◀</button>
<button id="sceneNavRight" class="sceneNavBtn" title="切换场景" onclick="toggleScene()">▶</button>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="btns">
    <button class="bt" id="btnHeat" onclick="toggleHeat()">🔥 加热<br><span class="cooldown" id="heatStatus">开启</span></button>
    <button class="bt" id="btnIce" onclick="toggleIce()">🧊 冰袋<br><span class="cooldown" id="iceStatus">可用</span></button>
    <button class="bt" id="btnPet" onclick="doPet()" style="display:none">🫂 抚摸<br><span class="cooldown" id="petCd">可用</span></button>
    <button class="bt" id="btnFeed" onclick="showFeedSelect()" style="display:none">🍖 喂食<br><span class="cooldown" id="feedStatus">可用</span></button>
    <button class="bt" id="btnForage" onclick="doForage()">🔍 找食物<br><span class="cooldown" id="forageCd">可用</span></button>
    <button class="bt" id="btnBreed" onclick="doSynthesize()">⚗️ 合成<br><span class="cooldown" id="breedStatus">可用</span></button>
    <button class="bt" onclick="showAlbum()">📖 图鉴</button>
    <button class="bt" onclick="resetGame()">🔄 重开</button>
    <button class="bt" id="btnFlip" onclick="toggleCanvasFlip()">🔲 翻转</button>
    <button class="bt" id="btnInteract" onclick="showInteractSelect()">🎮 互动<br><span class="cooldown" id="interactStatus">可用</span></button>
    <button class="bt" id="btnVoice" onclick="startVoiceCommand()">🎤 喊话<br><span class="cooldown" id="voiceStatus">可用</span></button>
    <!-- 文字指令输入框 -->
    <input type="text" id="voiceTextInput" placeholder="输入指令..." onkeydown="if(event.key==='Enter')executeTextCommand()" style="position:fixed;top:68px;right:18px;width:120px;height:28px;background:rgba(30,30,30,0.85);border:1px solid #555;color:#fff;font-family:monospace;font-size:12px;padding:0 8px;border-radius:4px;outline:none;z-index:15;" />
    <button onclick="executeTextCommand()" style="position:fixed;top:68px;right:148px;width:26px;height:28px;background:rgba(30,30,30,0.85);border:1px solid #555;color:#fff;font-family:monospace;font-size:12px;cursor:pointer;border-radius:4px;z-index:15;padding:0;">▶</button>
    <button class="bt" onclick="showToolSelect()">🧰 道具</button>
  </div>
</div>
<div id="evt"></div>
<div id="overlay">
  <div class="msg" id="overlayMsg"></div>
  <button onclick="closeOverlay()">确定</button>
</div>
<!-- 互动模式退出按钮 -->
<div id="exitInteractBtn" style="display:none;position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:20;background:rgba(30,30,30,0.9);border:2px solid #f55;color:#fff;font-family:monospace;font-size:13px;padding:7px 18px;cursor:pointer;border-radius:4px;" onclick="exitInteractMode()" onmouseover="this.style.background='rgba(60,30,30,0.95)'" onmouseout="this.style.background='rgba(30,30,30,0.9)'">🚪 结束互动</div>
<!-- 商店按钮 -->
<button id="shopBtn" onclick="openShop()">🛒 商店</button>
<!-- 道具瞄准取消 -->
<button id="toolCancelBtn" onclick="cancelToolMode()">✕ 取消道具</button>
<div id="toolAimHint"></div>
<script type="module" src="src/main.js"></script>
</html>
