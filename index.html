<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥚</text></svg>">
<title>孵蛋像素版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
body {
  background: #000;
  font-family: monospace;
  color: #fff;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  padding-top: calc(44px + env(safe-area-inset-top, 0px));
  padding-bottom: env(safe-area-inset-bottom);
}

/* ─── 顶部导航栏 ─── */
#topBar {
  position: fixed;
  top: env(safe-area-inset-top, 0px);
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  height: 44px;
  background: #0a0a0a;
  border-bottom: 2px solid #333;
  padding: 0 10px;
  z-index: 9999;
  gap: 8px;
  -webkit-user-select: none;
  user-select: none;
}
#topBar .navBtn {
  width: 34px;
  height: 34px;
  border-radius: 6px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.8);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
#topBar .navBtn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.5); }
#topBar .navBtn:active { transform: scale(0.95); }
#topSceneTitle {
  flex: 1;
  font-size: 14px;
  font-weight: bold;
  text-align: center;
  color: #ccc;
  letter-spacing: 1px;
}
#topShopBtn {
  background: rgba(30,30,30,0.9);
  border: 1px solid #FFD700;
  color: #FFD700;
  font-family: monospace;
  font-size: 12px;
  padding: 5px 12px;
  cursor: pointer;
  border-radius: 4px;
  flex-shrink: 0;
  height: 30px;
  display: flex;
  align-items: center;
  gap: 4px;
}
#topShopBtn:hover { background: rgba(60,50,10,0.95); }
#topSettingsBtn {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.5);
  font-size: 16px;
  cursor: pointer;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  flex-shrink: 0;
  transition: color 0.15s, background 0.15s;
}
#topSettingsBtn:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.1); }

/* ─── 主容器 ─── */
#wrap {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 4px 0;
  min-height: 0;
}

/* ─── Canvas ─── */
#c {
  border: 3px solid #444;
  background: #0a0a0a;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  -ms-interpolation-mode: nearest-neighbor;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}

/* ─── 按钮栏（单行流式布局） ─── */
#btns {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 4px;
  padding: 0 8px 4px 8px;
  max-width: 100%;
  flex-shrink: 0;
}

.bt {
  background: #222;
  border: 2px solid #555;
  color: #fff;
  padding: 5px 8px;
  font-family: monospace;
  font-size: 12px;
  cursor: pointer;
  min-width: 60px;
  min-height: 36px;
  text-align: center;
  flex: 0 1 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  border-radius: 4px;
  transition: background 0.1s, border-color 0.1s, transform 0.08s;
}
.bt:hover { background: #333; border-color: #888; }
.bt:active { background: #444; transform: scale(0.96); }
.bt.off { border-color: #f55; color: #faa; }
.bt .cooldown { color: #888; font-size: 10px; }

/* 分组分隔符 */
.btnSep {
  width: 1px;
  height: 24px;
  background: #444;
  flex-shrink: 0;
  margin: 0 2px;
}

/* 文字指令行（内联在按钮流中） */
.cmdInline {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  margin-left: 2px;
}
#voiceTextInput {
  height: 28px;
  width: 110px;
  background: rgba(30,30,30,0.85);
  border: 1px solid #555;
  color: #fff;
  font-family: monospace;
  font-size: 12px;
  padding: 0 8px;
  border-radius: 4px;
  outline: none;
}
#voiceTextInput:focus { border-color: #888; }
#cmdSendBtn {
  width: 26px;
  height: 28px;
  background: rgba(30,30,30,0.85);
  border: 1px solid #555;
  color: #fff;
  font-family: monospace;
  font-size: 12px;
  cursor: pointer;
  border-radius: 4px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
#cmdSendBtn:hover { background: #333; border-color: #888; }

/* 道具按钮悬停 */
#overlay button:not([disabled]):hover { background: #333 !important; border-color: #888 !important; }
#overlay button:active { background: #444 !important; transform: scale(0.96); }

/* 道具瞄准模式 */
#toolAimHint { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); z-index:20; background:rgba(0,0,0,0.8); color:#fff; font-family:monospace; font-size:12px; padding:6px 16px; border-radius:4px; display:none; pointer-events:none; }
#toolCancelBtn { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); z-index:20; background:rgba(80,30,30,0.9); border:2px solid #f55; color:#fff; font-family:monospace; font-size:12px; padding:6px 16px; cursor:pointer; border-radius:4px; display:none; }

@media (max-width: 500px) {
  .bt {
    min-width: 54px;
    min-height: 40px;
    padding: 4px 6px;
    font-size: 11px;
  }
  .bt .cooldown { font-size: 9px; }
  #voiceTextInput { width: 100px; }
  #topBar { height: 40px; }
  #topSceneTitle { font-size: 13px; }
}

/* ─── Overlay ─── */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  z-index: 10;
  padding: 20px;
}
#overlay.show { display: flex; }
#overlay .msg {
  background: #1a1a2e;
  border: 3px solid #555;
  padding: 16px 20px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  line-height: 1.7;
}
#overlay .msg .title { font-size: 16px; color: #FFD700; margin-bottom: 8px; }
#overlay .msg .pet { font-size: 18px; color: #FF69B4; margin: 8px 0; }
#overlay button { padding: 10px 24px; font-family: monospace; font-size: 14px; min-height: 44px; }

/* ─── 事件/Toast 提示 ─── */
#evt {
  position: fixed;
  top: max(env(safe-area-inset-top, 0px) + 90px, 90px);
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a2e;
  border: 2px solid #FFD700;
  padding: 6px 14px;
  font-size: 13px;
  display: none;
  z-index: 20;
  text-align: center;
  max-width: min(300px, calc(100vw - 32px));
  border-radius: 4px;
}
#evt.show { display: block; }

/* ─── 互动/退出按钮 ─── */
#exitInteractBtn {
  display: none;
  position: fixed;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  background: rgba(30,30,30,0.9);
  border: 2px solid #f55;
  color: #fff;
  font-family: monospace;
  font-size: 13px;
  padding: 7px 18px;
  cursor: pointer;
  border-radius: 4px;
}
#exitInteractBtn:hover { background: rgba(60,30,30,0.95) !important; }
</style>
</head>
<body>
<!-- 顶部导航栏（替代旧版悬浮箭头 + 商店按钮） -->
<div id="topBar">
  <button class="navBtn" id="topNavLeft" onclick="toggleScene()" title="切换场景">◀</button>
  <span id="topSceneTitle">🥚 孵蛋室</span>
  <button class="navBtn" id="topNavRight" onclick="toggleScene()" title="切换场景">▶</button>
  <button id="topSettingsBtn" onclick="showSettings()" title="设置">⚙️</button>
  <button id="topShopBtn" onclick="openShop()">🛒 商店</button>
</div>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="btns">
    <!-- 环境 -->
    <button class="bt" id="btnHeat" onclick="toggleHeat()">🔥 加热<br><span class="cooldown" id="heatStatus">开启</span></button>
    <button class="bt" id="btnIce" onclick="toggleIce()">🧊 冰袋<br><span class="cooldown" id="iceStatus">可用</span></button>
    <div class="btnSep"></div>
    <!-- 操作 -->
    <button class="bt" id="btnPet" onclick="doPet()" style="display:none">🫂 抚摸<br><span class="cooldown" id="petCd">可用</span></button>
    <button class="bt" id="btnFeed" onclick="showFeedSelect()" style="display:none">🍖 喂食<br><span class="cooldown" id="feedStatus">可用</span></button>
    <button class="bt" id="btnForage" onclick="doForage()">🔍 找食物<br><span class="cooldown" id="forageCd">可用</span></button>
    <button class="bt" id="btnBreed" onclick="doSynthesize()">🐾 宠物<br><span class="cooldown" id="breedStatus">管理</span></button>
    <button class="bt" id="btnInteract" onclick="showInteractSelect()">🎮 互动<br><span class="cooldown" id="interactStatus">可用</span></button>
    <button class="bt" id="btnTools" onclick="showToolSelect()">🧰 道具</button>
    <div class="btnSep"></div>
    <!-- 工具 -->
    <button class="bt" id="btnAlbum" onclick="showAlbum()">📖 图鉴</button>

    <button class="bt" id="btnFlip" onclick="toggleCanvasFlip()">🔲 翻转</button>
    <button class="bt" id="btnVoice" onclick="startVoiceCommand()">🎤 喊话<br><span class="cooldown" id="voiceStatus">可用</span></button>
    <div class="btnSep"></div>
    <!-- 文字指令 -->
    <span class="cmdInline">
      <input type="text" id="voiceTextInput" placeholder="指令..." onkeydown="if(event.key==='Enter')executeTextCommand()" />
      <button id="cmdSendBtn" onclick="executeTextCommand()">▶</button>
    </span>
  </div>
</div>

<div id="evt"></div>

<div id="overlay">
  <div class="msg" id="overlayMsg"></div>
  <button onclick="closeOverlay()">确定</button>
</div>

<!-- 互动模式退出按钮 -->
<div id="exitInteractBtn" onclick="exitInteractMode()">🚪 结束互动</div>

<!-- 道具瞄准取消 + 提示 -->
<button id="toolCancelBtn" onclick="cancelToolMode()">✕ 取消道具</button>
<div id="toolAimHint"></div>

<script type="module" src="src/main.js"></script>
</body>
</html>
