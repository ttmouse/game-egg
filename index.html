function drawSunMoonToCtx(targetCtx) {
  const isDay = g.isDay;
  const t = g.time;
  if (isDay) {
    const sunX = 100 + (t / CYCLE) * 520;
    const sunY = 80 - Math.sin((t / CYCLE) * Math.PI) * 30;
    targetCtx.fillStyle = '#FFD700';
    targetCtx.beginPath(); targetCtx.arc(sunX, sunY, 22, 0, Math.PI * 2); targetCtx.fill();
    targetCtx.fillStyle = '#FFA500';
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 + g.lastTs / 2000;
      targetCtx.fillRect(sunX + Math.cos(a) * 28 - 1, sunY + Math.sin(a) * 28 - 6, 3, 12);
    }
    if (sunX > 300) {
      const cloudX = sunX - 80, cloudY = sunY - 20;
      targetCtx.fillStyle = 'rgba(255,255,255,0.8)';
      [[cloudX, cloudY, 24], [cloudX + 18, cloudY - 8, 18], [cloudX + 30, cloudY + 2, 16]].forEach(([cx, cy, cr]) => {
        targetCtx.beginPath(); targetCtx.arc(cx, cy, cr, 0, Math.PI * 2); targetCtx.fill();
      });
    }
  } else {
    targetCtx.fillStyle = '#FFFACD';
    targetCtx.beginPath(); targetCtx.arc(620, 70, 28, 0, Math.PI * 2); targetCtx.fill();
    targetCtx.fillStyle = '#E8E4B8';
    [[608, 60, 5], [628, 75, 4], [618, 82, 3], [632, 58, 3]].forEach(([mx, my, mr]) => {
      targetCtx.beginPath(); targetCtx.arc(mx, my, mr, 0, Math.PI * 2); targetCtx.fill();
    });
    targetCtx.strokeStyle = '#D4C896'; targetCtx.lineWidth = 2;
    targetCtx.beginPath(); targetCtx.arc(608, 65, 10, 0, Math.PI * 2); targetCtx.stroke();
  }
}

function drawIncubatorToCtx(targetCtx) {
  const ex = 360, ey = 270, ew = 180, eh = 120;
  targetCtx.fillStyle = '#3a3020';
  targetCtx.fillRect(ex - ew/2 - 4, ey - eh/2 - 4, ew + 8, eh + 8);
  targetCtx.fillStyle = '#2a2010';
  targetCtx.fillRect(ex - ew/2, ey - eh/2, ew, eh);
  targetCtx.fillStyle = 'rgba(255,200,100,0.08)';
  targetCtx.fillRect(ex - ew/2, ey - eh/2, ew, eh);
  targetCtx.strokeStyle = '#555';
  targetCtx.lineWidth = 2;
  targetCtx.strokeRect(ex - ew/2, ey - eh/2, ew, eh);
  targetCtx.fillStyle = '#4a3a20';
  targetCtx.fillRect(ex - ew/2 - 8, ey - eh/2 + eh - 20, ew + 16, 20);
  targetCtx.fillRect(ex - ew/2 - 8, ey - eh/2, 8, eh);
  targetCtx.fillRect(ex + ew/2, ey - eh/2, 8, eh);
}

function drawEggToCtx(targetCtx) {
  if (g.hatchPct >= 100 || g.isHatching) return;
  const ex = 360, ey = 270;
  const crack = Math.floor(g.hatchPct / 25);
  const eggW = 60, eggH = 82;
  targetCtx.save();
  targetCtx.imageSmoothingEnabled = false;
  // Egg body - 真正的椭圆蛋形
  for (let py = -eggH / 2; py < eggH / 2; py++) {
    const prog = py / (eggH / 2);
    let w;
    if (py < 0) {
      w = Math.floor(eggW / 2 * Math.sqrt(1 - prog * prog * 0.85));
    } else {
      w = Math.floor(eggW / 2 * Math.sqrt(1 - prog * prog * 0.95));
    }
    let col;
    if (py < -eggH / 4) {
      col = '#f8f0e0';
    } else if (py < 0) {
      col = '#f5e6c8';
    } else if (py < eggH / 4) {
      col = '#eed8a8';
    } else {
      col = '#e8d098';
    }
    targetCtx.fillStyle = col;
    targetCtx.fillRect(ex - w, ey + py, w * 2, 1);
  }
  // 斑点装饰
  targetCtx.fillStyle = 'rgba(180, 140, 80, 0.35)';
  const spots = [[-15, -25], [10, -15], [-5, 5], [18, -5], [-20, 10], [12, 20]];
  spots.forEach(([dx, dy]) => {
    const spotW = 5 + Math.abs(dx) % 3;
    targetCtx.fillRect(ex + dx - spotW / 2, ey + dy - spotW / 2, spotW, spotW);
  });
  // 高光
  targetCtx.fillStyle = 'rgba(255, 255, 240, 0.6)';
  targetCtx.fillRect(ex - 12, ey - eggH / 2 + 12, 6, 10);
  // Crack stages
  if (crack > 0) {
    targetCtx.fillStyle = '#5a4030';
    const cracks = [
      [[-8, -18], [2, -12]],
      [[-18, 0], [8, 6], [-6, 14]],
      [[-24, -6], [14, -10], [-12, 20], [2, -24]],
    ];
    cracks.slice(0, crack).forEach(crackGroup => {
      crackGroup.forEach(([cx, cy]) => {
        targetCtx.fillRect(ex + cx - 2, ey + cy - 2, 6, 4);
      });
    });
  }
  targetCtx.restore();
  // Progress bar
  const bx = ex - 60, by = ey + eggH / 2 + 12, bw = 120, bh = 10;
  targetCtx.fillStyle = '#222';
  targetCtx.fillRect(bx, by, bw, bh);
  targetCtx.fillStyle = g.hatchPct < 100 ? '#FFD700' : '#4CAF50';
  targetCtx.fillRect(bx, by, bw * g.hatchPct / 100, bh);
  drawTextToCtx(targetCtx, bx, by + 12, `孵化 ${Math.floor(g.hatchPct)}%`, P.dim, 1);
  // Days hint
  if (g.nextHatchDay > 0) {
    const daysLeft = g.nextHatchDay - g.dayCount;
    if (daysLeft > 0) drawTextToCtx(targetCtx, ex - 75, ey + eggH / 2 + 30, `还剩${daysLeft}天`, P.warn, 2);
    drawTextToCtx(targetCtx, ex - 64, ey + eggH / 2 + 55, `(${g.dayCount}天)`, P.dim, 2);
  }
}

function drawHatchingAnimToCtx(targetCtx) {
  if (!g.isHatching) return;
  const ex = 360, ey = 270;
  const t = g.hatchAnim;
  // Egg wobble
  const wobble = Math.sin(t * 20) * (3 + t * 5);
  targetCtx.save();
  targetCtx.imageSmoothingEnabled = false;
  // Glowing crack
  targetCtx.fillStyle = `rgba(255,220,100,${0.3 + t * 0.5})`;
  targetCtx.beginPath(); targetCtx.arc(ex + wobble, ey, 50 + t * 20, 0, Math.PI * 2); targetCtx.fill();
  targetCtx.fillStyle = '#f5e6c8';
  targetCtx.beginPath(); targetCtx.ellipse(ex + wobble, ey, 35, 45, 0, 0, Math.PI * 2); targetCtx.fill();
  // Flash
  if (t > 0.8) {
    const flash = (t - 0.8) / 0.2;
    targetCtx.fillStyle = `rgba(255,255,200,${flash * 0.8})`;
    targetCtx.beginPath(); targetCtx.ellipse(ex, ey, 60 + flash * 30, 70 + flash * 30, 0, 0, Math.PI * 2); targetCtx.fill();
  }
  targetCtx.restore();
}

// 在场景中绘制宠物到指定Context（支持多宠物独立状态）
// targetCtx: 目标画布上下文
// pet: 宠物对象
// x, y: 宠物在场景中的位置
// options: { isDragging, clickReaction, petMood, moodBubble }
function drawPetToCtx(targetCtx, pet, x, y, options) {
  if (!pet) return;

  const basePx = x, basePy = y;
  let scale = 2.5;
  const isDragging = options?.isDragging || false;
  const clickReaction = options?.clickReaction || null;
  const moodBubble = options?.moodBubble || { show: false };

  if (isDragging) scale = 2.5 * 1.15; // 拖拽时放大

  // 点击反应动画
  let offsetY = 0;
  if (clickReaction) {
    const t = clickReaction.time;
    const type = clickReaction.type;
    if (type === 'jump') {
      offsetY = -Math.sin(t * Math.PI) * 30;
    } else if (type === 'bounce') {
      const bounce = Math.abs(Math.sin(t * Math.PI * 3)) * (1 - t);
      offsetY = -bounce * 20;
    } else if (type === 'spin') {
      scale = 2.5 * (1 + Math.sin(t * Math.PI * 4) * 0.1);
    } else if (type === 'heart') {
      offsetY = Math.sin(t * Math.PI * 4) * 5;
    }
  }

  // Create a temporary canvas for the pet sprite
  const petCanvas = document.createElement('canvas');
  petCanvas.width = 48;
  petCanvas.height = 48;
  drawPetSprite(petCanvas, pet, g.lastTs / 1000);

  // Draw scaled pet to target canvas
  targetCtx.save();
  targetCtx.imageSmoothingEnabled = false;
  // 拖拽时添加阴影效果
  if (isDragging) {
    targetCtx.shadowColor = 'rgba(255, 105, 180, 0.5)';
    targetCtx.shadowBlur = 15;
  }
  targetCtx.drawImage(petCanvas, basePx - 24 * scale, basePy - 24 * scale + offsetY, 48 * scale, 48 * scale);
  targetCtx.restore();

  // ─── 地面投影 ───
  if (!isDragging) {
    const shadowW = 50 * scale * 0.5;
    const shadowH = 8 * scale * 0.5;
    const shadowY = basePy + 20 * scale + offsetY;
    targetCtx.save();
    targetCtx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    targetCtx.beginPath();
    targetCtx.ellipse(basePx, shadowY, shadowW, shadowH, 0, 0, Math.PI * 2);
    targetCtx.fill();
    targetCtx.restore();
  }

  // ─── 撒娇气泡（跟随宠物位置） ───
  if (moodBubble.show) {
    const bubbleX = basePx + 60, bubbleY = basePy - 80;
    targetCtx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    targetCtx.fillRect(bubbleX - 40, bubbleY - 16, 80, 24);
    targetCtx.fillStyle = '#333';
    targetCtx.fillRect(bubbleX - 8, bubbleY + 8, 8, 4);
    targetCtx.fillRect(bubbleX, bubbleY + 12, 8, 4);
    targetCtx.fillStyle = '#FF69B4';
    targetCtx.font = 'bold 12px sans-serif';
    targetCtx.fillText('摸摸我~', bubbleX - 28, bubbleY + 4);
  }

  // Draw pet name and star rating above
  const starStr = '★'.repeat(pet.star || 1) + '☆'.repeat(5 - (pet.star || 1));
  drawTextToCtx(targetCtx, basePx - 40, basePy - 120, pet.name, P.txt, 2);
  drawTextToCtx(targetCtx, basePx - 40, basePy - 96, starStr, STAR_COLORS[pet.star] || '#aaa', 1);

  // Gene icons
  const geneStr = (pet.genes || []).map(gk => (GENES[gk] || {}).icon || '').join('');
  if (geneStr) drawTextToCtx(targetCtx, basePx + 50, basePy - 112, geneStr, P.dim, 1);

  // Level badge
  drawTextToCtx(targetCtx, basePx + 50, basePy - 96, `Lv${pet.level}`, '#aaa', 1);

  // Hunger warning - 使用全局饥饿度
  if (g.hunger < 30) {
    drawTextToCtx(targetCtx, basePx + 90, basePy - 100, '饿了!', P.danger, 2);
  }

  // Days remaining indicator
  if (pet.expireDay) {
    const daysLeft = pet.expireDay - g.dayCount;
    const daysColor = daysLeft <= 3 ? P.danger : (daysLeft <= 5 ? P.warn : P.dim);
    drawTextToCtx(targetCtx, basePx - 35, basePy + 130, `剩${daysLeft}天`, daysColor, 2);
  }

  // Exp bar below pet
  const expNext = EXP_TABLE[pet.level] || EXP_TABLE[10];
  const expCur = pet.level > 1 ? EXP_TABLE[pet.level - 1] : 0;
  const expProg = Math.max(0, Math.min(1, (pet.exp - expCur) / (expNext - expCur)));
  const barW = 80;
  targetCtx.fillStyle = P.barBg;
  targetCtx.fillRect(basePx - barW / 2, basePy + 140, barW, 6);
  targetCtx.fillStyle = '#90EE90';
  targetCtx.fillRect(basePx - barW / 2, basePy + 140, Math.floor(barW * expProg), 6);
}


// ─── Main Loop ──────────────────────────────────────────────────
function loop() {
  const now = Date.now();
  const dt = Math.min((now - g.lastTs) / 1000, 1);
  g.lastTs = now;

  update(dt);

  // 更新场景切换动画
  if (g.sceneTransition.active) {
    g.sceneTransition.progress += dt / 0.3; // 300ms过渡
    if (g.sceneTransition.progress >= 1) {
      g.sceneTransition.progress = 1;
      g.sceneTransition.active = false;
      g.currentScene = g.sceneTransition.to;
      saveGame();
    }
  }

  // Render (canvas 720x576)
  ctx.clearRect(0, 0, 720, 576);

  // ─── 滑动过渡渲染 ───
  if (g.sceneTransition.active) {
    const p = g.sceneTransition.progress;
    const ease = 1 - Math.pow(1 - p, 3); // ease-out cubic
    const toPets = g.sceneTransition.to === 'pets';

    // 旧场景和新场景的偏移量
    const oldOffset = Math.round((toPets ? ease : -ease) * 720);
    const newOffset = Math.round((toPets ? (1 - ease) : -(1 - ease)) * 720);

    // ── 旧场景 ──
    const oldCanvas = document.createElement('canvas');
    oldCanvas.width = 720; oldCanvas.height = 576;
    const oldCtx = oldCanvas.getContext('2d');
    oldCtx.imageSmoothingEnabled = false;
    if (g.sceneTransition.from === 'incubator') {
      drawBgToCtx(oldCtx);
      drawSunMoonToCtx(oldCtx);
      drawIncubatorToCtx(oldCtx);
      if (g.isHatching) drawHatchingAnimToCtx(oldCtx);
      else drawEggToCtx(oldCtx);
    } else {
      drawBgToCtx(oldCtx);
      drawSunMoonToCtx(oldCtx);
      // 旧场景过渡：绘制所有宠物（depth sorted）
      if (g.pets.length > 0) {
        const sortedPets = [...g.pets].sort((a, b) => {
          const da = (a.isoCol || 0) + (a.isoRow || 0);
          const db = (b.isoCol || 0) + (b.isoRow || 0);
          if (da !== db) return da - db;
          return (a.isoCol || 0) - (b.isoCol || 0);
        });
        sortedPets.forEach(pet => {
          if (pet.scenePos) {
            const feetY = pet.scenePos.y - TILE_H / 2;
            drawPetToCtx(oldCtx, pet, pet.scenePos.x, feetY, {
              isDragging: g.draggingPetId === pet.id
            });
          }
        });
      } else {
        drawTextToCtx(oldCtx, 300, 260, '还没有宠物', P.dim, 2);
        drawTextToCtx(oldCtx, 290, 290, '去孵蛋室孵化吧', P.dim, 1);
      }
    }
    ctx.drawImage(oldCanvas, oldOffset, 0);

    // ── 新场景 ──
    const newCanvas = document.createElement('canvas');
    newCanvas.width = 720; newCanvas.height = 576;
    const newCtx = newCanvas.getContext('2d');
    newCtx.imageSmoothingEnabled = false;
    if (g.sceneTransition.to === 'incubator') {
      drawBgToCtx(newCtx);
      drawSunMoonToCtx(newCtx);
      drawIncubatorToCtx(newCtx);
      if (g.isHatching) drawHatchingAnimToCtx(newCtx);
      else drawEggToCtx(newCtx);
    } else {
      drawBgToCtx(newCtx);
      drawSunMoonToCtx(newCtx);
      // 新场景过渡：绘制所有宠物（depth sorted）
      if (g.pets.length > 0) {
        const sortedPets = [...g.pets].sort((a, b) => {
          const da = (a.isoCol || 0) + (a.isoRow || 0);
          const db = (b.isoCol || 0) + (b.isoRow || 0);
          if (da !== db) return da - db;
          return (a.isoCol || 0) - (b.isoCol || 0);
        });
        sortedPets.forEach(pet => {
          if (pet.scenePos) {
            const feetY = pet.scenePos.y - TILE_H / 2;
            drawPetToCtx(newCtx, pet, pet.scenePos.x, feetY, {
              isDragging: g.draggingPetId === pet.id
            });
          }
        });
      } else {
        drawTextToCtx(newCtx, 300, 260, '还没有宠物', P.dim, 2);
        drawTextToCtx(newCtx, 290, 290, '去孵蛋室孵化吧', P.dim, 1);
      }
    }
    ctx.drawImage(newCanvas, newOffset, 0);
  } else {
    // 正常渲染当前场景
    drawBg();
    drawSunMoon();
    if (g.currentScene === 'incubator') {
      drawIncubator();
      if (g.isHatching) {
        drawHatchingAnim();
      } else {
        drawEgg();
      }
    } else {
      // 宠物间场景：绘制所有宠物
      if (g.pets.length > 0) {
        // 先绘制爱心粒子（所有宠物共享）
        g.heartParticles.forEach(p => {
          ctx.fillStyle = `rgba(255, 105, 180, ${p.life})`;
          const hx = Math.floor(p.x), hy = Math.floor(p.y);
          const hs = Math.floor(p.size);
          ctx.fillRect(hx - hs/2, hy - hs/4, hs/2, hs/4);
          ctx.fillRect(hx, hy - hs/4, hs/2, hs/4);
          ctx.fillRect(hx - hs/4, hy, hs/2, hs/2);
          ctx.fillRect(hx, hy, hs/2, hs/2);
        });
        // 绘制每只宠物（按 isometric 深度排序：col+row 小的先画，同深度按 col 排）
        const sortedPets = [...g.pets].sort((a, b) => {
          const da = (a.isoCol || 0) + (a.isoRow || 0);
          const db = (b.isoCol || 0) + (b.isoRow || 0);
          if (da !== db) return da - db;
          return (a.isoCol || 0) - (b.isoCol || 0);
        });
        sortedPets.forEach(pet => {
          if (pet.scenePos) {
            // 脚底落在 isometric tile 顶端（tile center y - TILE_H/2）
            const feetY = pet.scenePos.y - TILE_H / 2;
            drawPet(pet, pet.scenePos.x, feetY, {
              isDragging: g.draggingPetId === pet.id,
              clickReaction: pet.clickReaction || null,
              petMood: pet.petMood || 'normal',
              moodBubble: pet.moodBubble || { show: false },
            });
          }
        });
      } else {
        drawText('还没有宠物', 300, 260, P.dim, 2);
        drawText('去孵蛋室孵化吧', 290, 290, P.dim, 1);
      }
    }
  }

  // ─── 场景切换箭头（覆盖在场景内容上方，滑动时隐藏） ───
  if (!g.sceneTransition.active) {
    const canSwitchToPets = g.pets.length > 0;

    // 左箭头：圆形按钮 + 三角形（宠物间时显示）
    if (g.currentScene === 'pets') {
      // 圆形背景
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.arc(28, canvas.height * 0.5, 24, 0, Math.PI * 2);
      ctx.fill();
      // 三角形箭头
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.moveTo(36, canvas.height * 0.5);
      ctx.lineTo(16, canvas.height * 0.5 - 14);
      ctx.lineTo(16, canvas.height * 0.5 + 14);
      ctx.closePath();
      ctx.fill();
    }

    // 右箭头：圆形按钮 + 三角形（孵蛋室且有宠物时显示）
    if (g.currentScene === 'incubator' && canSwitchToPets) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.arc(692, canvas.height * 0.5, 24, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.moveTo(684, canvas.height * 0.5);
      ctx.lineTo(704, canvas.height * 0.5 - 14);
      ctx.lineTo(704, canvas.height * 0.5 + 14);
      ctx.closePath();
      ctx.fill();
    }
  }

  // 场景标签（顶部居中）
  const sceneLabel = g.currentScene === 'incubator' ? '🥚 孵蛋室' : '🫂 宠物间';
  drawText(sceneLabel, 310, 8, '#aaa', 1);

  drawHUD();
  drawFeedInventory();
  drawPetsList();

  // 每帧更新按钮UI（冷却时间等）
  updateBtnUI();

  requestAnimationFrame(loop);
}

// ─── Init ────────────────────────────────────────────────────────
loadGame();
updateBtnUI();
g.lastTs = Date.now();
loop();

// Auto-save every 30s
setInterval(saveGame, 30000);
</script>
</body>
