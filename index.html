<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥚</text></svg>">
<title>孵蛋像素版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: monospace;
  color: #fff;
}
#wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  max-width: 100vmin;
  gap: 8px;
}
#c {
  border: 4px solid #444;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  -webkit-font-smoothing: none;
  -moz-osx-font-smoothing: unset;
  font-smooth: never;
  background: #0a0a0a;
  /* 优先填满宽度，aspect-ratio 自动算出高度 */
  width: min(720px, 100vw);
  height: auto;
  aspect-ratio: 720 / 576;
}
#btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 4px 8px;
  max-width: 100%;
}
.bt {
  background: #222;
  border: 3px solid #555;
  color: #fff;
  padding: 8px 10px;
  font-family: monospace;
  font-size: 13px;
  cursor: pointer;
  min-width: 70px;
  min-height: 44px;
  text-align: center;
  flex: 1 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.bt:hover { background: #333; border-color: #888; }
.bt:active { background: #444; transform: scale(0.96); }
.bt.off { border-color: #f55; color: #faa; }
.bt .cooldown { color: #888; font-size: 11px; }
@media (max-width: 500px) {
  .bt {
    min-width: 60px;
    min-height: 48px;
    padding: 6px 8px;
    font-size: 12px;
  }
  .bt .cooldown { font-size: 10px; }
}
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  z-index: 10;
  padding: 20px;
}
#overlay.show { display: flex; }
#overlay .msg {
  background: #1a1a2e;
  border: 3px solid #555;
  padding: 16px 20px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  line-height: 1.7;
}
#overlay .msg .title { font-size: 16px; color: #FFD700; margin-bottom: 8px; }
#overlay .msg .pet { font-size: 18px; color: #FF69B4; margin: 8px 0; }
#overlay button { padding: 10px 24px; font-family: monospace; font-size: 14px; min-height: 44px; }
#evt {
  position: fixed;
  top: max(env(safe-area-inset-top), 20px);
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a2e;
  border: 2px solid #FFD700;
  padding: 8px 16px;
  font-size: 13px;
  display: none;
  z-index: 20;
  text-align: center;
  max-width: min(300px, calc(100vw - 32px));
}
#evt.show { display: block; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="btns">
    <button class="bt" id="btnHeat" onclick="toggleHeat()">🔥 加热<br><span class="cooldown" id="heatStatus">开启</span></button>
    <button class="bt" id="btnIce" onclick="toggleIce()">🧊 冰袋<br><span class="cooldown" id="iceStatus">可用</span></button>
    <button class="bt" id="btnPet" onclick="doPet()" style="display:none">🫂 抚摸<br><span class="cooldown" id="petCd">可用</span></button>
    <button class="bt" id="btnFeed" onclick="doFeed()" style="display:none">🍖 喂食<br><span class="cooldown" id="feedStatus">可用</span></button>
    <button class="bt" id="btnForage" onclick="doForage()">🔍 找食物<br><span class="cooldown" id="forageCd">可用</span></button>
    <button class="bt" id="btnBreed" onclick="doSynthesize()">⚗️ 合成<br><span class="cooldown" id="breedStatus">可用</span></button>
    <button class="bt" onclick="showAlbum()">📖 图鉴</button>
    <button class="bt" onclick="resetGame()">🔄 重开</button>
  </div>
</div>
<div id="evt"></div>
<div id="overlay">
  <div class="msg" id="overlayMsg"></div>
  <button onclick="closeOverlay()">确定</button>
</div>
<script>
// ─── Constants ──────────────────────────────────────────────────
const DAY_SEC = 600, NGT_SEC = 300, CYCLE = DAY_SEC + NGT_SEC;
const TEMP_MIN = 20, TEMP_MAX = 45, TEMP_OPT_MIN = 36.5, TEMP_OPT_MAX = 38.5;
const POWER_MAX = 100, HEAT_DRAIN = 2, POWER_DAY_REGEN = 150, POWER_NGT_REGEN = 75;
const HATCH_RATE = 1.5, HATCH_RATE_COLD = 0.5, HATCH_RATE_HOT = -1.0;
const PET_COOLDOWN = 5, FEED_COOLDOWN = 120, FORAGE_COOLDOWN = 30;
const INV_MAX = 10;
const PET_MAX = 8; // 宠物上限

// 基因类型
const GENES = {
  fire:   { name: '火', color: '#FF4500', icon: '🔥' },
  water:  { name: '水', color: '#1E90FF', icon: '💧' },
  grass:  { name: '草', color: '#32CD32', icon: '🌿' },
  electric:{ name: '电', color: '#FFD700', icon: '⚡' },
  ice:    { name: '冰', color: '#87CEEB', icon: '❄' },
  dark:   { name: '暗', color: '#4B0082', icon: '🌑' },
  light:  { name: '光', color: '#FFFACD', icon: '☀' },
  wind:   { name: '风', color: '#98FB98', icon: '🌀' },
};

// 星级颜色
const STAR_COLORS = ['', '#AAAAAA', '#DDDDDD', '#FFD700', '#FF69B4', '#FF4500'];

// 经验表：每等级需要的累计经验
const EXP_TABLE = [0, 100, 250, 500, 900, 1500, 2300, 3500, 5000, 7000, 10000];

// ─── Palette ────────────────────────────────────────────────────
const P = {
  skyDay: '#87CEEB', skyNgt: '#0d1b2a',
  sun: '#FFD700', moon: '#E0E0E0', star: '#FFFFFF',
  ground: '#8B4513',
  eggLight: '#FFF8DC', eggShd: '#D4A574', eggCrack: '#8B7355',
  incBase: '#8B0000', incLight: '#CD5C5C', flame: ['#FF4500','#FF8C00','#FFD700'],
  heart: '#FF69B4',
  tempHot: '#FF4500', tempCold: '#00BFFF',
  barBg: '#333', barFill: '#555',
  white: '#FFFFFF', black: '#000000',
  txt: '#FFFFFF', dim: '#AAAAAA',
  happy: '#90EE90', warn: '#FFA500', danger: '#FF4444',
  eggInt: '#FFE4B5',
  grassLight: '#7CFC00', grassDark: '#228B22',
  cloud: '#FFFFFF',
  starFull: '#FFD700', starEmpty: '#444444',
};

// ─── State ──────────────────────────────────────────────────────
let g = {
  temp: 25,           // °C
  hatchPct: 0,        // 0-100
  intimacy: 50,      // 0-100
  power: 80,         // 0-100
  heatOn: false,
  iceOn: false,      // 冰袋降温中
  time: 0,           // seconds in cycle
  isDay: true,
  petCdLeft: 0,
  feedCdLeft: 0,
  forageCdLeft: 0,
  hunger: 100,     // 饥饿度 0-100
  lastTs: Date.now(),
  inventory: { worm: 2, fruit: 1, treat: 0 },
  eggs: [{ id: 1, temp: 25, hatch: 0, intimacy: 50 }],
  pets: [],
  nextHatchDay: 0,  // 第几天可以孵化下一只
  eventCooldown: 0,
  eventMsg: '',
  eventTimer: 0,
  crackStage: 0,      // 0-4 visual stage
  babyName: '',
  babyTraits: [],
  isHatching: false,
  hatchAnim: 0,
  powerRegenTimer: 0,
  feedTimer: 0,
  dayCount: 0,
  touchedToday: false,
  currentPet: null,  // 当前显示的宠物
  currentScene: 'incubator', // 'incubator' | 'pets'
  sceneTransition: { active: false, progress: 0, from: 'incubator', to: 'pets' },

  // ─── 宠物互动增强（全局状态） ───
  heartParticles: [],       // 爱心粒子特效（全局共享）

  // ─── 拖拽系统 ───
  draggingPetId: null,     // 当前正在拖拽的宠物ID
  dragOffsetX: 0,          // 拖拽偏移X
  dragOffsetY: 0,          // 拖拽偏移Y
};

// ─── Sound System ────────────────────────────────────────────────
let audioCtx = null;
let soundEnabled = true; // 音效开关，默认开启

// 初始化 AudioContext（需要用户交互后才能创建）
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

// 播放指定频率和时长的音调
function playTone(freq, duration, type = 'sine', volume = 0.3, startTime = 0) {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime + startTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + startTime);
  osc.stop(audioCtx.currentTime + startTime + duration);
}

// 播放和弦
function playChord(freqs, duration, type = 'sine', volume = 0.2) {
  if (!soundEnabled || !audioCtx) return;
  freqs.forEach(f => playTone(f, duration, type, volume));
}

// ─── 音效库 ──────────────────────────────────────────────────────

// 孵化成功 - 上升音阶 + 和弦
function soundHatch() {
  if (!audioCtx) initAudio();
  const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
  notes.forEach((n, i) => playTone(n, 0.3, 'sine', 0.25, i * 0.12));
  playChord([1047, 1319, 1568], 0.5, 'sine', 0.15, 0.4); // C6, E6, G6
}

// 喂食 - 根据食物类型不同音效
function soundFeed(type) {
  if (!audioCtx) initAudio();
  if (type === 'treat') {
    // 零食：清脆的"叮"声
    playTone(880, 0.1, 'sine', 0.3);
    playTone(1100, 0.15, 'sine', 0.2, 0.05);
  } else if (type === 'fruit') {
    // 水果：柔和的"噗"声
    playTone(440, 0.15, 'triangle', 0.25);
    playTone(330, 0.2, 'triangle', 0.2, 0.08);
  } else {
    // 虫子：有趣的"吱"声
    playTone(600, 0.08, 'square', 0.15);
    playTone(800, 0.1, 'square', 0.12, 0.06);
  }
}

// 抚摸 - 柔和的"噗"声
function soundPet() {
  if (!audioCtx) initAudio();
  playTone(300, 0.12, 'sine', 0.2);
  playTone(250, 0.15, 'sine', 0.15, 0.1);
}

// 合成成功 - 魔法般的闪烁声
function soundSynth(mutation = false) {
  if (!audioCtx) initAudio();
  if (mutation) {
    // 突变：惊喜的上滑音
    playTone(400, 0.1, 'sine', 0.25);
    playTone(600, 0.1, 'sine', 0.25, 0.08);
    playTone(900, 0.15, 'sine', 0.25, 0.16);
    playChord([900, 1120, 1350], 0.3, 'triangle', 0.15, 0.25);
  } else {
    // 普通合成：轻柔的上升音
    playTone(523, 0.15, 'sine', 0.2);
    playTone(659, 0.15, 'sine', 0.2, 0.12);
    playTone(784, 0.2, 'sine', 0.2, 0.24);
  }
}

// 觅食成功 - 轻快的"叮"声
function soundForage() {
  if (!audioCtx) initAudio();
  playTone(880, 0.08, 'sine', 0.25);
  playTone(1100, 0.1, 'sine', 0.2, 0.06);
  playTone(1320, 0.12, 'sine', 0.15, 0.12);
}

// 加热开启 - 温暖的启动声
function soundHeatOn() {
  if (!audioCtx) initAudio();
  playTone(150, 0.3, 'sawtooth', 0.15);
  playTone(200, 0.25, 'sawtooth', 0.12, 0.1);
}

// 冰敷开启 - 清凉的冰冻声
function soundIceOn() {
  if (!audioCtx) initAudio();
  playTone(1200, 0.1, 'sine', 0.2);
  playTone(900, 0.15, 'sine', 0.15, 0.08);
  playTone(600, 0.2, 'sine', 0.1, 0.15);
}

// 随机事件提示 - 轻柔的提示音
function soundEvent() {
  if (!audioCtx) initAudio();
  playTone(660, 0.1, 'sine', 0.15);
  playTone(880, 0.12, 'sine', 0.12, 0.1);
}

// 宠物离开 - 悲伤的下行音
function soundPetLeave() {
  if (!audioCtx) initAudio();
  playTone(400, 0.2, 'sine', 0.2);
  playTone(350, 0.2, 'sine', 0.18, 0.15);
  playTone(300, 0.25, 'sine', 0.15, 0.3);
  playTone(250, 0.3, 'sine', 0.1, 0.45);
}

// 升级 - 庆祝的上行音阶
function soundLevelUp() {
  if (!audioCtx) initAudio();
  const notes = [523, 587, 659, 698, 784, 880, 988, 1047];
  notes.forEach((n, i) => playTone(n, 0.15, 'sine', 0.2, i * 0.08));
}

// 场景切换 - 平滑的过渡音
function soundSceneSwitch() {
  if (!audioCtx) initAudio();
  playTone(440, 0.08, 'sine', 0.15);
  playTone(550, 0.08, 'sine', 0.12, 0.05);
}

// 警告音 - 急促的警报声
function soundWarning() {
  if (!audioCtx) initAudio();
  for (let i = 0; i < 3; i++) {
    playTone(800, 0.1, 'square', 0.15, i * 0.15);
    playTone(600, 0.1, 'square', 0.12, i * 0.15 + 0.05);
  }
}

// 裂纹音效 - 破裂声
function soundCrack() {
  if (!audioCtx) initAudio();
  playTone(100, 0.1, 'sawtooth', 0.2);
  playTone(80, 0.15, 'sawtooth', 0.15, 0.05);
  playTone(120, 0.1, 'sawtooth', 0.1, 0.1);
}

// 弹窗关闭 - 轻微的确认音
function soundClose() {
  if (!audioCtx) initAudio();
  playTone(330, 0.08, 'sine', 0.12);
}

// 统一音效接口
const SOUNDS = {
  hatch: soundHatch,
  feedTreat: () => soundFeed('treat'),
  feedFruit: () => soundFeed('fruit'),
  feedWorm: () => soundFeed('worm'),
  pet: soundPet,
  synth: () => soundSynth(false),
  synthMutation: () => soundSynth(true),
  forage: soundForage,
  heatOn: soundHeatOn,
  iceOn: soundIceOn,
  event: soundEvent,
  petLeave: soundPetLeave,
  levelUp: soundLevelUp,
  sceneSwitch: soundSceneSwitch,
  warning: soundWarning,
  crack: soundCrack,
  close: soundClose,
};

function playSound(name) {
  if (SOUNDS[name]) SOUNDS[name]();
}

// ─── Canvas ─────────────────────────────────────────────────────
const canvas = document.getElementById('c');
canvas.width = 720;
canvas.height = 720;
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// 获取画布坐标（支持鼠标和触摸）
function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  // rect.width/height 是显示尺寸，canvas.width/height 是实际像素尺寸
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  let clientX, clientY;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    clientX = e.changedTouches[0].clientX;
    clientY = e.changedTouches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

// 触摸事件辅助：获取指定触摸点
function getTouchPoint(e, index = 0) {
  if (e.touches && e.touches[index]) {
    return { clientX: e.touches[index].clientX, clientY: e.touches[index].clientY };
  }
  if (e.changedTouches && e.changedTouches[index]) {
    return { clientX: e.changedTouches[index].clientX, clientY: e.changedTouches[index].clientY };
  }
  return null;
}

// 画布点击检测（宠物列表 + 场景切换 + 宠物点击）
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = 720 / rect.width;
  const scaleY = 576 / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  // ─── 宠物点击检测（支持多宠物） ───
  if (!g.sceneTransition.active && g.draggingPetId === null) {
    const petClickRadius = 70;
    let clickedPet = null;
    let clickedPetPos = null;

    // 遍历所有宠物检测点击
    for (const pet of g.pets) {
      if (!pet.scenePos) continue;
      const dx = mx - pet.scenePos.x;
      const dy = my - pet.scenePos.y;
      if (dx * dx + dy * dy <= petClickRadius * petClickRadius) {
        clickedPet = pet;
        clickedPetPos = pet.scenePos;
        break;
      }
    }

    if (clickedPet) {
      // 点击了宠物！触发互动
      initAudio();
      playSound('pet');

      // 增加亲密度
      g.intimacy = Math.min(100, g.intimacy + 3);
      g.lastInteractTime = Date.now();
      g.idleTime = 0;

      // 随机触发特效（设置在该宠物身上）
      const reactions = ['jump', 'heart', 'spin', 'bounce'];
      clickedPet.clickReaction = {
        type: reactions[Math.floor(Math.random() * reactions.length)],
        time: 0
      };

      // 发射爱心粒子（从宠物当前位置）
      for (let i = 0; i < 5; i++) {
        g.heartParticles.push({
          x: clickedPetPos.x + (Math.random() - 0.5) * 40,
          y: clickedPetPos.y - 20 + (Math.random() - 0.5) * 40,
          vx: (Math.random() - 0.5) * 2,
          vy: -Math.random() * 2 - 1,
          life: 1,
          size: 4 + Math.random() * 4
        });
      }

      // 短暂显示开心表情（设置在该宠物身上）
      clickedPet.petMood = 'happy';
      clickedPet.moodBubble = { show: true, timer: 2 };

      // 给予经验
      addExp(clickedPet, 3);

      updateBtnUI();
      saveGame();
      return;
    }
  }

  // 场景切换按钮区域（左右两侧大箭头）
  // 左箭头：x: 0-40, y: 200-380
  if (g.currentScene === 'pets' && mx >= 0 && mx <= 50 && my >= 200 && my <= 380) {
    if (!g.sceneTransition.active) {
      initAudio();
      playSound('sceneSwitch');
      g.sceneTransition = { active: true, progress: 0, from: 'pets', to: 'incubator' };
    }
    return;
  }
  // 右箭头：x: 680-720, y: 200-380（切换到宠物间）
  if (g.currentScene === 'incubator' && g.pets.length > 0 && mx >= 670 && mx <= 720 && my >= 200 && my <= 380) {
    if (!g.sceneTransition.active) {
      initAudio();
      playSound('sceneSwitch');
      g.sceneTransition = { active: true, progress: 0, from: 'incubator', to: 'pets' };
    }
    return;
  }

  // 检查是否点击了底部宠物列表
  for (const r of petListRegions) {
    if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) {
      showPetDetail(r.idx);
      return;
    }
  }
});

// ─── 拖拽系统 ─────────────────────────────────────────────────────
function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = 720 / rect.width;
  const scaleY = 576 / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

canvas.addEventListener('mousedown', (e) => {
  if (g.sceneTransition.active) return;
  const { x, y } = getCanvasCoords(e);

  // 检测是否点击了宠物（支持多宠物）
  const petClickRadius = 70;
  for (const pet of g.pets) {
    if (!pet.scenePos) continue;
    const dx = x - pet.scenePos.x, dy = y - pet.scenePos.y;
    if (dx * dx + dy * dy <= petClickRadius * petClickRadius) {
      g.draggingPetId = pet.id;
      g.dragOffsetX = dx;
      g.dragOffsetY = dy;
      canvas.style.cursor = 'grabbing';
      break;
    }
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (g.draggingPetId !== null) {
    // 拖拽中：更新宠物位置
    const { x, y } = getCanvasCoords(e);
    const pet = g.pets.find(p => p.id === g.draggingPetId);
    if (pet && pet.scenePos) {
      pet.scenePos.x = Math.max(40, Math.min(680, x - g.dragOffsetX));
      pet.scenePos.y = Math.max(40, Math.min(480, y - g.dragOffsetY));
    }
    return;
  }

  // 鼠标悬停检测
  if (!g.sceneTransition.active) {
    const { x, y } = getCanvasCoords(e);
    const petClickRadius = 70;
    let isOverPet = false;
    for (const pet of g.pets) {
      if (!pet.scenePos) continue;
      const dx = x - pet.scenePos.x, dy = y - pet.scenePos.y;
      if (dx * dx + dy * dy <= petClickRadius * petClickRadius) {
        isOverPet = true;
        break;
      }
    }
    canvas.style.cursor = isOverPet ? 'grab' : 'default';
  }
});

// ─── Isometric Grid System ────────────────────────────────────────
// 等轴测 45 度俯视角，2:1 菱形格子
const ISO_COLS = 5, ISO_ROWS = 3;
const TILE_W = 80, TILE_H = 40;
const OX = 360, OY = 100; // 屏幕原点（网格最上端中心）

// 网格 (col, row) → 屏幕 (x, y)：tile 中心点
function isoToScreen(col, row) {
  return {
    x: (col - row) * (TILE_W / 2) + OX,
    y: (col + row) * (TILE_H / 2) + OY,
  };
}

// 屏幕 (x, y) → 网格 (col, row)
function screenToIso(sx, sy) {
  const x = sx - OX;
  const y = sy - OY;
  const col = Math.round((x / (TILE_W / 2) + y / (TILE_H / 2)) / 2);
  const row = Math.round((y / (TILE_H / 2) - x / (TILE_W / 2)) / 2);
  return { col, row };
}

// 按深度排序（col+row 越小越靠前，先画）
function isoDepth(col, row) {
  return col + row;
}

// ─── 等轴测地面（连续平面，无独立 tile 边界） ───

function arrangePetsIso() {
  g.pets.forEach((pet, idx) => {
    if (!pet.scenePos) pet.scenePos = { x: 0, y: 0 };
    const col = idx % ISO_COLS;
    const row = Math.floor(idx / ISO_COLS);
    const pos = isoToScreen(col, row);
    pet.scenePos.x = pos.x;
    pet.scenePos.y = pos.y;
    pet.isoCol = col;
    pet.isoRow = row;
  });
}

// ─── 等轴测坐标吸附 ───
function snapPetToIsoGrid(pet) {
  if (!pet || !pet.scenePos) return;
  const { col, row } = screenToIso(pet.scenePos.x, pet.scenePos.y);
  const clampedCol = Math.max(0, Math.min(ISO_COLS - 1, col));
  const clampedRow = Math.max(0, Math.min(ISO_ROWS - 1, row));
  const pos = isoToScreen(clampedCol, clampedRow);
  pet.scenePos.x = pos.x;
  pet.scenePos.y = pos.y;
  pet.isoCol = clampedCol;
  pet.isoRow = clampedRow;
}

// Draw pixel char at position
function drawChar(ch, x, y, color, sz = 1) {
  ctx.fillStyle = color;
  const pattern = fontPatterns[ch] || fontPatterns[' '];
  if (!pattern) return;
  const patW = pattern[0].length;
  const patH = pattern.length;
  for (let py = 0; py < patH; py++) {
    for (let px2 = 0; px2 < patW; px2++) {
      if (pattern[py][px2]) {
        ctx.fillRect(x + px2 * sz, y + py * sz, sz, sz);
      }
    }
  }
}

function drawText(text, x, y, color, scale = 1) {
  if (text == null) return; // 防止 null/undefined 崩溃
  // 强制使用整数坐标避免亚像素模糊
  let cx = Math.floor(x);
  const iy = Math.floor(y);
  const hasCJK = /[^\x00-\x7E]/.test(String(text));

  if (hasCJK) {
    // CJK文字
    ctx.imageSmoothingEnabled = false;
    ctx.fillStyle = color;
    const fontSize = Math.max(14, Math.floor(14 * scale));
    ctx.font = `bold ${fontSize}px "Courier New", Courier, monospace`;
    ctx.textBaseline = 'top';
    ctx.fillText(text, cx, iy);
    return;
  }

  // 像素字模渲染 - 5x7字模更清晰
  for (let i = 0; i < text.length; i++) {
    const ch = text[i].toUpperCase();
    const pat = PIXEL_FONT[ch];
    if (pat) {
      const pw = pat[0].length;
      const ph = pat.length;
      // 像素大小 = scale * 2（放大2倍）
      const ps = Math.max(2, Math.floor(scale * 2));
      for (let py = 0; py < ph; py++) {
        for (let px2 = 0; px2 < pw; px2++) {
          if (pat[py][px2]) {
            ctx.fillStyle = color;
            ctx.fillRect(cx + px2 * ps, iy + py * ps, ps, ps);
          }
        }
      }
      cx += (pw + 1) * ps;
    } else {
      cx += 6 * scale;
    }
  }
}

function drawBg() {
  const isDay = g.isDay;

  // ─── Sky gradient ───────────────────────────────────────
  if (isDay) {
    ctx.fillStyle = '#4A90D9'; ctx.fillRect(0, 0, 720, 100);

    // 中山（中间色）— 峰值在 y=100-130
    ctx.fillStyle = '#5A8A4A';
    ctx.beginPath();
    ctx.moveTo(0, mtnBase);
    ctx.lineTo(0, 130);
    ctx.lineTo(80, 110);
    ctx.lineTo(180, 120);
    ctx.lineTo(280, 100);
    ctx.lineTo(380, 115);

    ctx.lineTo(580, 110);
    ctx.lineTo(680, 105);
    ctx.lineTo(720, 115);
    ctx.lineTo(720, mtnBase);
    ctx.closePath();
    ctx.fill();

    // 近山/丘陵（最深）— 峰值在 y=130-165
    ctx.fillStyle = '#3A6A2A';
    ctx.beginPath();
    ctx.moveTo(0, mtnBase);
    ctx.lineTo(0, 165);
    ctx.lineTo(60, 150);
    ctx.lineTo(140, 160);
    ctx.lineTo(240, 145);
    ctx.lineTo(340, 155);
    ctx.lineTo(440, 140);
    ctx.lineTo(540, 155);
    ctx.lineTo(640, 148);
    ctx.lineTo(720, 158);
    ctx.lineTo(720, mtnBase);
    ctx.closePath();
    ctx.fill();
  } else {
    // Night: 深色山峦剪影
    ctx.fillStyle = '#1a2040';
    ctx.beginPath();
    ctx.moveTo(0, mtnBase);
    ctx.lineTo(0, 130); ctx.lineTo(120, 100); ctx.lineTo(240, 120);
    ctx.lineTo(360, 95); ctx.lineTo(480, 115); ctx.lineTo(600, 100);
    ctx.lineTo(720, 120); ctx.lineTo(720, mtnBase);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#151d35';
    ctx.beginPath();
    ctx.moveTo(0, mtnBase);
    ctx.lineTo(0, 155); ctx.lineTo(80, 140); ctx.lineTo(200, 150);
    ctx.lineTo(320, 138); ctx.lineTo(440, 148); ctx.lineTo(560, 140);
    ctx.lineTo(680, 152); ctx.lineTo(720, 145);
    ctx.lineTo(720, mtnBase);
    ctx.closePath();
    ctx.fill();
  }

  // ─── Isometric Ground ────────────────────────────────────
  drawIsoGround();
}

function drawSunMoon() {
  const t = Date.now();
  if (g.isDay) {
    // Sun - larger and more prominent
    const sx = 640, sy = 60, sr = 24;

    // Sun glow (outer)
    ctx.fillStyle = 'rgba(255,200,80,0.15)';
    ctx.fillRect(sx - 40, sy - 40, 80, 80);
    ctx.fillStyle = 'rgba(255,180,60,0.2)';
    ctx.fillRect(sx - 30, sy - 30, 60, 60);

    // Sun body
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(sx - sr, sy - sr, sr * 2, sr * 2);
    ctx.fillStyle = '#FFFACD';
    ctx.fillRect(sx - sr + 4, sy - sr + 4, sr * 2 - 8, sr * 2 - 8);

    // Rays
    ctx.fillStyle = '#FFD700';
    const rayLen = 14;
    const rayW = 4;
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + t / 3000;
      const rx = Math.cos(angle) * (sr + 6);
      const ry = Math.sin(angle) * (sr + 6);
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(angle);
      ctx.fillRect(rayW / 2, -(sr + rayLen), rayW, rayLen);
      ctx.restore();
    }

    // Animated clouds drifting
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    const cloudData = [
      [80, 90, 60, 1],

      [390, 145], [450, 125], [510, 135], [570, 150], [95, 175],

function drawEgg() {
  // 蛋位置：在孵化器上方居中
  const ex = 360, ey = 230;
  const eggW = 60, eggH = 82; // 更真实的宽高比（约0.73）

  if (g.hatchPct >= 100 || g.isHatching) {
    // Hatching animation
    drawHatchingAnim();
    return;
  }

  // Show waiting state if not yet day for next hatch
  if (g.dayCount < g.nextHatchDay) {
    const daysLeft = g.nextHatchDay - g.dayCount;
    ctx.globalAlpha = 0.5;

    // Egg body - 真正的椭圆蛋形
    for (let py = -eggH / 2; py < eggH / 2; py++) {
      const prog = py / (eggH / 2);
      // 上半部分稍窄，下半部分圆润
      let w;
      if (py < 0) {
        // 上半部分：较窄的椭圆
        w = Math.floor(eggW / 2 * Math.sqrt(1 - prog * prog * 0.85));
      } else {
        // 下半部分：更圆润的椭圆
        w = Math.floor(eggW / 2 * Math.sqrt(1 - prog * prog * 0.95));
      }
      // 颜色渐变：顶部浅，底部深
      let col;
      if (py < -eggH / 4) {
        col = '#f8f0e0'; // 顶部最浅
      } else if (py < 0) {
        col = '#f5e6c8'; // 上部
      } else if (py < eggH / 4) {
        col = '#eed8a8'; // 中下部
      } else {
        col = '#e8d098'; // 底部
      }
      ctx.fillStyle = col;
      ctx.fillRect(ex - w, ey + py, w * 2, 1);
    }

    ctx.globalAlpha = 1;
    // Show waiting text
    drawText(`等待第${g.nextHatchDay}天`, ex - 75, ey + eggH / 2 + 15, P.warn, 2);
    drawText(`(${daysLeft}天后)`, ex - 64, ey + eggH / 2 + 35, P.dim, 2);
    return;
  }

  // Crack stage
  const stage = Math.floor(g.hatchPct / 20);

  // Egg body - 真正的椭圆蛋形
  for (let py = -eggH / 2; py < eggH / 2; py++) {
    const prog = py / (eggH / 2);
    let w;
    if (py < 0) {
      w = Math.floor(eggW / 2 * Math.sqrt(1 - prog * prog * 0.85));
    } else {
      w = Math.floor(eggW / 2 * Math.sqrt(1 - prog * prog * 0.95));
    }
    let col;
    if (py < -eggH / 4) {
      col = '#f8f0e0';
    } else if (py < 0) {
      col = '#f5e6c8';
    } else if (py < eggH / 4) {
      col = '#eed8a8';
    } else {
      col = '#e8d098';
    }
    ctx.fillStyle = col;
    ctx.fillRect(ex - w, ey + py, w * 2, 1);
  }

  // 斑点装饰
  ctx.fillStyle = 'rgba(180, 140, 80, 0.35)';
  const spots = [[-15, -25], [10, -15], [-5, 5], [18, -5], [-20, 10], [12, 20]];
  spots.forEach(([dx, dy]) => {
    const spotW = 5 + Math.abs(dx) % 3;
    ctx.fillRect(ex + dx - spotW / 2, ey + dy - spotW / 2, spotW, spotW);
  });

  // 高光
  ctx.fillStyle = 'rgba(255, 255, 240, 0.6)';
  ctx.fillRect(ex - 12, ey - eggH / 2 + 12, 6, 10);

  // 阴影（底部）
  ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
  ctx.fillRect(ex - eggW / 2 + 5, ey + eggH / 2 - 6, eggW - 10, 4);

  // Crack lines based on stage
  if (stage >= 1) {
    ctx.fillStyle = P.eggCrack;
    ctx.fillRect(ex - 8, ey - 18, 6, 8);
    ctx.fillRect(ex + 2, ey - 12, 8, 6);
  }
  if (stage >= 2) {
    ctx.fillRect(ex - 18, ey, 10, 6);
    ctx.fillRect(ex + 8, ey + 6, 8, 8);
    ctx.fillRect(ex - 6, ey + 14, 6, 6);
  }
  if (stage >= 3) {
    ctx.fillRect(ex - 24, ey - 6, 8, 6);
    ctx.fillRect(ex + 14, ey - 10, 6, 12);
    ctx.fillRect(ex - 12, ey + 20, 12, 6);
    ctx.fillRect(ex + 2, ey - 24, 8, 6);
  }
  if (stage >= 4) {
    // Major cracks
    ctx.fillStyle = P.eggInt;
    ctx.fillRect(ex - 14, ey - 10, 28, 32);
    ctx.fillStyle = P.eggCrack;
    for (let i = 0; i < 6; i++) {
      const cx = ex - 24 + Math.floor(Math.random() * 48);
      const cy = ey - 24 + Math.floor(Math.random() * 54);
      ctx.fillRect(cx, cy, 6, 6);
    }
    // Shadow inside
    ctx.fillStyle = '#D4A574';
    ctx.fillRect(ex - 8, ey - 6, 16, 24);
    // Eye peek
    ctx.fillStyle = '#000';
    ctx.fillRect(ex - 3, ey, 6, 6);
    ctx.fillStyle = '#fff';
    ctx.fillRect(ex, ey, 2, 2);
  }
}

let wobble = 0;

// 在场景中绘制宠物（支持多宠物）
// pet: 宠物对象
// x, y: 宠物在场景中的位置
// options: { isDragging, clickReaction, petMood, moodBubble }
function drawPet(pet, x, y, options) {
  if (!pet) return;

  const basePx = x, basePy = y;
  let scale = 2.5;
  const isDragging = options?.isDragging || false;
  const clickReaction = options?.clickReaction || null;
  const petMood = options?.petMood || 'normal';
  const moodBubble = options?.moodBubble || { show: false };

  if (isDragging) scale = 2.5 * 1.15; // 拖拽时放大

  // 点击反应动画
  let offsetY = 0;
  if (clickReaction) {
    const t = clickReaction.time;
    const type = clickReaction.type;
    if (type === 'jump') {
      // 跳跃：先上升后下落
      offsetY = -Math.sin(t * Math.PI) * 30;
    } else if (type === 'bounce') {
      // 弹跳：多次小弹跳
      const bounce = Math.abs(Math.sin(t * Math.PI * 3)) * (1 - t);
      offsetY = -bounce * 20;
    } else if (type === 'spin') {
      // 旋转：通过缩放实现
      scale = 2.5 * (1 + Math.sin(t * Math.PI * 4) * 0.1);
    } else if (type === 'heart') {
      // 爱心：轻微上下晃动
      offsetY = Math.sin(t * Math.PI * 4) * 5;
    }
  }

  // Create a temporary canvas for the pet sprite
  const petCanvas = document.createElement('canvas');
  petCanvas.width = 48;
  petCanvas.height = 48;
  drawPetSprite(petCanvas, pet, g.lastTs / 1000);

  // Draw scaled pet to main canvas
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  // 拖拽时添加阴影效果
  if (isDragging) {
    ctx.shadowColor = 'rgba(255, 105, 180, 0.5)';
    ctx.shadowBlur = 15;
  }
  ctx.drawImage(petCanvas, basePx - 24 * scale, basePy - 24 * scale + offsetY, 48 * scale, 48 * scale);
  ctx.restore();

  // ─── 地面投影（宠物脚底椭圆阴影） ───
  if (!isDragging) {
    const shadowW = 50 * scale * 0.5;
    const shadowH = 8 * scale * 0.5;
    const shadowY = basePy + 20 * scale + offsetY;
    ctx.save();
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.beginPath();
    ctx.ellipse(basePx, shadowY, shadowW, shadowH, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ─── 撒娇气泡（跟随宠物位置） ───
  if (moodBubble.show) {
    const bubbleX = basePx + 60, bubbleY = basePy - 80;
    // 气泡背景
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.fillRect(bubbleX - 40, bubbleY - 16, 80, 24);
    ctx.fillStyle = '#333';
    // 气泡尖
    ctx.fillRect(bubbleX - 8, bubbleY + 8, 8, 4);
    ctx.fillRect(bubbleX, bubbleY + 12, 8, 4);
    // 气泡文字
    ctx.fillStyle = '#FF69B4';
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText('摸摸我~', bubbleX - 28, bubbleY + 4);
  }

  // Draw pet name and star rating above
  const starStr = '★'.repeat(pet.star || 1) + '☆'.repeat(5 - (pet.star || 1));
  drawText(pet.name, basePx - 30, basePy - 110, P.txt, 1.2);
  drawText(starStr, basePx - 30, basePy - 92, STAR_COLORS[pet.star] || '#aaa', 0.8);

  // Gene icons
  const geneStr = (pet.genes || []).map(gk => (GENES[gk] || {}).icon || '').join('');
  if (geneStr) drawText(geneStr, basePx + 40, basePy - 106, P.dim, 0.8);

  // Level badge
  drawText(`Lv${pet.level}`, basePx + 40, basePy - 92, '#aaa', 0.8);

  // Hunger warning (top right of pet) - 使用全局饥饿度（简化处理）
  if (g.hunger < 30) {
    drawText('饿了!', basePx + 90, basePy - 100, P.danger, 2);
  }

  // Days remaining indicator
  if (pet.expireDay) {
    const daysLeft = pet.expireDay - g.dayCount;
    const daysColor = daysLeft <= 3 ? P.danger : (daysLeft <= 5 ? P.warn : P.dim);
    drawText(`剩${daysLeft}天`, basePx - 35, basePy + 130, daysColor, 2);
  }

  // Exp bar below pet
  const expNext = EXP_TABLE[pet.level] || EXP_TABLE[10];
  const expCur = pet.level > 1 ? EXP_TABLE[pet.level - 1] : 0;
  const expProg = Math.max(0, Math.min(1, (pet.exp - expCur) / (expNext - expCur)));
  const barW = 80;
  ctx.fillStyle = P.barBg;
  ctx.fillRect(basePx - barW / 2, basePy + 140, barW, 6);
  ctx.fillStyle = '#90EE90';
  ctx.fillRect(basePx - barW / 2, basePy + 140, Math.floor(barW * expProg), 6);
}

function drawHatchingAnim() {
  // 居中显示孵化动画
  const t = Date.now() / 200;
  const cx = 360, cy = 300;

  // Egg pieces falling
  ctx.fillStyle = P.eggLight;
  for (let i = 0; i < 6; i++) {
    const px = cx - 60 + i * 24 + Math.sin(t + i) * 12;
    const py = cy - 40 + (i % 3) * 20 + Math.floor(t + i) % 20;
    ctx.fillRect(Math.floor(px), Math.floor(py), 16, 16);
  }

  // Glowing center
  const glow = (Math.sin(t * 2) + 1) * 0.5;
  ctx.fillStyle = `rgba(255, 200, 100, ${glow * 0.8})`;
  ctx.fillRect(cx - 40, cy - 40, 80, 80);

  // Baby peek
  if (g.hatchAnim > 10) {
    const peek = Math.min(1, (g.hatchAnim - 10) / 20);
    ctx.fillStyle = '#FFE4B5';
    ctx.fillRect(cx - 30 * peek, cy - 30 * peek, 60 * peek, 60 * peek);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(cx - 18, cy - 10, 10, 10);
    ctx.fillRect(cx + 8, cy - 10, 10, 10);
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 16, cy - 8, 4, 4);
    ctx.fillRect(cx + 10, cy - 8, 4, 4);
  }
}

function drawHUD() {

  for (let i = 0; i < hearts; i++) {
    ctx.fillRect(100 + i * 18, BAR_Y, 10, 10);
    ctx.fillRect(98 + i * 18, BAR_Y + 2, 14, 8);
    ctx.fillRect(100 + i * 18, BAR_Y + 10, 10, 4);
  }

  // 饥饿度 (x: 250-400)

    ctx.fillRect(300, BAR_Y, Math.floor(100 * g.hunger / 100), BAR_H);

// ─── Pet Exp / Level System ─────────────────────────────────────
function addExp(pet, amount) {
  if (!pet) return;
  pet.exp += amount;
  // 检查升级
  while (pet.level < 10 && pet.exp >= EXP_TABLE[pet.level]) {
    pet.level++;
    initAudio();
    playSound('levelUp');
    showToast(`🎉 ${pet.name} 升级了！Lv.${pet.level}`);
  }
}

// ─── Synthesis System ────────────────────────────────────────────
let synthSelect = []; // 当前选中的用于合成的宠物

function doSynthesize() {
  if (g.pets.length < 3) {
    showToast('需要至少3只宠物才能合成');
    return;
  }
  synthSelect = [];
  const overlay = document.getElementById('overlay');
  const msg = document.getElementById('overlayMsg');
  // 按星级分组显示提示
  const starGroups = {};
  g.pets.forEach((p, i) => {
    if (!starGroups[p.star]) starGroups[p.star] = [];
    starGroups[p.star].push(i);
  });
  const starHint = Object.keys(starGroups)
    .filter(s => starGroups[s].length >= 3)
    .map(s => `${s}星(${starGroups[s].length}只)`).join('、') || '无3只同星';

  const listHtml = g.pets.map((p, i) => {
    const starStr = '★'.repeat(p.star || 1) + '☆'.repeat(5 - (p.star || 1));
    const geneStr = (p.genes || []).map(gk => (GENES[gk] || {}).icon || '').join('');
    return `<div class="breed-pet-item" id="breed_item_${i}" onclick="toggleSynthSelect(${i})" style="display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid #333;cursor:pointer">
      <canvas id="breed_canvas_${i}" width="48" height="48" style="image-rendering:pixelated"></canvas>
      <div>
        <div style="color:${STAR_COLORS[p.star]}">${p.name} ${starStr}</div>
        <div style="color:#aaa;font-size:11px">F${p.generation} · ${geneStr} · Lv.${p.level}</div>
      </div>
      <div id="breed_check_${i}" style="margin-left:auto;color:#444;font-size:20px">○</div>
    </div>`;
  }).join('');
  msg.innerHTML = `<div class="title">⚗️ 宠物合成</div>
    <div style="color:#aaa;font-size:12px;margin-bottom:4px">选择3只<b style="color:#FFD700">同星级</b>宠物合成1只<b style="color:#FFD700">+1星</b>宠物</div>
    <div style="color:#666;font-size:11px;margin-bottom:8px">可选：${starHint} &nbsp; <span style="color:#f55">副宠物将被消耗</span></div>
    <div id="breed_list" style="max-height:300px;overflow-y:auto">${listHtml}</div>
    <div id="breed_error" style="color:#f55;font-size:12px;margin-top:6px;display:none">请选择3只同星级的宠物</div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button onclick="confirmSynth()" style="flex:1;padding:8px;background:#222;border:2px solid #555;color:#fff;cursor:pointer">合成</button>
      <button onclick="closeOverlay()" style="flex:1;padding:8px;background:#222;border:2px solid #555;color:#fff;cursor:pointer">取消</button>
    </div>`;
  overlay.classList.add('show');
  g.pets.forEach((p, i) => {
    setTimeout(() => {
      const c = document.getElementById(`breed_canvas_${i}`);
      if (c) drawPetSprite(c, p);
    }, 30);
  });
}

function toggleSynthSelect(idx) {
  const alreadyIdx = synthSelect.indexOf(idx);
  if (alreadyIdx >= 0) {
    synthSelect.splice(alreadyIdx, 1);
  } else if (synthSelect.length < 3) {
    synthSelect.push(idx);
  }
  g.pets.forEach((_, i) => {
    const el = document.getElementById(`breed_check_${i}`);
    const item = document.getElementById(`breed_item_${i}`);
    if (el) el.textContent = synthSelect.includes(i) ? '◉' : '○';
    if (item) item.style.background = synthSelect.includes(i) ? '#2a2a4a' : 'transparent';
  });
  document.getElementById('breed_error').style.display = 'none';
}

function confirmSynth() {
  if (synthSelect.length !== 3) {
    document.getElementById('breed_error').style.display = 'block';
    document.getElementById('breed_error').textContent = '请选择3只宠物';
    return;
  }
  const [idxA, idxB, idxC] = synthSelect;
  const petA = g.pets[idxA];
  const petB = g.pets[idxB];
  const petC = g.pets[idxC];
  // 检查是否同星
  if (petA.star !== petB.star || petB.star !== petC.star) {
    document.getElementById('breed_error').style.display = 'block';
    document.getElementById('breed_error').textContent = '必须选择3只同星级的宠物';
    return;
  }
  // 检查是否五星满级
  if (petA.star >= 5) {
    document.getElementById('breed_error').style.display = 'block';
    document.getElementById('breed_error').textContent = '五星宠物已达上限，无法继续合成';
    return;
  }
  closeOverlay();
  finalizeSynth(petA, idxA, petB, idxB, petC, idxC);
}

function finalizeSynth(petA, idxA, petB, idxB, petC, idxC) {
  initAudio();
  // 升星
  const newStar = petA.star + 1;

  // 基因融合（来自三只宠物）+ 小概率变异
  const allGenes = [...petA.genes, ...petB.genes, ...petC.genes];
  const unique = [...new Set(allGenes)];
  let childGenes = unique.slice(0, 2);
  // 15%概率基因突变
  if (Math.random() < 0.15 && childGenes.length < 2) {
    const parentGeneSet = new Set(allGenes);
    const allGeneKeys = Object.keys(GENES).filter(k => !parentGeneSet.has(k));
    if (allGeneKeys.length > 0) {
      const mutant = allGeneKeys[Math.floor(Math.random() * allGeneKeys.length)];
      childGenes.push(mutant);
    }
  }

  // 代系取最大
  const childGen = Math.max(petA.generation, petB.generation, petC.generation) + 1;

  // 名字沿用主宠物
  const childName = petA.name + '·进化';

  // 性格随机选一个
  const allTraits = [...petA.traits, ...petB.traits, ...petC.traits];
  const uniqueTraits = [...new Set(allTraits)];
  const childTraits = uniqueTraits.slice(0, 2);
  if (childTraits.length === 0) childTraits.push('普通');

  // 副宠物 idx 降序排列（先删idx大的避免偏移）
  const removeIdxs = [idxB, idxC, idxA].sort((a, b) => b - a);
  removeIdxs.forEach(idx => g.pets.splice(idx, 1));

  // 生成进化后宠物
  const child = {
    id: Date.now(),
    name: childName,
    traits: childTraits,
    star: newStar,
    level: 1,
    exp: 0,
    genes: childGenes,
    generation: childGen,
    father: petA.name,
    mother: petB.name,
    day: g.dayCount,
    expireDay: g.dayCount + 10,
    breedCount: 0,
    // 多宠物场景位置（网格自动排列）
    scenePos: { x: 0, y: 0 },
    // 宠物互动状态
    clickReaction: null,
    petMood: 'normal',
    moodBubble: { show: false, timer: 0 },
  };

  g.pets.push(child);
  arrangePetsIso(); // 统一网格排列
  g.currentPet = child;
  g.currentScene = 'pets'; // 合成后自动切换到宠物间
  g.hunger = 100;

  const starStr = '★'.repeat(child.star || 1) + '☆'.repeat(5 - (child.star || 1));
  const geneStr = (child.genes || []).map(gk => (GENES[gk] || {}).icon || '').join('');
  const geneNameStr = (child.genes || []).map(gk => (GENES[gk] || {}).name || '').join('');
  const mutated = childGenes.length > 2 || (childGenes.length === 2 && ![...petA.genes, ...petB.genes, ...petC.genes].includes(childGenes[1]));
  const mutText = mutated ? '<br><span style="color:#ff69b4;font-size:12px">✨ 发生基因突变！</span>' : '';
  // 播放音效：突变播放特殊音效
  if (mutated) {
    playSound('synthMutation');
  } else {
    playSound('synth');
  }

  const overlay = document.getElementById('overlay');
  const msg = document.getElementById('overlayMsg');
  const canvasId = 'hatch_pet_sprite';
  msg.innerHTML = `<div class="title">⚗️ ${childName} 进化成功！</div>
    <div style="color:#aaa;font-size:12px;margin-bottom:4px">${petA.name} + ${petB.name} + ${petC.name}</div>
    <canvas id="${canvasId}" width="64" height="64" style="image-rendering:pixelated;margin:6px auto;display:block;border:1px solid #444"></canvas>
    <div style="color:${STAR_COLORS[child.star]};font-size:20px">${starStr}</div>
    <div style="margin-top:4px">${geneStr} <span style="color:#aaa">${geneNameStr}</span></div>
    <div style="color:#aaa">${childTraits.join('、')}</div>
    <div style="color:#aaa;margin-top:6px">F${child.generation} · Lv.1</div>
    ${mutText}`;
  overlay.classList.add('show');
  setTimeout(() => {
    const c = document.getElementById(canvasId);
    if (c) drawPetSprite(c, child);
  }, 50);
  saveGame();
}

// 放归宠物

// ─── Game Logic ─────────────────────────────────────────────────
function update(dt) {
  // dt in seconds
  g.time += dt;
  if (g.time >= CYCLE) {
    g.time = 0;
    g.isDay = true;
    g.dayCount++;
  } else if (g.time >= DAY_SEC && g.isDay) {
    g.isDay = false;
  }

  // Power regen (every 15 seconds)
  g.powerRegenTimer += dt;
  if (g.powerRegenTimer >= 15) {
    g.powerRegenTimer = 0;
    const regen = g.isDay ? Math.floor(POWER_DAY_REGEN / 2) : Math.floor(POWER_NGT_REGEN / 2);
    g.power = Math.min(POWER_MAX, g.power + regen);
  }

  // Pet expiration check (宠物每10天消失)
  if (g.currentPet && g.dayCount > g.currentPet.expireDay) {
    initAudio();
    playSound('petLeave');
    // 宠物消失
    const petName = g.currentPet.name;
    g.pets = g.pets.filter(p => p !== g.currentPet);
    g.currentPet = g.pets.length > 0 ? g.pets[g.pets.length - 1] : null;
    showToast(`${petName}离开了...`);
    saveGame();
  }

  // Cooldowns
  if (g.petCdLeft > 0) g.petCdLeft = Math.max(0, g.petCdLeft - dt);
  if (g.feedCdLeft > 0) g.feedCdLeft = Math.max(0, g.feedCdLeft - dt);
  if (g.forageCdLeft > 0) g.forageCdLeft = Math.max(0, g.forageCdLeft - dt);

  // Heat & Ice
  if (g.heatOn && g.power > 0) {
    g.temp = Math.min(TEMP_MAX, g.temp + 0.3 * dt);
    g.power = Math.max(0, g.power - HEAT_DRAIN * dt);
    if (g.power <= 0) {
      g.heatOn = false;
      // 警告音效只在电量刚好耗尽时触发一次
      initAudio();
      playSound('warning');
    }
  } else if (g.iceOn) {
    // 冰袋降温：每秒降3度
    g.temp = Math.max(TEMP_MIN, g.temp - 3 * dt);
  } else {
    // Natural cooling - faster at night
    const coolRate = g.isDay ? 0.15 : 0.25;
    g.temp = Math.max(TEMP_MIN, g.temp - coolRate * dt);
  }

  // 温度极端警告（带冷却，防止无限循环）
  g._tempWarnCooldown = (g._tempWarnCooldown || 0) - dt;
  if ((g.temp >= TEMP_MAX || g.temp <= TEMP_MIN) && g._tempWarnCooldown <= 0) {
    initAudio();
    playSound('warning');
    g._tempWarnCooldown = 3; // 3秒冷却
  }

  // Hatch rate
  let rate = HATCH_RATE;
  if (g.temp < TEMP_OPT_MIN) {
    rate = HATCH_RATE_COLD;
    if (g.temp < 30) {
      g.intimacy = Math.max(0, g.intimacy - 0.05 * dt);
    }
  } else if (g.temp > TEMP_OPT_MAX) {
    rate = HATCH_RATE_HOT;
  }
  // Intimacy bonus
  rate *= (1 + (g.intimacy / 100) * 0.5);

  // Passive hatch: not heating, not icing -> every 30sec add 1%
  if (!g.heatOn && !g.iceOn) {
    g.passiveHatchTimer = (g.passiveHatchTimer || 0) + dt;
    if (g.passiveHatchTimer >= 30) {
      g.passiveHatchTimer = 0;
      g.hatchPct = Math.min(100, g.hatchPct + 1);
    }
  } else {
    g.passiveHatchTimer = 0;
  }

  // Hunger decay (only when pet exists) - 每秒下降0.01，约100分钟降到0
  if (g.currentPet) {
    g.hunger = Math.max(0, g.hunger - 0.01 * dt);
  }

  const oldStage = Math.floor(g.hatchPct / 20);
  g.hatchPct = Math.min(100, g.hatchPct + rate * dt);
  const newStage = Math.floor(g.hatchPct / 20);

  // 裂纹阶段增加时播放音效
  if (newStage > oldStage && newStage >= 1 && newStage <= 4) {
    initAudio();
    playSound('crack');
  }

  // Random events
  g.eventCooldown -= dt;
  if (g.eventCooldown <= 0 && !g.eventMsg) {
    triggerRandomEvent();
  }
  if (g.eventMsg && g.eventTimer > 0) {
    g.eventTimer -= dt;
    if (g.eventTimer <= 0) {
      g.eventMsg = '';
    }
  }

  // Hatching check - hatchPct 100% 时直接孵化，不再受 nextHatchDay 限制
  if (g.hatchPct >= 100 && !g.isHatching) {
    startHatch();
  }
  if (g.isHatching) {
    g.hatchAnim += dt * 60;
    if (g.hatchAnim > 120) {
      finalizeHatch();
    }
  }
  
  // ─── 宠物互动增强：心情系统（简化版，仅处理点击触发的表情） ───
  // 更新每只宠物的点击反应动画
  g.pets.forEach(pet => {
    if (pet.clickReaction && typeof pet.clickReaction.time === 'number') {
      pet.clickReaction.time += dt;
      if (pet.clickReaction.time > 0.8) {
        pet.clickReaction = null;
      }
    }
    // 更新心情气泡计时器
    if (pet.moodBubble && typeof pet.moodBubble.timer === 'number' && pet.moodBubble.timer > 0) {
      pet.moodBubble.timer -= dt;
      if (pet.moodBubble.timer <= 0) {
        pet.moodBubble.show = false;
        pet.moodBubble.timer = 0;
      }
    }
  });

  // 更新爱心粒子
  g.heartParticles = g.heartParticles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05; // 重力
    p.life -= dt * 1.5;
    return p.life > 0;
  });
}

function triggerRandomEvent() {
  initAudio();
  playSound('event');
  const dayEvents = [
    { text: '晴空万里！孵化+5%', effect: () => { g.hatchPct = Math.min(100, g.hatchPct + 5); } },
    { text: '小虫靠近！获得虫子×1', effect: () => { g.inventory.worm = Math.min(INV_MAX, g.inventory.worm + 1); } },
    { text: '发现野果！获得水果×1', effect: () => { g.inventory.fruit = Math.min(INV_MAX, g.inventory.fruit + 1); } },
    { text: '热浪来袭！温度+3°C', effect: () => { g.temp = Math.min(TEMP_MAX, g.temp + 3); } },
    { text: '蚊虫骚扰！亲密度-5', effect: () => { g.intimacy = Math.max(0, g.intimacy - 5); } },
  ];
  const nightEvents = [
    { text: '月色温柔...亲密度+10', effect: () => { g.intimacy = Math.min(100, g.intimacy + 10); } },
    { text: '流星划过！孵化+8%', effect: () => { g.hatchPct = Math.min(100, g.hatchPct + 8); } },
    { text: '找到零食！获得饲料×1', effect: () => { g.inventory.treat = Math.min(INV_MAX, g.inventory.treat + 1); } },
    { text: '寒流来袭！温度-5°C', effect: () => { g.temp = Math.max(TEMP_MIN, g.temp - 5); } },
    { text: '做了噩梦...亲密度-5', effect: () => { g.intimacy = Math.max(0, g.intimacy - 5); } },
  ];

  const pool = g.isDay ? dayEvents : nightEvents;
  const ev = pool[Math.floor(Math.random() * pool.length)];
  g.eventMsg = ev.text;
  g.eventTimer = 5;
  ev.effect();
  g.eventCooldown = g.isDay ? 120 : 90;

  // Show event in DOM
  const el = document.getElementById('evt');
  el.textContent = ev.text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

function startHatch() {
  g.isHatching = true;
  g.hatchAnim = 0;
}

function finalizeHatch() {
  initAudio();
  playSound('hatch');
  g.isHatching = false;
  g.hatchPct = 0;

  // Determine baby traits
  const traits = [];
  if (g.intimacy >= 80) traits.push('亲人');
  if (g.intimacy >= 60) traits.push('活泼');
  if (g.inventory.worm >= 3) traits.push('贪吃');
  if (g.intimacy < 30) traits.push('调皮');
  if (traits.length === 0) traits.push('普通');

  const names = ['小火', '毛球', '蛋蛋', '小灰', '绒绒', '豆芽', '噗噗', '糖豆'];
  const petName = names[Math.floor(Math.random() * names.length)];

  // 随机基因 F1 代
  const geneKeys = Object.keys(GENES);
  const numGenes = Math.random() < 0.3 ? 2 : 1; // 30%概率双基因
  const petGenes = [];
  const shuffled = geneKeys.sort(() => Math.random() - 0.5);
  for (let i = 0; i < numGenes; i++) petGenes.push(shuffled[i]);

  // 随机星级：1-3星，概率权重
  const starRoll = Math.random();
  const star = starRoll < 0.5 ? 1 : (starRoll < 0.8 ? 2 : 3);

  // 构造宠物对象
  const newPet = {
    id: Date.now(),
    name: petName,
    traits: [...traits],
    star: star,
    level: 1,
    exp: 0,
    genes: petGenes,         // 血脉基因数组
    generation: 1,           // F1 原生代
    father: null,
    mother: null,
    day: g.dayCount,
    expireDay: g.dayCount + 10,  // 寿命10天
    breedCount: 0,            // 已被繁殖次数
    // 多宠物场景位置（网格自动排列）
    scenePos: { x: 0, y: 0 },
    // 宠物互动状态
    clickReaction: null,
    petMood: 'normal',
    moodBubble: { show: false, timer: 0 },
  };

  // 宠物上限检查：满了则拒绝孵化
  if (g.pets.length >= PET_MAX) {
    showToast('宠物已满！请放归一只宠物腾出位置');
    g.hatchAnim = 0;
    g.heatOn = false;
    g.iceOn = false;
    return;
  }

  g.pets.push(newPet);
  arrangePetsIso(); // 统一网格排列
  g.currentPet = g.pets[g.pets.length - 1];
  g.currentScene = 'pets'; // 孵化完成自动切换到宠物间
  g.hunger = 100;

  // 显示星级和基因
  const starStr = '★'.repeat(star) + '☆'.repeat(5 - star);
  const geneStr = petGenes.map(gk => GENES[gk].icon).join('');
  const geneNameStr = petGenes.map(gk => GENES[gk].name).join('');
  const canvasId = 'hatch_pet_sprite';

  // 显示 overlay
  const overlay = document.getElementById('overlay');
  const msg = document.getElementById('overlayMsg');
  msg.innerHTML = `<div class="title">🎉 ${petName} 孵化成功！</div>
    <canvas id="${canvasId}" width="64" height="64" style="image-rendering:pixelated;margin:8px auto;display:block;border:1px solid #444"></canvas>
    <div style="color:${STAR_COLORS[star]};font-size:18px">${starStr}</div>
    <div style="margin-top:4px">${geneStr} <span style="color:#aaa">${geneNameStr}</span></div>
    <div style="color:#aaa">${traits.join('、')}</div>
    <div style="color:#aaa;margin-top:6px">F1 · Lv.1</div>`;
  overlay.classList.add('show');
  setTimeout(() => {
    const c = document.getElementById(canvasId);
    if (c) drawPetSprite(c, newPet);
  }, 50);

  g.hatchAnim = 0;
  g.heatOn = false;
  g.iceOn = false;
  saveGame();
}

function toggleHeat() {
  initAudio();
  if (g.power <= 0 && !g.heatOn) {
    playSound('warning');
    showToast('电量不足！');
    return;
  }
  g.heatOn = !g.heatOn;
  if (g.heatOn) {
    g.iceOn = false; // 不能同时加热和冰敷
    playSound('heatOn');
  }
  updateBtnUI();
  saveGame();
}

function toggleIce() {
  initAudio();
  g.iceOn = !g.iceOn;
  if (g.iceOn) {
    g.heatOn = false; // 不能同时加热和冰敷
    playSound('iceOn');
  }
  updateBtnUI();
  saveGame();
}

function resetGame() {
  if (!confirm('确定要重开吗？所有进度将清零！')) return;
  localStorage.removeItem('hatchgame_save');
  location.reload();
}

function doForage() {
  initAudio();
  if (g.forageCdLeft > 0) {
    showToast(`冷却中 ${Math.ceil(g.forageCdLeft)}秒`);
    return;
  }
  // 随机获得食物
  const roll = Math.random();
  let found = '';
  if (roll < 0.5) {
    g.inventory.worm = Math.min(INV_MAX, g.inventory.worm + 1);
    found = '虫子×1';
  } else if (roll < 0.8) {
    g.inventory.fruit = Math.min(INV_MAX, g.inventory.fruit + 1);
    found = '水果×1';
  } else {
    g.inventory.treat = Math.min(INV_MAX, g.inventory.treat + 1);
    found = '零食×1';
  }
  playSound('forage');
  showToast(`找到${found}！`);
  g.forageCdLeft = FORAGE_COOLDOWN;
  updateBtnUI();
  saveGame();
}

function doPet() {
  initAudio();
  if (g.petCdLeft > 0) {
    showToast(`冷却中 ${Math.ceil(g.petCdLeft)}秒`);
    return;
  }
  if (g.pets.length === 0) {
    showToast('还没有宠物！');
    return;
  }
  // 默认抚摸第一只宠物（后续可扩展为选中特定宠物）
  const pet = g.pets[0];
  const petPos = pet.scenePos || { x: 360, y: 230 };
  g.intimacy = Math.min(100, g.intimacy + 8);
  playSound('pet');
  g.petCdLeft = PET_COOLDOWN;
  g.wobble = 10;
  // 给予经验
  addExp(pet, 5);

  // ─── 宠物互动增强：抚摸反馈 ───
  g.lastInteractTime = Date.now();
  g.idleTime = 0;

  // 随机触发特效（设置在该宠物身上）
  const reactions = ['jump', 'heart', 'spin', 'bounce'];
  pet.clickReaction = {
    type: reactions[Math.floor(Math.random() * reactions.length)],
    time: 0
  };

  // 发射爱心粒子（从宠物当前位置）
  for (let i = 0; i < 8; i++) {
    g.heartParticles.push({
      x: petPos.x + (Math.random() - 0.5) * 60,
      y: petPos.y - 20 + (Math.random() - 0.5) * 60,
      vx: (Math.random() - 0.5) * 2.5,
      vy: -Math.random() * 2.5 - 1,
      life: 1,
      size: 5 + Math.random() * 5
    });
  }

  // 显示开心表情（设置在该宠物身上）
  pet.petMood = 'happy';
  pet.moodBubble = { show: true, timer: 2.5 };

  updateBtnUI();
  saveGame();
}

function doFeed() {
  initAudio();
  const hasFood = g.inventory.worm > 0 || g.inventory.fruit > 0 || g.inventory.treat > 0;
  if (!hasFood) {
    showToast('没有食物了！');
    return;
  }
  if (g.feedCdLeft > 0) {
    showToast(`喂食冷却 ${Math.ceil(g.feedCdLeft)}秒`);
    return;
  }

  // Use best available
  if (g.inventory.treat > 0) {
    g.inventory.treat--;
    g.hunger = Math.min(100, g.hunger + 40);
    g.intimacy = Math.min(100, g.intimacy + 15);
    g.hatchPct = Math.min(100, g.hatchPct + 5);
    playSound('feedTreat');
    showToast('神秘饲料！饥饿+40 亲密度+15');
  } else if (g.inventory.fruit > 0) {
    g.inventory.fruit--;
    g.hunger = Math.min(100, g.hunger + 25);
    g.intimacy = Math.min(100, g.intimacy + 8);
    g.hatchPct = Math.min(100, g.hatchPct + 2);
    playSound('feedFruit');
    showToast('水果！饥饿+25 亲密度+8');
  } else if (g.inventory.worm > 0) {
    g.inventory.worm--;
    g.hunger = Math.min(100, g.hunger + 15);
    g.intimacy = Math.min(100, g.intimacy + 4);
    playSound('feedWorm');
    showToast('虫子！饥饿+15 亲密度+4');
  }
  if (g.currentPet) addExp(g.currentPet, 8);
  g.feedCdLeft = FEED_COOLDOWN;
  updateBtnUI();
  saveGame();
}

function showAlbum() {
  const overlay = document.getElementById('overlay');
  const msg = document.getElementById('overlayMsg');
  if (g.pets.length === 0) {
    msg.innerHTML = '<div class="title">📖 图鉴</div><div style="color:#aaa">还没有孵化过任何宠物</div>';
  } else {
    const list = g.pets.map((p, idx) => {
      const canvasId = `pet_sprite_${idx}`;
      const starStr = '★'.repeat(p.star || 1) + '☆'.repeat(5 - (p.star || 1));
      const geneStr = (p.genes || []).map(gk => (GENES[gk] || {}).icon || '').join('') || '无';
      const daysLeft = p.expireDay - g.dayCount;
      return `<div onclick="showPetDetail(${idx})" style="margin:4px 0;padding:6px;border-bottom:1px solid #333;display:flex;align-items:center;gap:10px;cursor:pointer">
        <canvas id="${canvasId}" width="48" height="48" style="image-rendering:pixelated;border:1px solid #444"></canvas>
        <div>
          <span style="color:${STAR_COLORS[p.star]};font-size:14px">${p.name}</span>
          <span style="color:${STAR_COLORS[p.star]};font-size:11px">${starStr}</span>
          <div style="color:#aaa;font-size:11px;margin-top:1px">${geneStr} · F${p.generation} · Lv${p.level} · 剩${daysLeft}天</div>
          <div style="color:#666;font-size:10px;margin-top:1px">${p.traits.join('、')}</div>
        </div>
      </div>`;
    }).join('');
    msg.innerHTML = `<div class="title">📖 图鉴 (${g.pets.length}/${PET_MAX})</div>${list}`;
    setTimeout(() => {
      g.pets.forEach((p, idx) => {
        const c = document.getElementById(`pet_sprite_${idx}`);
        if (c) drawPetSprite(c, p);
      });
    }, 50);
  }
  overlay.classList.add('show');
}

function drawPetSprite(canvas, pet, animTime) {
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, 48, 48);

  const t = animTime || 0;
  // 动画时间戳（秒）
  const breathe = Math.sin(t * 2.5) * 1.5;     // 呼吸：上下浮动
  const tailSwing = Math.sin(t * 3.5) * 2;       // 尾巴：左右摇摆
  const earWiggle = Math.sin(t * 5) * 1.5;       // 耳朵：快速抖动（兔子）
  // 眨眼：每4秒眨一次，持续0.15秒
  const blinkCycle = t % 4;
  const isBlinking = blinkCycle > 3.85;

  // Generate colors and type from pet name + genes
  const hash = (s) => { let h = 0; for (let i = 0; i < s.length; i++) h = (h*31 + s.charCodeAt(i)) & 0xFFFF; return h; };
  const h = hash(pet.name);

  // Pet type: 0=猫, 1=狗, 2=兔子, 3=狐狸
  const petType = h % 4;
  const hue = (h * 7) % 360;

  // 基因颜色融合
  let geneHue = hue;
  let geneSat = 55;
  let geneLit = 55;
  if (pet.genes && pet.genes.length > 0) {
    const geneHues = pet.genes.map(gk => {
      const g = GENES[gk];
      // 从基因颜色提取色相
      if (gk === 'fire') return 15;
      if (gk === 'water') return 210;
      if (gk === 'grass') return 120;
      if (gk === 'electric') return 50;
      if (gk === 'ice') return 190;
      if (gk === 'dark') return 270;
      if (gk === 'light') return 50;
      if (gk === 'wind') return 150;
      return 0;
    });
    geneHue = geneHues[0];
    if (pet.genes.length > 1) geneSat = 70; // 双基因更鲜艳
  }

  const bodyColor = `hsl(${geneHue},${geneSat}%,55%)`;
  const darkColor = `hsl(${geneHue},${geneSat}%,35%)`;
  const lightColor = `hsl(${geneHue},${geneSat}%,75%)`;

  const cx = 24, cy = 26 + breathe; // 呼吸影响全身位置

  // Shadow（影子不浮动）
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(cx - 10, 40, 20, 4);

  // ========== 尾巴 ==========
  const tailOff = Math.round(tailSwing);
  if (petType === 0) {
    // 猫尾巴 (弯曲上扬+摇摆)
    ctx.fillStyle = bodyColor;
    ctx.fillRect(cx + 10 + tailOff, cy + 2, 4, 6);
    ctx.fillRect(cx + 12 + tailOff, cy - 2, 4, 6);
    ctx.fillRect(cx + 14 + tailOff, cy - 6, 3, 5);
    ctx.fillStyle = lightColor;
    ctx.fillRect(cx + 15 + tailOff, cy - 4, 2, 3);
  } else if (petType === 1) {
    // 狗尾巴 (短小摇尾)
    ctx.fillStyle = bodyColor;
    ctx.fillRect(cx + 8 + tailOff, cy - 2, 5, 4);
    ctx.fillRect(cx + 11 + tailOff, cy - 5, 4, 4);
    ctx.fillStyle = lightColor;
    ctx.fillRect(cx + 13 + tailOff, cy - 4, 2, 3);
  } else if (petType === 2) {
    // 兔子尾巴 (圆球+摇摆)
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx + 10 + tailOff, cy + 6, 6, 6);
    ctx.fillStyle = bodyColor;
    ctx.fillRect(cx + 11 + tailOff, cy + 7, 4, 4);
  } else {
    // 狐狸尾巴 (大毛茸茸+摇摆)
    ctx.fillStyle = bodyColor;
    ctx.fillRect(cx + 8 + tailOff, cy, 6, 8);
    ctx.fillRect(cx + 12 + tailOff, cy - 4, 6, 6);
    ctx.fillRect(cx + 16 + tailOff, cy - 8, 4, 6);
    ctx.fillStyle = lightColor;
    ctx.fillRect(cx + 18 + tailOff, cy - 6, 3, 4);
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx + 17 + tailOff, cy - 4, 2, 3);
  }

  // ========== 身体 ==========
  if (petType === 0) {
    // 猫身体 (椭圆)
    for (let y = -10; y <= 10; y++) {
      const w = Math.floor(10 * (1 - y * y / 110));
      ctx.fillStyle = bodyColor;
      ctx.fillRect(cx - w, cy + y, w * 2, 1);
    }
    ctx.fillStyle = lightColor;
    ctx.fillRect(cx - 4, cy + 2, 8, 5);
  } else if (petType === 1) {
    // 狗身体 (圆)
    for (let y = -10; y <= 10; y++) {
      const w = Math.floor(11 * (1 - y * y / 115));
      ctx.fillStyle = bodyColor;
      ctx.fillRect(cx - w, cy + y, w * 2, 1);
    }
    ctx.fillStyle = lightColor;
    ctx.fillRect(cx - 5, cy + 3, 10, 5);
  } else if (petType === 2) {
    // 兔子身体 (圆胖)
    for (let y = -11; y <= 11; y++) {
      const w = Math.floor(12 * (1 - y * y / 130));
      ctx.fillStyle = bodyColor;
      ctx.fillRect(cx - w, cy + y, w * 2, 1);
    }
    ctx.fillStyle = lightColor;
    ctx.fillRect(cx - 5, cy + 4, 10, 5);
  } else {
    // 狐狸身体 (椭圆形)
    for (let y = -10; y <= 10; y++) {
      const w = Math.floor(10 * (1 - y * y / 115));
      ctx.fillStyle = bodyColor;
      ctx.fillRect(cx - w, cy + y, w * 2, 1);
    }
    ctx.fillStyle = lightColor;
    ctx.fillRect(cx - 4, cy + 2, 8, 6);
  }

  // ========== 手 ==========
  ctx.fillStyle = darkColor;
  if (petType === 2) {
    // 兔子小手 (圆)
    ctx.fillRect(cx - 14, cy + 2, 5, 5);
    ctx.fillRect(cx + 9, cy + 2, 5, 5);
  } else {
    // 正常小手
    ctx.fillRect(cx - 13, cy + 4, 4, 6);
    ctx.fillRect(cx + 9, cy + 4, 4, 6);
  }

  // ========== 脚 ==========
  ctx.fillStyle = darkColor;
  if (petType === 2) {
    // 兔子大脚 (蹦蹦)
    ctx.fillRect(cx - 9, cy + 10, 7, 5);
    ctx.fillRect(cx + 2, cy + 10, 7, 5);
  } else {
    ctx.fillRect(cx - 8, cy + 10, 5, 4);
    ctx.fillRect(cx + 3, cy + 10, 5, 4);
  }

  // ========== 头 ==========
  const headY = cy - 12;
  if (petType === 0) {
    // 猫头 (圆+三角耳)
    for (let y = -8; y <= 6; y++) {
      const w = Math.floor(10 * (1 - y * y / 70));
      ctx.fillStyle = bodyColor;
      ctx.fillRect(cx - w, headY + y, w * 2, 1);
    }
    // 猫耳
    ctx.fillStyle = bodyColor;
    ctx.fillRect(cx - 12, headY - 6, 5, 8);
    ctx.fillRect(cx - 9, headY - 10, 4, 5);
    ctx.fillRect(cx + 7, headY - 6, 5, 8);
    ctx.fillRect(cx + 5, headY - 10, 4, 5);
    ctx.fillStyle = '#FFB6C1';
    ctx.fillRect(cx - 11, headY - 4, 3, 4);
    ctx.fillRect(cx + 8, headY - 4, 3, 4);
  } else if (petType === 1) {
    // 狗头 (圆脸+垂耳)
    for (let y = -8; y <= 6; y++) {
      const w = Math.floor(10 * (1 - y * y / 70));
      ctx.fillStyle = bodyColor;
      ctx.fillRect(cx - w, headY + y, w * 2, 1);
    }
    // 狗垂耳
    ctx.fillStyle = darkColor;
    ctx.fillRect(cx - 13, headY - 2, 6, 10);
    ctx.fillRect(cx + 7, headY - 2, 6, 10);
    ctx.fillStyle = '#FFB6C1';
    ctx.fillRect(cx - 12, headY, 4, 6);
    ctx.fillRect(cx + 8, headY, 4, 6);
  } else if (petType === 2) {
    // 兔子头 (圆+长耳)
    for (let y = -7; y <= 6; y++) {
      const w = Math.floor(10 * (1 - y * y / 60));
      ctx.fillStyle = bodyColor;
      ctx.fillRect(cx - w, headY + y, w * 2, 1);
    }
    // 兔子长耳（+耳朵抖动）
    const earOff = Math.round(earWiggle);
    ctx.fillStyle = bodyColor;
    ctx.fillRect(cx - 10 + earOff, headY - 20, 4, 18);
    ctx.fillRect(cx + 6 - earOff, headY - 20, 4, 18);
    ctx.fillStyle = '#FFB6C1';
    ctx.fillRect(cx - 9 + earOff, headY - 18, 2, 14);
    ctx.fillRect(cx + 7 - earOff, headY - 18, 2, 14);
  } else {
    // 狐狸头 (尖脸+大耳)
    for (let y = -8; y <= 5; y++) {
      const w = Math.floor(9 * (1 - y * y / 75));
      ctx.fillStyle = bodyColor;
      ctx.fillRect(cx - w, headY + y, w * 2, 1);
    }
    // 狐狸尖耳
    ctx.fillStyle = bodyColor;
    ctx.fillRect(cx - 12, headY - 8, 5, 10);
    ctx.fillRect(cx - 9, headY - 12, 4, 5);
    ctx.fillRect(cx + 7, headY - 8, 5, 10);
    ctx.fillRect(cx + 5, headY - 12, 4, 5);
    ctx.fillStyle = darkColor;
    ctx.fillRect(cx - 11, headY - 6, 3, 6);
    ctx.fillRect(cx + 8, headY - 6, 3, 6);
  }

  // ========== 眼睛 ==========
  // 简化处理：精灵表情默认 normal，心情通过 moodBubble 显示
  const mood = 'normal';
  
  if (isBlinking) {
    // 眨眼：眯成一条线
    ctx.fillStyle = '#222';
    ctx.fillRect(cx - 7, headY - 1, 6, 2);
    ctx.fillRect(cx + 1, headY - 1, 6, 2);
  } else if (mood === 'happy') {
    // 开心：弯弯的笑眼 ^_^
    ctx.fillStyle = '#222';
    ctx.fillRect(cx - 8, headY - 2, 6, 3);
    ctx.fillRect(cx + 2, headY - 2, 6, 3);
    ctx.fillStyle = '#90EE90';
    ctx.fillRect(cx - 8, headY - 2, 6, 3);
    ctx.fillRect(cx + 2, headY - 2, 6, 3);
    // 笑眼弧线
    ctx.fillStyle = '#222';
    ctx.fillRect(cx - 6, headY, 4, 2);
    ctx.fillRect(cx + 2, headY, 4, 2);
    ctx.fillRect(cx - 8, headY + 1, 2, 1);
    ctx.fillRect(cx + 6, headY + 1, 2, 1);
  } else if (mood === 'sleepy') {
    // 困了：半闭的眼睛
    ctx.fillStyle = '#222';
    ctx.fillRect(cx - 7, headY, 6, 3);
    ctx.fillRect(cx + 1, headY, 6, 3);
    // ZZZ气泡
    ctx.fillStyle = '#aaa';
    ctx.fillRect(cx + 15, headY - 15, 3, 5);
    ctx.fillRect(cx + 18, headY - 18, 3, 5);
    ctx.fillRect(cx + 21, headY - 21, 3, 5);
  } else if (mood === 'hungry') {
    // 饿了：大眼睛水汪汪
    ctx.fillStyle = '#222';
    ctx.fillRect(cx - 7, headY - 3, 7, 7);
    ctx.fillRect(cx + 0, headY - 3, 7, 7);
    ctx.fillStyle = '#4FC3F7';
    ctx.fillRect(cx - 7, headY - 3, 7, 7);
    ctx.fillRect(cx + 0, headY - 3, 7, 7);
    // 眼泪
    ctx.fillStyle = '#81D4FA';
    ctx.fillRect(cx - 5, headY + 3, 2, 3);
    ctx.fillRect(cx + 4, headY + 3, 2, 3);
  } else if (mood === 'cute') {
    // 撒娇：星星眼
    ctx.fillStyle = '#222';
    ctx.fillRect(cx - 7, headY - 2, 6, 6);
    ctx.fillRect(cx + 1, headY - 2, 6, 6);
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(cx - 7, headY - 2, 6, 6);
    ctx.fillRect(cx + 1, headY - 2, 6, 6);
    // 星星
    ctx.fillStyle = '#FFF';
    ctx.fillRect(cx - 5, headY - 1, 2, 2);
    ctx.fillRect(cx + 3, headY - 1, 2, 2);
  } else {
    // 普通表情
    ctx.fillStyle = '#222';
    if (petType === 0) {
      // 猫眼 (竖瞳)
      ctx.fillRect(cx - 8, headY - 3, 5, 5);
      ctx.fillRect(cx + 3, headY - 3, 5, 5);
      ctx.fillStyle = '#90EE90';
      ctx.fillRect(cx - 8, headY - 3, 5, 5);
      ctx.fillRect(cx + 3, headY - 3, 5, 5);
      ctx.fillStyle = '#222';
      ctx.fillRect(cx - 6, headY - 2, 2, 4);
      ctx.fillRect(cx + 5, headY - 2, 2, 4);
    } else if (petType === 2) {
      // 兔子眼 (大红圆)
      ctx.fillRect(cx - 7, headY - 2, 6, 6);
      ctx.fillRect(cx + 1, headY - 2, 6, 6);
      ctx.fillStyle = '#FF4444';
      ctx.fillRect(cx - 7, headY - 2, 6, 6);
      ctx.fillRect(cx + 1, headY - 2, 6, 6);
    } else {
      // 普通圆眼
      ctx.fillRect(cx - 7, headY - 2, 6, 6);
      ctx.fillRect(cx + 1, headY - 2, 6, 6);
    }
    // 眼神光
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 6, headY - 2, 2, 2);
    ctx.fillRect(cx + 2, headY - 2, 2, 2);
  }

  // ========== 鼻子嘴巴 ==========
  if (petType === 0) {
    // 猫嘴 (Y型)
    ctx.fillStyle = '#FFB6C1';
    ctx.fillRect(cx - 1, headY + 4, 2, 2);
    ctx.fillStyle = darkColor;
    ctx.fillRect(cx - 2, headY + 6, 1, 2);
    ctx.fillRect(cx + 1, headY + 6, 1, 2);
    // 猫胡须
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 13, headY + 3, 5, 1);
    ctx.fillRect(cx - 14, headY + 5, 6, 1);
    ctx.fillRect(cx + 8, headY + 3, 5, 1);
    ctx.fillRect(cx + 8, headY + 5, 6, 1);
  } else if (petType === 1) {
    // 狗鼻子+吐舌
    ctx.fillStyle = '#222';
    ctx.fillRect(cx - 2, headY + 3, 4, 3);
    ctx.fillStyle = '#FF6B6B';
    ctx.fillRect(cx - 1, headY + 6, 3, 4);
  } else if (petType === 3) {
    // 狐狸尖鼻
    ctx.fillStyle = '#222';
    ctx.fillRect(cx - 1, headY + 3, 2, 2);
    ctx.fillStyle = darkColor;
    ctx.fillRect(cx - 2, headY + 5, 4, 2);
  } else {
    // 兔子三瓣嘴
    ctx.fillStyle = '#FFB6C1';
    ctx.fillRect(cx - 1, headY + 4, 2, 2);
    ctx.fillStyle = darkColor;
    ctx.fillRect(cx - 2, headY + 6, 1, 2);
    ctx.fillRect(cx + 1, headY + 6, 1, 2);
  }

  // 腮红
  ctx.fillStyle = 'rgba(255,182,193,0.5)';
  ctx.fillRect(cx - 11, headY + 1, 3, 2);
  ctx.fillRect(cx + 8, headY + 1, 3, 2);
}

// ─── Save / Load ────────────────────────────────────────────────
function saveGame() {
  const data = {
    temp: g.temp, hatchPct: g.hatchPct, intimacy: g.intimacy,
    power: g.power, heatOn: g.heatOn, iceOn: g.iceOn, time: g.time,
    isDay: g.isDay, inventory: g.inventory, pets: g.pets,
    petCdLeft: g.petCdLeft, feedCdLeft: g.feedCdLeft, forageCdLeft: g.forageCdLeft,
    hunger: g.hunger, currentPet: g.currentPet,
    dayCount: g.dayCount, nextHatchDay: g.nextHatchDay,
    lastSave: Date.now()
  };
  try {
    localStorage.setItem('hatchgame_save', JSON.stringify(data));
  } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem('hatchgame_save');
    if (!raw) return;
    const data = JSON.parse(raw);
    Object.assign(g, data);
    // Restore currentPet reference (since JSON.parse creates new objects)
    if (g.currentPet && g.pets.length > 0) {
      const cp = g.pets.find(p => p.name === g.currentPet.name && p.day === g.currentPet.day);
      if (cp) g.currentPet = cp;
      else g.currentPet = g.pets[g.pets.length - 1];
    }
    // 确保 currentPet.genes 也是数组
    if (g.currentPet && !Array.isArray(g.currentPet.genes)) {
      g.currentPet.genes = [];
    }
    // 旧存档升级：补全新宠物字段
    g.pets.forEach(p => {
      if (p.star === undefined) p.star = 1;
      if (p.level === undefined) p.level = 1;
      if (p.exp === undefined) p.exp = 0;
      if (!Array.isArray(p.genes)) p.genes = []; // 确保是数组
      if (p.generation === undefined) p.generation = 1;
      if (p.father === undefined) p.father = null;
      if (p.mother === undefined) p.mother = null;
      if (p.breedCount === undefined) p.breedCount = 0;
      // 旧存档：补全多宠物场景位置和互动状态
      if (!p.scenePos) {
        p.scenePos = { x: 0, y: 0 }; // 网格自动排列
      }
      if (p.clickReaction === undefined) p.clickReaction = null;
      if (p.petMood === undefined) p.petMood = 'normal';
      if (!p.moodBubble || typeof p.moodBubble.timer !== 'number') {
        p.moodBubble = { show: false, timer: 0 };
      }
    });
    // Offline progress
    if (data.lastSave) {
      const offline = (Date.now() - data.lastSave) / 1000; // 秒
      const offlineMins = Math.min(offline / 60, 10); // 转换为分钟，最多10分钟离线
      g.temp = Math.max(TEMP_MIN, g.temp - offlineMins * 0.02);
      g.hatchPct = Math.min(100, g.hatchPct + offlineMins * 0.05);
      if (g.hunger !== undefined) {
        g.hunger = Math.max(0, g.hunger - offlineMins * 0.5); // 离线饥饿度下降
      }
    }
    // Handle old saves without nextHatchDay
    if (g.nextHatchDay === undefined) {
      g.nextHatchDay = 0;
    }
    // 旧存档升级：补全拖拽系统字段
    if (g.draggingPetId === undefined) g.draggingPetId = null;
    // 统一网格排列
    arrangePetsIso();
  } catch(e) {}
}

// ─── Scene helpers: render to any ctx ──────────────────────────
function drawTextToCtx(targetCtx, x, y, text, color, scale) {
  if (text == null) return; // 防止 null/undefined 崩溃
  targetCtx.imageSmoothingEnabled = false;
  const hasCJK = /[^\x00-\x7E]/.test(String(text));
  if (hasCJK) {
    targetCtx.fillStyle = color;
    const fontSize = Math.max(14, Math.floor(14 * scale));
    targetCtx.font = `bold ${fontSize}px "Courier New", Courier, monospace`;
    targetCtx.textBaseline = 'top';
    targetCtx.fillText(text, Math.floor(x), Math.floor(y));
    return;
  }
  const iy = Math.floor(y);
  let cx = Math.floor(x);
  for (let i = 0; i < text.length; i++) {
    const ch = text[i].toUpperCase();
    const pat = PIXEL_FONT[ch];
    if (pat) {
      const pw = pat[0].length, ph = pat.length;
      const ps = Math.max(2, Math.floor(scale * 2));
      for (let py = 0; py < ph; py++) {
        for (let px2 = 0; px2 < pw; px2++) {
          if (pat[py][px2]) {
            targetCtx.fillStyle = color;
            targetCtx.fillRect(cx + px2 * ps, iy + py * ps, ps, ps);
          }
        }
      }
      cx += (pw + 1) * ps;
    } else {
      cx += 6 * scale;
    }
  }
}

    targetCtx.fillStyle = '#5A8A4A';
    targetCtx.beginPath();
    targetCtx.moveTo(0, mtnBase); targetCtx.lineTo(0, 130); targetCtx.lineTo(80, 110);

    targetCtx.lineTo(720, 115); targetCtx.lineTo(720, mtnBase);
    targetCtx.closePath(); targetCtx.fill();
    targetCtx.fillStyle = '#3A6A2A';
    targetCtx.beginPath();

    targetCtx.lineTo(140, 160); targetCtx.lineTo(240, 145); targetCtx.lineTo(340, 155);
    targetCtx.lineTo(440, 140); targetCtx.lineTo(540, 155); targetCtx.lineTo(640, 148);
    targetCtx.lineTo(720, 158); targetCtx.lineTo(720, mtnBase);

  } else {

    targetCtx.beginPath();

    targetCtx.lineTo(360, 95); targetCtx.lineTo(480, 115); targetCtx.lineTo(600, 100);
    targetCtx.lineTo(720, 120); targetCtx.lineTo(720, mtnBase);
    targetCtx.closePath(); targetCtx.fill();
    targetCtx.fillStyle = '#151d35';
    targetCtx.beginPath();

    targetCtx.lineTo(200, 150); targetCtx.lineTo(320, 138); targetCtx.lineTo(440, 148);
